  // ============================================
  // ACTIONS DE MASSE (V21)
  // Appliquer une action sur une matière dans plusieurs concours d'un coup
  // ============================================

  // Sauvegarder l'historique des actions de masse pour permettre l'annulation
  saveMassActionHistory(action) {
    try {
      const history = JSON.parse(localStorage.getItem('bara_mass_action_history') || '[]');
      history.unshift({
        ...action,
        timestamp: Date.now()
      });
      // Garder seulement les 10 dernières actions
      if (history.length > 10) history.length = 10;
      localStorage.setItem('bara_mass_action_history', JSON.stringify(history));
    } catch (e) {
      console.error('Failed to save mass action history:', e);
    }
  },

  getMassActionHistory() {
    try {
      return JSON.parse(localStorage.getItem('bara_mass_action_history') || '[]');
    } catch (e) {
      return [];
    }
  },

  // Obtenir la liste des concours selon le scope
  getConcoursForScope(scope) {
    if (scope === 'all') {
      return window.CONCOURS;
    }
    // Sinon scope est une catégorie (forces, enseignement, sante, etc.)
    return window.CONCOURS.filter(c => c.categorie === scope);
  },

  // Appliquer une action en masse
  applyMassAction(matiereId, action, scope) {
    const concoursList = this.getConcoursForScope(scope);

    // Sauvegarder l'état AVANT pour permettre l'annulation
    const previousStates = concoursList.map(c => ({
      concoursId: c.id,
      previousStatus: this.ConcoursMatieresManager.getStatus(c.id, matiereId)
    }));

    // Compter combien de concours ont effectivement cette matière
    const matiereExisteDans = concoursList.filter(c => {
      const effective = this.ConcoursMatieresManager.getEffectiveMatieres(c);
      return effective.includes(matiereId);
    });

    // Pour "ajouter" : on ajoute dans tous, même ceux qui ne l'ont pas
    // Pour les autres actions : on n'agit que sur ceux qui ont la matière
    const concoursAModifier = action === 'add' ? concoursList : matiereExisteDans;

    if (concoursAModifier.length === 0) {
      this.toast('⚠️ Aucun concours concerné par cette action', 'warning');
      return;
    }

    const matiereNom = window.MATIERES_CATALOG[matiereId]?.nom || matiereId;
    const scopeLabel = scope === 'all' ? `TOUS les concours (${concoursAModifier.length})` :
                       `la catégorie ${window.CATEGORIES_CONCOURS[scope]?.nom} (${concoursAModifier.length} concours)`;

    const actionLabels = {
      'hide': '👁️ MASQUER',
      'grey': '🔘 GRISER (Bientôt disponible)',
      'remove': '❌ RETIRER (suppression)',
      'reset': '🔄 RÉINITIALISER',
      'add': '➕ AJOUTER'
    };

    const actionLabel = actionLabels[action] || action;

    // Confirmation forte avec récapitulatif
    const confirmation = confirm(
      `⚡ ACTION DE MASSE\n\n` +
      `Action  : ${actionLabel}\n` +
      `Matière : ${matiereNom}\n` +
      `Cible   : ${scopeLabel}\n\n` +
      `⚠️ Cette action va affecter ${concoursAModifier.length} concours.\n` +
      `Tu pourras ANNULER cette action depuis l'historique.\n\n` +
      `Confirmer ?`
    );

    if (!confirmation) return;

    // Appliquer l'action
    const statusMap = {
      'hide': 'hidden',
      'grey': 'greyed',
      'remove': 'removed',
      'reset': 'normal',
      'add': 'added'
    };
    const newStatus = statusMap[action];

    concoursAModifier.forEach(c => {
      this.ConcoursMatieresManager.setMatiereStatus(c.id, matiereId, newStatus);
    });

    // Sauvegarder dans l'historique
    this.saveMassActionHistory({
      action,
      actionLabel,
      matiereId,
      matiereNom,
      scope,
      scopeLabel,
      affectedCount: concoursAModifier.length,
      previousStates: previousStates.filter(ps =>
        concoursAModifier.some(c => c.id === ps.concoursId)
      )
    });

    this.toast(`✅ ${actionLabel} appliquée à ${concoursAModifier.length} concours`);

    // Reset le formulaire
    this.state.massActionMatiere = null;
    this.state.massActionAction = null;
    this.state.massActionScope = null;
    this.render();
  },

  // Annuler une action de masse
  undoMassAction(timestamp) {
    const history = this.getMassActionHistory();
    const action = history.find(a => a.timestamp === timestamp);

    if (!action) {
      this.toast('❌ Action introuvable', 'danger');
      return;
    }

    if (!confirm(
      `↩️ ANNULER CETTE ACTION ?\n\n` +
      `${action.actionLabel} ${action.matiereNom}\n` +
      `sur ${action.scopeLabel}\n\n` +
      `${action.affectedCount} concours seront restaurés à leur état précédent.\n\n` +
      `Confirmer ?`
    )) return;

    // Restaurer chaque concours à son état précédent
    action.previousStates.forEach(ps => {
      this.ConcoursMatieresManager.setMatiereStatus(ps.concoursId, action.matiereId, ps.previousStatus);
    });

    // Retirer de l'historique
    const newHistory = history.filter(a => a.timestamp !== timestamp);
    localStorage.setItem('bara_mass_action_history', JSON.stringify(newHistory));

    this.toast('↩️ Action annulée — ' + action.affectedCount + ' concours restaurés');
    this.render();
  },

  // Toggle le panneau d'actions de masse
  toggleMassActionPanel() {
    this.state.showMassActionPanel = !this.state.showMassActionPanel;
    this.render();
  },

  // ============================================
  // EXPORT / IMPORT DES OVERRIDES (V22)
  // Permet de transférer les modifications entre appareils
  // ou de m'envoyer un JSON à intégrer dans le code
  // ============================================

  // Exporter toutes les modifications en JSON téléchargeable
  exportConcoursOverrides() {
    const overrides = this.ConcoursMatieresManager.loadOverrides();
    const history = this.getMassActionHistory();

    // Statistiques pour le récap
    const stats = {
      total_concours_modifies: Object.keys(overrides).length,
      total_matieres_grisees: 0,
      total_matieres_masquees: 0,
      total_matieres_supprimees: 0,
      total_matieres_ajoutees: 0
    };

    Object.values(overrides).forEach(o => {
      stats.total_matieres_grisees += (o.greyed || []).length;
      stats.total_matieres_masquees += (o.hidden || []).length;
      stats.total_matieres_supprimees += (o.removed || []).length;
      stats.total_matieres_ajoutees += (o.added || []).length;
    });

    if (stats.total_concours_modifies === 0) {
      this.toast('⚠️ Aucune modification à exporter', 'warning');
      return;
    }

    const exportData = {
      version: 'v22',
      exportedAt: new Date().toISOString(),
      app: 'Bara Concours',
      type: 'concours_matieres_overrides',
      stats,
      overrides,
      mass_action_history_count: history.length,
      instructions: {
        fr: 'Ce fichier contient les modifications faites sur les matières des concours. Envoie-le à Claude (ton développeur) qui les intégrera dans le code source pour que tous les utilisateurs Play Store en bénéficient.',
        usage: 'Importer ce JSON via le bouton "📥 Importer JSON" dans la même page admin pour restaurer les modifications.'
      }
    };

    // Créer le fichier téléchargeable
    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const dateStr = new Date().toISOString().split('T')[0]; // YYYY-MM-DD
    a.download = `bara-concours-overrides-${dateStr}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    this.toast(`✅ Export réussi : ${stats.total_concours_modifies} concours modifiés`);
  },

  // Ouvrir le sélecteur de fichier pour importer
  triggerImportOverrides() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json,application/json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          this.processImportOverrides(data);
        } catch (err) {
          this.toast('❌ Fichier JSON invalide', 'danger');
        }
      };
      reader.readAsText(file);
    };
    input.click();
  },

  // Traiter le fichier importé
  processImportOverrides(data) {
    // Validation du fichier
    if (!data || typeof data !== 'object') {
      this.toast('❌ Fichier invalide', 'danger');
      return;
    }

    if (data.type !== 'concours_matieres_overrides') {
      this.toast('❌ Ce fichier n\'est pas un export de modifications Bara Concours', 'danger');
      return;
    }

    if (!data.overrides || typeof data.overrides !== 'object') {
      this.toast('❌ Données manquantes dans le fichier', 'danger');
      return;
    }

    // Compter les modifications dans le fichier
    const stats = data.stats || {};
    const nbConcours = Object.keys(data.overrides).length;

    // Vérifier si l'utilisateur a déjà des modifications
    const currentOverrides = this.ConcoursMatieresManager.loadOverrides();
    const hasExisting = Object.keys(currentOverrides).length > 0;

    let mode = 'replace';
    if (hasExisting) {
      const choice = confirm(
        `📥 IMPORT DE MODIFICATIONS\n\n` +
        `Fichier exporté le : ${data.exportedAt ? new Date(data.exportedAt).toLocaleString('fr-FR') : 'date inconnue'}\n` +
        `Contenu : ${nbConcours} concours modifiés\n` +
        `  • 🔘 ${stats.total_matieres_grisees || 0} matières grisées\n` +
        `  • 👁️ ${stats.total_matieres_masquees || 0} matières masquées\n` +
        `  • ❌ ${stats.total_matieres_supprimees || 0} matières retirées\n` +
        `  • ➕ ${stats.total_matieres_ajoutees || 0} matières ajoutées\n\n` +
        `⚠️ Tu as déjà ${Object.keys(currentOverrides).length} concours modifiés.\n\n` +
        `OK = REMPLACER tes modifications par celles du fichier\n` +
        `Annuler = NE PAS importer`
      );
      if (!choice) return;
    } else {
      const choice = confirm(
        `📥 IMPORT DE MODIFICATIONS\n\n` +
        `Fichier exporté le : ${data.exportedAt ? new Date(data.exportedAt).toLocaleString('fr-FR') : 'date inconnue'}\n` +
        `Contenu : ${nbConcours} concours modifiés\n` +
        `  • 🔘 ${stats.total_matieres_grisees || 0} matières grisées\n` +
        `  • 👁️ ${stats.total_matieres_masquees || 0} matières masquées\n` +
        `  • ❌ ${stats.total_matieres_supprimees || 0} matières retirées\n` +
        `  • ➕ ${stats.total_matieres_ajoutees || 0} matières ajoutées\n\n` +
        `Confirmer l'import ?`
      );
      if (!choice) return;
    }

    // Sauvegarder
    this.ConcoursMatieresManager.saveOverrides(data.overrides);

    this.toast(`✅ Import réussi : ${nbConcours} concours restaurés`);
    this.render();
  },

  // ====================================
  // V29 : Vue d'ensemble des modifications (nouveau)
  // Permet de voir TOUTES les actions précédentes en un coup d'œil
  // ====================================
  renderModificationsSummary() {
    const allOverrides = this.ConcoursMatieresManager.loadOverrides();
    if (Object.keys(allOverrides).length === 0) return '';

    // Compiler par matière : pour chaque matière, lister les concours où elle a un statut
    const byMatiere = {
      greyed: {}, hidden: {}, removed: {}, added: {}
    };

    Object.entries(allOverrides).forEach(([concoursId, ov]) => {
      const concours = window.CONCOURS.find(c => c.id === concoursId);
      const concoursLabel = concours ? (concours.sigle || concours.nom) : concoursId;

      (ov.greyed || []).forEach(mid => {
        if (!byMatiere.greyed[mid]) byMatiere.greyed[mid] = [];
        byMatiere.greyed[mid].push({ id: concoursId, label: concoursLabel });
      });
      (ov.hidden || []).forEach(mid => {
        if (!byMatiere.hidden[mid]) byMatiere.hidden[mid] = [];
        byMatiere.hidden[mid].push({ id: concoursId, label: concoursLabel });
      });
      (ov.removed || []).forEach(mid => {
        if (!byMatiere.removed[mid]) byMatiere.removed[mid] = [];
        byMatiere.removed[mid].push({ id: concoursId, label: concoursLabel });
      });
      (ov.added || []).forEach(mid => {
        if (!byMatiere.added[mid]) byMatiere.added[mid] = [];
        byMatiere.added[mid].push({ id: concoursId, label: concoursLabel });
      });
    });

    const totalGreyed = Object.keys(byMatiere.greyed).length;
    const totalHidden = Object.keys(byMatiere.hidden).length;
    const totalRemoved = Object.keys(byMatiere.removed).length;
    const totalAdded = Object.keys(byMatiere.added).length;

    if (totalGreyed + totalHidden + totalRemoved + totalAdded === 0) return '';

    const isOpen = this.state.showModifsSummary !== false; // ouvert par défaut

    return `
      <div class="card" style="margin-bottom:1rem; background:linear-gradient(135deg, #f0fdf4, white); border-left:4px solid var(--green-bf)">
        <div style="display:flex; justify-content:space-between; align-items:center; cursor:pointer" onclick="Admin.toggleModifsSummary()">
          <div style="display:flex; align-items:center; gap:0.7rem">
            <div style="font-size:1.5rem">📊</div>
            <div>
              <div style="font-weight:800; font-size:1rem; color:var(--admin-text)">Vue d'ensemble de tes modifications</div>
              <div style="font-size:0.78rem; color:var(--admin-text-soft)">
                ${totalGreyed > 0 ? '🔘 ' + totalGreyed + ' grisées' : ''}
                ${totalHidden > 0 ? ' • 👁️ ' + totalHidden + ' masquées' : ''}
                ${totalRemoved > 0 ? ' • ❌ ' + totalRemoved + ' retirées' : ''}
                ${totalAdded > 0 ? ' • ➕ ' + totalAdded + ' ajoutées' : ''}
              </div>
            </div>
          </div>
          <div style="font-size:1.4rem; transition:transform 0.2s; ${isOpen ? 'transform:rotate(180deg)' : ''}">▼</div>
        </div>

        ${isOpen ? `
          <div style="margin-top:1.2rem; padding-top:1rem; border-top:1px solid var(--admin-border)">

            ${totalGreyed > 0 ? this.renderModifsSection('🔘 Matières grisées', byMatiere.greyed, 'greyed', '#f1f5f9', '#475569') : ''}
            ${totalHidden > 0 ? this.renderModifsSection('👁️ Matières masquées', byMatiere.hidden, 'hidden', '#fee2e2', '#7f1d1d') : ''}
            ${totalRemoved > 0 ? this.renderModifsSection('❌ Matières retirées', byMatiere.removed, 'removed', '#fef2f2', '#991b1b') : ''}
            ${totalAdded > 0 ? this.renderModifsSection('➕ Matières ajoutées', byMatiere.added, 'added', '#dcfce7', '#166534') : ''}

          </div>
        ` : ''}
      </div>
    `;
  },

    return `

  // Annuler une action pour une matière dans tous les concours
  undoModifForMatiere(matiereId, statusKey) {
    const matiereNom = window.MATIERES_CATALOG[matiereId]?.nom || matiereId;
    const statusLabels = {
      greyed: '🔘 grisée',
      hidden: '👁️ masquée',
      removed: '❌ retirée',
      added: '➕ ajoutée'
    };

    const allOverrides = this.ConcoursMatieresManager.loadOverrides();
    let nbAffectes = 0;
    Object.entries(allOverrides).forEach(([cid, ov]) => {
      if ((ov[statusKey] || []).includes(matiereId)) nbAffectes++;
    });

    if (!confirm(
      `↩️ ANNULER L'ACTION "${statusLabels[statusKey]}" SUR ${matiereNom.toUpperCase()}\n\n` +
      `Cette matière est actuellement ${statusLabels[statusKey]} dans ${nbAffectes} concours.\n\n` +
      `Tu vas remettre cette matière en état NORMAL dans tous ces concours.\n\n` +
      `Confirmer ?`
    )) return;

    // Retirer cette matière de la liste "statusKey" pour tous les concours
    Object.entries(allOverrides).forEach(([cid, ov]) => {
      if (ov[statusKey] && ov[statusKey].includes(matiereId)) {
        ov[statusKey] = ov[statusKey].filter(m => m !== matiereId);
      }
    });

    this.ConcoursMatieresManager.saveOverrides(allOverrides);
    this.toast(`✅ ${matiereNom} restaurée dans ${nbAffectes} concours`);
    this.render();
  },

  // Helper : compter les questions pour une matière
  countQuestionsForMatiere(matiereId) {
    if (!window.QUESTIONS) return 0;
    const fromBase = (window.QUESTIONS[matiereId] || []).length;

    // Ajouter les questions custom
    let customCount = 0;
    try {
      const custom = JSON.parse(localStorage.getItem('bara_custom_questions') || '{}');
      customCount = (custom[matiereId] || []).length;
    } catch (e) {}

    // Soustraire les questions supprimées
    let deletedCount = 0;
    try {
      const deleted = JSON.parse(localStorage.getItem('bara_deleted_questions') || '{}');
      deletedCount = (deleted[matiereId] || []).length;
    } catch (e) {}

    return Math.max(0, fromBase + customCount - deletedCount);
  },

  // ===== PARSER DE TEXTE INTELLIGENT =====
  // Détecte automatiquement le type de question
  parseImportText() {
    const ta = document.getElementById('text-import-area');
    if (!ta) return;
    const text = ta.value.trim();
    if (!text) {
      this.toast('⚠️ Colle du texte d\'abord', 'warning');
      return;
    }
    const questions = this.parseSessionQuestionsFromText(text);
    if (questions.length === 0) {
      this.toast('❌ Aucune question détectée. Vérifie le format.', 'danger');
      return;
    }
    this.state.importPreview = questions;
    this.toast(`✅ ${questions.length} questions détectées`);
    this.render();
  },

  // Algorithme de parsing — POUR LES SESSIONS D'ACCOMPAGNEMENT (V24)
  // (renommée pour ne pas écraser l'ancienne parseQuestionsFromText utilisée par Questions QCM)
  parseSessionQuestionsFromText(text) {
    const questions = [];

    // Nettoyer : enlever les lignes "BARA FORMATION TEL..." et lignes de séparation
    text = text.replace(/^.*BARA FORMATION.*$/gm, '')
               .replace(/^-{3,}.*$/gm, '')
               .replace(/^={3,}.*$/gm, '')
               .replace(/^ACCOMPAGNEMENT.*$/gmi, '')
               .replace(/^Tel\s*:.*$/gmi, '');

    // Séparer en blocs de question (séparateur = ligne commençant par Q: ou -)
    // Chaque question commence par "Q:" ou "- " ou un tiret
    const blocks = [];
    const lines = text.split('\n');
    let currentBlock = [];

    for (let line of lines) {
      const trimmed = line.trim();
      if (!trimmed) {
        if (currentBlock.length > 0) currentBlock.push('');
        continue;
      }
      // V63.12 : Nouvelle question : commence par "Q:", "Q.", "Q1:", "Q42:", "Question:", "Question 5:", "Question 5 :" OU "- "
      const isNewQ = /^(?:Q(?:uestion)?\s*\d*\s*[:.\)\-]|-\s+[A-Za-zÀ-ÿ0-9«"'])/.test(trimmed);
      if (isNewQ && currentBlock.length > 0) {
        // Vérifier que le bloc précédent contient une vraie question (a au moins R:)
        const blockText = currentBlock.join('\n');
        if (/R\s*éponse\s*:|R\s*:/i.test(blockText)) {
          blocks.push(blockText);
        }
        currentBlock = [trimmed];
      } else {
        currentBlock.push(trimmed);
      }
    }
    // Dernier bloc
    if (currentBlock.length > 0) {
      const blockText = currentBlock.join('\n');
      if (/R\s*éponse\s*:|R\s*:/i.test(blockText)) {
        blocks.push(blockText);
      }
    }

    // Parser chaque bloc
    for (const block of blocks) {
      try {
        const q = this.parseQuestionBlock(block);
        if (q) questions.push(q);
      } catch (e) {
        console.warn('Erreur parsing bloc:', e, block);
      }
    }

    return questions;
  },

  parseQuestionBlock(block) {
    const lines = block.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    if (lines.length === 0) return null;

    // V63.12 : Extraire la question (1ère ligne) — supporte Q:, Q., Q1:, Question 5:, etc.
    let questionText = lines[0].replace(/^Q(?:uestion)?\s*\d*\s*[:.\)\-]\s*/i, '').replace(/^-\s+/, '').trim();
    if (!questionText) return null;

    // Détecter les choix (lignes commençant par A), B), C), D))
    const choices = [];
    const choiceLetters = [];
    let answerLine = '';
    let explanationLine = '';  // V37 : explication (E:) séparée
    let nbLine = '';
    let currentField = null; // 'answer', 'explanation', 'nb', null

    for (let i = 1; i < lines.length; i++) {
      const line = lines[i];
      const choiceMatch = line.match(/^([A-D])[\)\.]\s*(.+)/);

      // Ligne de choix (seulement si on n'a pas encore commencé la réponse)
      if (choiceMatch && !answerLine && currentField === null) {
        choices.push(choiceMatch[2].trim());
        choiceLetters.push(choiceMatch[1]);
        continue;
      }

      // Ligne de réponse "R:" ou "Réponse:"
      if (/^R\s*éponse\s*:|^R\s*:/i.test(line)) {
        answerLine = line.replace(/^R\s*éponse\s*:|^R\s*:/i, '').trim();
        currentField = 'answer';
        continue;
      }

      // V37 : Ligne d'explication "E:" (format Bara Formation)
      if (/^E\s*xplication\s*:|^E\s*:/i.test(line)) {
        explanationLine = line.replace(/^E\s*xplication\s*:|^E\s*:/i, '').trim();
        currentField = 'explanation';
        continue;
      }

      // Ligne "NB:" (note bonus, autre format)
      if (/^NB\s*:/i.test(line)) {
        nbLine = line.replace(/^NB\s*:/i, '').trim();
        currentField = 'nb';
        continue;
      }

      // Suite des champs (lignes suivantes après R:, E:, NB:)
      const isNewField = line.match(/^(Q|R|E|A|B|C|D|NB)[\)\:\.\s]/i);
      if (!isNewField) {
        if (currentField === 'answer') {
          // Suite de la réponse
          if (/^[-•]\s+/.test(line)) {
            answerLine += '\n' + line.replace(/^[-•]\s*/, '• ');
          } else {
            answerLine += ' ' + line;
          }
        } else if (currentField === 'explanation') {
          // Suite de l'explication
          explanationLine += ' ' + line;
        } else if (currentField === 'nb') {
          // Suite du NB
          nbLine += ' ' + line;
        }
      }
    }

    // Nettoyer
    answerLine = answerLine.trim();
    explanationLine = explanationLine.trim();
    nbLine = nbLine.trim();

    // Déterminer le type — V37 : par défaut UNE SEULE réponse pour les imports .txt
    // L'admin pourra modifier manuellement en multi si besoin
    let type, r;
    if (choices.length === 0) {
      // Question ouverte
      type = 'open';
      r = answerLine;
    } else {
      // V37 FIX : extraire UNIQUEMENT la première lettre A-D au début de answerLine
      // Ne PAS scanner toute la ligne (qui peut contenir des "B", "C", "D" dans le texte)
      const firstLetterMatch = answerLine.match(/^\s*([A-D])\b/);
      if (firstLetterMatch) {
        const letterIdx = choiceLetters.indexOf(firstLetterMatch[1]);
        r = letterIdx >= 0 ? letterIdx : 0;
      } else {
        // Pas de lettre claire, défaut sur le premier choix
        r = 0;
      }
      // Toujours qcm3 ou qcm4 par défaut (UNE seule réponse)
      type = choices.length === 3 ? 'qcm3' : 'qcm4';
    }

    const result = { type, q: questionText };
    if (choices.length > 0) result.choices = choices;
    result.r = r;
    // V37 : prioriser E: (explication), puis NB: en fallback
    if (explanationLine) {
      result.x = explanationLine;  // Format standard Bara
    } else if (nbLine) {
      result.x = nbLine;  // Fallback pour anciens lots
    }

    return result;
  },

  // ===== UPLOAD DE FICHIER (Word .docx OU texte .txt) =====
  // V35 : accepte aussi les fichiers .txt
  handleWordFile(event) {
    const file = event.target.files[0];
    if (!file) return;

    const isDocx = file.name.toLowerCase().endsWith('.docx');
    const isTxt = file.name.toLowerCase().endsWith('.txt');

    if (!isDocx && !isTxt) {
      this.toast('❌ Format requis : .docx ou .txt', 'danger');
      return;
    }

    // CAS 1 : Fichier .txt — lecture directe, pas besoin de mammoth
    if (isTxt) {
      this.toast('⏳ Lecture du fichier texte...');
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const text = e.target.result;
          const questions = this.parseSessionQuestionsFromText(text);
          if (questions.length === 0) {
            this.toast('❌ Aucune question détectée dans ce fichier', 'danger');
            return;
          }
          this.state.importPreview = questions;
          this.toast(`✅ ${questions.length} questions extraites du fichier`);
          this.render();
        } catch (err) {
          this.toast('❌ Erreur lecture .txt : ' + err.message, 'danger');
        }
      };
      reader.onerror = () => this.toast('❌ Impossible de lire le fichier', 'danger');
      reader.readAsText(file, 'UTF-8');
      return;
    }

    // CAS 2 : Fichier .docx — utilise mammoth
    this.toast('⏳ Lecture du fichier Word...');

    // Charger mammoth.js dynamiquement
    const loadMammoth = () => new Promise((resolve, reject) => {
      if (window.mammoth) { resolve(window.mammoth); return; }
      const script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js';
      script.onload = () => resolve(window.mammoth);
      script.onerror = () => reject(new Error('Impossible de charger la bibliothèque'));
      document.head.appendChild(script);
    });

    loadMammoth()
      .then(mammoth => {
        const reader = new FileReader();
        reader.onload = (e) => {
          mammoth.extractRawText({ arrayBuffer: e.target.result })
            .then(result => {
              const text = result.value;
              const questions = this.parseSessionQuestionsFromText(text);
              if (questions.length === 0) {
                this.toast('❌ Aucune question détectée dans ce document', 'danger');
                return;
              }
              this.state.importPreview = questions;
              this.toast(`✅ ${questions.length} questions extraites du Word`);
              this.render();
            })
            .catch(err => {
              console.error(err);
              this.toast('❌ Erreur lors de la lecture du Word', 'danger');
            });
        };
        reader.readAsArrayBuffer(file);
      })
      .catch(err => {
        this.toast('❌ Impossible de charger la bibliothèque Word (connexion internet ?)', 'danger');
      });
  },

              Annuler
            </button>
          </div>

        </div>
      </div>
    `;

  // V37 : Changer le type de question pendant l'édition
  updateEditingQType(newType) {
    const q = this.state.editingQuestion;
    if (!q) return;

    // Capturer les valeurs actuelles avant de re-render
    const qText = document.getElementById('qedit-q');
    if (qText) q.q = qText.value;

    for (let i = 0; i < 4; i++) {
      const el = document.getElementById('qedit-choice-' + i);
      if (el) {
        q.choices = q.choices || [];
        q.choices[i] = el.value;
      }
    }
    const xEl = document.getElementById('qedit-x');
    if (xEl) q.x = xEl.value;

    // Conversion intelligente
    if (newType === 'multi') {
      // Mono → Multi : convertir r (number) en r (array)
      if (typeof q.r === 'number') {
        q.r = [q.r];
      } else if (!Array.isArray(q.r)) {
        q.r = [];
      }
      if (!q.choices || q.choices.length < 2) {
        q.choices = q.choices || [];
        while (q.choices.length < 4) q.choices.push('');
      }
    } else if (newType === 'qcm3' || newType === 'qcm4') {
      // Multi → Mono : prendre la première réponse
      if (Array.isArray(q.r)) {
        q.r = q.r.length > 0 ? q.r[0] : 0;
      } else if (typeof q.r !== 'number') {
        q.r = 0;
      }
    } else if (newType === 'open') {
      // Vers ouverte : pas de choix, r = texte
      q.r = typeof q.r === 'string' ? q.r : '';
    }

    q.type = newType;
    // Si qcm avec 4 choix non vides → qcm4, sinon qcm3
    if (newType === 'qcm3' || newType === 'qcm4') {
      const nonEmpty = (q.choices || []).filter(c => c && c.trim()).length;
      q.type = nonEmpty <= 3 ? 'qcm3' : 'qcm4';
    }

    this.render();
  },

  // V37 : Cocher/décocher une réponse
  toggleEditingAnswer(idx) {
    const q = this.state.editingQuestion;
    if (!q) return;

    // Capturer les autres valeurs avant re-render
    const qText = document.getElementById('qedit-q');
    if (qText) q.q = qText.value;
    for (let i = 0; i < 4; i++) {
      const el = document.getElementById('qedit-choice-' + i);
      if (el) {
        q.choices = q.choices || [];
        q.choices[i] = el.value;
      }
    }
    const xEl = document.getElementById('qedit-x');
    if (xEl) q.x = xEl.value;

    if (q.type === 'multi') {
      // Toggle dans le tableau
      q.r = Array.isArray(q.r) ? q.r : [];
      if (q.r.includes(idx)) {
        q.r = q.r.filter(i => i !== idx);
      } else {
        q.r = [...q.r, idx].sort();
      }
    } else {
      // Mono : juste remplacer
      q.r = idx;
    }

    this.render();
  },

  // V37 : Enregistrer les modifications
  saveQuestionEdit() {
    const q = this.state.editingQuestion;
    if (!q) return;

    // Capturer toutes les valeurs des champs
    const qText = document.getElementById('qedit-q');
    if (qText) q.q = qText.value.trim();

    if (q.type === 'open') {
      const rOpen = document.getElementById('qedit-r-open');
      if (rOpen) q.r = rOpen.value.trim();
      delete q.choices;
    } else {
      q.choices = [];
      for (let i = 0; i < 4; i++) {
        const el = document.getElementById('qedit-choice-' + i);
        if (el && el.value.trim()) q.choices.push(el.value.trim());
      }
      // Ajuster qcm3 vs qcm4 selon le nombre de choix
      if (q.type === 'qcm3' || q.type === 'qcm4') {
        q.type = q.choices.length === 3 ? 'qcm3' : 'qcm4';
      }
    }

    const xEl = document.getElementById('qedit-x');
    if (xEl) q.x = xEl.value.trim();

    // Validation
    if (!q.q) {
      this.toast('❌ La question est obligatoire', 'danger');
      return;
    }
    if (q.type !== 'open' && (!q.choices || q.choices.length < 2)) {
      this.toast('❌ Il faut au moins 2 choix', 'danger');
      return;
    }
    if (q.type === 'multi' && (!Array.isArray(q.r) || q.r.length === 0)) {
      this.toast('❌ Coche au moins une bonne réponse', 'danger');
      return;
    }

    // Sauvegarder dans la session
    const idx = q._editingIndex;
    const session = window.SessionsHelper.getSession(this.state.editingSessionId);
    if (!session || idx === undefined) {
      this.toast('❌ Erreur de session', 'danger');
      return;
    }

    // Nettoyer la copie de travail (retirer _editingIndex)
    const cleanQ = { ...q };
    delete cleanQ._editingIndex;
    if (cleanQ.nb && !cleanQ.x) {
      cleanQ.x = cleanQ.nb;  // Migration nb → x
      delete cleanQ.nb;
    }

    session.questions[idx] = cleanQ;
    window.SessionsHelper.saveCustomSession(session);
    this.state.editingQuestion = null;
    this.toast('✅ Question modifiée');
    this.render();
  },

  // V37 : Annuler l'édition de question
  cancelQuestionEdit() {
    this.state.editingQuestion = null;
    this.render();
  },

  // V38 : Exporter toutes les sessions (sauf les démos par défaut)
  exportAllSessions() {
    const allSessions = window.SessionsHelper ? window.SessionsHelper.getAllSessions() : [];
    const demoIds = (window.DEMO_SESSIONS || []).map(d => d.id);

    // Inclure aussi les sessions démo modifiées (pas seulement custom)
    const sessionsToExport = allSessions.map(s => ({
      id: s.id,
      date: s.date,
      numero: s.numero,
      titre: s.titre,
      description: s.description,
      questions: s.questions || [],
      isDemo: demoIds.includes(s.id)
    }));

    if (sessionsToExport.length === 0) {
      this.toast('❌ Aucune session à exporter', 'danger');
      return;
    }

    const totalQ = sessionsToExport.reduce((s, sess) => s + (sess.questions || []).length, 0);

    const backup = {
      type: 'bara_sessions_export',
      version: 'v38',
      exportedAt: new Date().toISOString(),
      stats: {
        nb_sessions: sessionsToExport.length,
        nb_questions_total: totalQ,
        nb_sessions_custom: sessionsToExport.filter(s => !s.isDemo).length,
        nb_sessions_demo_modifiees: sessionsToExport.filter(s => s.isDemo).length
      },
      sessions: sessionsToExport
    };

    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'bara-SESSIONS-' + new Date().toISOString().split('T')[0] + '.json';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 100);

    this.toast(`✅ ${sessionsToExport.length} sessions (${totalQ} questions) exportées`);
  },

  // V38 : Exporter UNE seule session
  exportSingleSession(sessionId) {
    const session = window.SessionsHelper ? window.SessionsHelper.getSession(sessionId) : null;
    if (!session) {
      this.toast('❌ Session introuvable', 'danger');
      return;
    }

    const exportData = {
      type: 'bara_session_single',
      version: 'v38',
      exportedAt: new Date().toISOString(),
      session: {
        id: session.id,
        date: session.date,
        numero: session.numero,
        titre: session.titre,
        description: session.description,
        questions: session.questions || []
      }
    };

    // Nom de fichier basé sur la date et le titre
    const safeTitle = (session.titre || 'session').replace(/[^a-z0-9]/gi, '_').toLowerCase().substring(0, 30);
    const filename = `bara-session-${session.date || 'sans-date'}-${safeTitle}.json`;

    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 100);

    const nbQ = (session.questions || []).length;
    this.toast(`✅ Session "${session.titre}" exportée (${nbQ} questions)`);
  },

  // V38 : Déclencher l'import depuis un fichier
  triggerSessionsImport() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json,application/json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          this.applySessionsImport(data);
        } catch (err) {
          this.toast('❌ Fichier JSON invalide : ' + err.message, 'danger');
        }
      };
      reader.readAsText(file);
    };
    input.click();
  },

  // V38 : Appliquer un import (gère 2 formats : tout ou single)
  applySessionsImport(data) {
    if (!data || !data.type) {
      this.toast('❌ Fichier non reconnu', 'danger');
      return;
    }

    let sessionsToImport = [];
    if (data.type === 'bara_sessions_export' && Array.isArray(data.sessions)) {
      sessionsToImport = data.sessions;
    } else if (data.type === 'bara_session_single' && data.session) {
      sessionsToImport = [data.session];
    } else {
      this.toast('❌ Format de fichier non supporté', 'danger');
      return;
    }

    if (sessionsToImport.length === 0) {
      this.toast('❌ Aucune session dans le fichier', 'danger');
      return;
    }

    // Compter pour la confirmation
    const totalQ = sessionsToImport.reduce((s, sess) => s + (sess.questions || []).length, 0);
    const existingIds = (window.SessionsHelper ? window.SessionsHelper.getAllSessions() : []).map(s => s.id);
    const conflicts = sessionsToImport.filter(s => existingIds.includes(s.id)).length;

    if (!confirm(
      `📥 IMPORT DE SESSIONS\n\n` +
      `Tu vas importer :\n` +
      `• ${sessionsToImport.length} sessions\n` +
      `• ${totalQ} questions au total\n` +
      `${conflicts > 0 ? `\n⚠️ ${conflicts} session(s) ont le même ID que des existantes (elles seront ÉCRASÉES)\n` : ''}` +
      `\nConfirmer l'import ?`
    )) return;

    // Appliquer
    let imported = 0;
    sessionsToImport.forEach(s => {
      try {
        // Retirer le champ isDemo qui est juste indicatif
        const cleanSession = { ...s };
        delete cleanSession.isDemo;
        window.SessionsHelper.saveCustomSession(cleanSession);
        imported++;
      } catch (e) {
        console.error('Erreur import session', s.id, e);
      }
    });

    this.toast(`✅ ${imported} sessions importées avec succès`);
    this.render();
  },

  deleteQuestionFromSession(idx) {
    const session = window.SessionsHelper.getSession(this.state.editingSessionId);
    if (!session) return;
    if (!confirm('🗑️ Supprimer cette question ?')) return;
    session.questions.splice(idx, 1);
    window.SessionsHelper.saveCustomSession(session);
    this.toast('Question supprimée');
    this.render();
  },

  // === Charger les sessions depuis Firestore ===
  async _loadAccompSessions(forceRefresh) {
    if (!window.SessionsFirestore) return;
    if (this.state._accompLoading && !forceRefresh) return;
    this.state._accompLoading = true;
    this.state._accompLoaded = true;
    try {
      const result = await window.SessionsFirestore.getAllSessionsAdmin();
      this.state._accompLoading = false;
      if (result.success) {
        this.state._accompSessions = result.sessions;
        if (this.state.currentPage === 'accompagnement') this.render();
      } else {
        this.toast('❌ Erreur chargement : ' + result.error, 'danger', 4000);
      }
    } catch (e) {
      this.state._accompLoading = false;
      console.error('[V63.30] _loadAccompSessions:', e);
    }
  },

  // === Naviguer vers l'éditeur (création ou édition) ===
  editAccompSession(sessionId) {
    this.state._accompEditingId = sessionId;
    this.navigate('accompagnement-edit');
  },

  // === Publier une session ===
  async publishAccompSession(sessionId) {
    const session = (this.state._accompSessions || []).find(s => s.id === sessionId);
    if (!session) return;
    if ((session.questions || []).length === 0) {
      this.toast('⚠️ Impossible de publier : la session n\'a aucune question', 'danger', 4000);
      return;
    }
    if (!confirm('🚀 Publier "' + session.titre + '" ?\n\nLes utilisateurs Premium verront cette session immédiatement.')) return;
    try {
      const result = await window.SessionsFirestore.publishSession(sessionId);
      if (result.success) {
        const s = this.state._accompSessions.find(x => x.id === sessionId);
        if (s) s.statut = 'publie';
        this.toast('🎉 Session publiée — distribution en cours', 'success');
        this.render();
      } else {
        this.toast('❌ ' + (result.error || 'Erreur'), 'danger', 4000);
      }
    } catch (e) {
      console.error('[V63.30] publishAccompSession:', e);
      this.toast('❌ Erreur', 'danger');
    }
  },

  // === Dépublier une session ===
  async unpublishAccompSession(sessionId) {
    const session = (this.state._accompSessions || []).find(s => s.id === sessionId);
    if (!session) return;
    if (!confirm('📥 Dépublier "' + session.titre + '" ?\n\nLes utilisateurs ne la verront plus dans l\'app.')) return;
    try {
      const result = await window.SessionsFirestore.unpublishSession(sessionId);
      if (result.success) {
        const s = this.state._accompSessions.find(x => x.id === sessionId);
        if (s) s.statut = 'brouillon';
        this.toast('📥 Session dépubliée (brouillon)', 'success');
        this.render();
      } else {
        this.toast('❌ ' + (result.error || 'Erreur'), 'danger', 4000);
      }
    } catch (e) {
      console.error('[V63.30] unpublishAccompSession:', e);
      this.toast('❌ Erreur', 'danger');
    }
  },

  // === Supprimer une session ===
  async deleteAccompSession(sessionId) {
    const session = (this.state._accompSessions || []).find(s => s.id === sessionId);
    if (!session) return;
    if (!confirm('⚠️ SUPPRIMER définitivement "' + session.titre + '" ?\n\nCette action est irréversible.')) return;
    try {
      const result = await window.SessionsFirestore.deleteSession(sessionId);
      if (result.success) {
        this.state._accompSessions = this.state._accompSessions.filter(s => s.id !== sessionId);
        this.toast('🗑 Session supprimée', 'success');
        this.render();
      } else {
        this.toast('❌ ' + (result.error || 'Erreur'), 'danger', 4000);
      }
    } catch (e) {
      console.error('[V63.30] deleteAccompSession:', e);
      this.toast('❌ Erreur', 'danger');
    }
  },

      q: q.q || '',

    };

  // === HELPERS ÉDITEUR ===
  _isAccompCorrect(q, idx) {
    if (q.type === 'multi') {
      const indices = Array.isArray(q.r) ? q.r : [];
      return indices.includes(idx);
    }
    return q.r === idx;

  _accompUpdate(field, value) {
    if (!this.state._accompForm) return;
    this.state._accompForm[field] = value;

  _accompNewQUpdate(field, value) {
    if (!this.state._accompNewQ) this.state._accompNewQ = { type: 'qcm4', q: '', choices: ['', '', '', ''], r: 0, nb: '' };
    this.state._accompNewQ[field] = value;
  },

  _accompNewQChoice(idx, value) {
    if (!this.state._accompNewQ) this.state._accompNewQ = { type: 'qcm4', q: '', choices: ['', '', '', ''], r: 0, nb: '' };
    if (!this.state._accompNewQ.choices) this.state._accompNewQ.choices = ['', '', '', ''];
    this.state._accompNewQ.choices[idx] = value;
  },

  _accompToggleCorrect(idx, isMulti) {
    if (!this.state._accompNewQ) this.state._accompNewQ = { type: 'qcm4', q: '', choices: ['', '', '', ''], r: 0, nb: '' };
    if (isMulti) {
      if (!Array.isArray(this.state._accompNewQ.r)) this.state._accompNewQ.r = [];
      const i = this.state._accompNewQ.r.indexOf(idx);
      if (i >= 0) this.state._accompNewQ.r.splice(i, 1);
      else this.state._accompNewQ.r.push(idx);
      this.state._accompNewQ.r.sort();
    } else {
      this.state._accompNewQ.r = idx;
    }
  },

  _accompChangeType(type) {
    if (!this.state._accompNewQ) this.state._accompNewQ = {};
    this.state._accompNewQ.type = type;
    if (type === 'qcm4') {
      this.state._accompNewQ.choices = this.state._accompNewQ.choices && this.state._accompNewQ.choices.length === 4
        ? this.state._accompNewQ.choices : ['', '', '', ''];
      this.state._accompNewQ.r = 0;
    } else if (type === 'qcm3') {
      this.state._accompNewQ.choices = ['', '', ''];
      this.state._accompNewQ.r = 0;
    } else if (type === 'multi') {
      this.state._accompNewQ.choices = this.state._accompNewQ.choices && this.state._accompNewQ.choices.length >= 3
        ? this.state._accompNewQ.choices : ['', '', '', ''];
      this.state._accompNewQ.r = [];
    } else if (type === 'open') {
      this.state._accompNewQ.r = '';
    }
    this.render();

  _setAccompMode(mode) {
    this.state._accompImportMode = mode;
    this.render();

  // === AJOUT OU MODIFICATION D'UNE QUESTION ===
  _addAccompQuestion() {
    if (!this.state._accompForm) return;
    const q = this.state._accompNewQ;
    if (!q || !q.q || !q.q.trim()) {
      this.toast('⚠️ L\'énoncé est requis', 'danger');
      return;
    }
    if (q.type !== 'open') {
      if (!q.choices || q.choices.some(c => !c || !c.trim())) {
        this.toast('⚠️ Tous les choix doivent être remplis', 'danger');
        return;
      }
      if (q.type === 'multi' && (!Array.isArray(q.r) || q.r.length === 0)) {
        this.toast('⚠️ Coche au moins une bonne réponse', 'danger');
        return;
      }
    } else if (!q.r || !q.r.trim()) {
      this.toast('⚠️ La réponse attendue est requise', 'danger');
      return;
    }
    // Construire l'objet propre
    const cleaned = {
      type: q.type,
      q: q.q.trim(),
      nb: (q.nb || '').trim()
    };
    if (q.type === 'open') {
      cleaned.r = q.r.trim();
    } else {
      cleaned.choices = q.choices.map(c => c.trim());
      cleaned.r = q.r;
    }
    // V63.31 : Mode édition ou mode ajout ?
    const editIdx = this.state._accompEditingQIdx;
    if (editIdx !== undefined && editIdx !== null && this.state._accompForm.questions[editIdx]) {
      // Mode édition : remplacer la question existante
      this.state._accompForm.questions[editIdx] = cleaned;
      this.state._accompEditingQIdx = null;
      this.toast('✓ Question modifiée', 'success');
    } else {
      // Mode ajout : ajouter à la fin
      this.state._accompForm.questions.push(cleaned);
      this.toast('✓ Question ajoutée', 'success');
    }
    // Reset le formulaire
    this.state._accompNewQ = { type: q.type, q: '', choices: q.type === 'qcm3' ? ['', '', ''] : ['', '', '', ''], r: q.type === 'multi' ? [] : 0, nb: '' };
    this.render();
  },

  // === SUPPRIMER UNE QUESTION ===
  _removeAccompQuestion(idx) {
    if (!this.state._accompForm) return;
    if (!confirm('Supprimer cette question ?')) return;
    this.state._accompForm.questions.splice(idx, 1);
    this.render();
  },

  // === PARSER L'IMPORT TEXTE ===
  _parseAccompImport() {
    const ta = document.getElementById('accomp-import-text');
    if (!ta) return;
    const text = ta.value.trim();
    if (!text) {
      this.toast('⚠️ Colle du texte à parser', 'danger');
      return;
    }
    const blocks = text.split(/\n(?=Q\d*\s*[:.])/g);
    const newQuestions = [];
    let errors = 0;
    blocks.forEach((block, blockIdx) => {
      const lines = block.split('\n').map(l => l.trim()).filter(Boolean);
      if (lines.length < 6) { errors++; return; }
      // Q1: ...
      const qMatch = lines[0].match(/^Q\d*\s*[:.]\s*(.+)$/);
      if (!qMatch) { errors++; return; }
      // A. B. C. D.
      const choices = [];
      let rIdx = -1, xIdx = -1;
      for (let i = 1; i < lines.length; i++) {
        const choiceMatch = lines[i].match(/^[A-D][.)\s]+(.+)$/);
        const rMatch = lines[i].match(/^R\s*[:.]\s*([A-D])\s*$/i);
        // V63.52 : accepter E: (format Bara Formation) en plus de X: (ancien format)
        const xMatch = lines[i].match(/^(?:E|X)\s*[:.]\s*(.+)$/i);
        if (choiceMatch && rIdx < 0) {
          choices.push(choiceMatch[1].trim());
        } else if (rMatch) {
          rIdx = rMatch[1].toUpperCase().charCodeAt(0) - 65;
        } else if (xMatch) {
          xIdx = i;
          break;
        }
      }
      if (choices.length < 3 || choices.length > 4 || rIdx < 0) { errors++; return; }
      // Récupérer l'explication (E: ou X: et lignes suivantes)
      let nb = '';
      if (xIdx >= 0) {
        // V63.52 : accepter E: et X:
        const xMatch = lines[xIdx].match(/^(?:E|X)\s*[:.]\s*(.+)$/i);
        nb = xMatch[1];
        // Lignes après X (continuation)
        for (let i = xIdx + 1; i < lines.length; i++) {
          nb += ' ' + lines[i];
        }
      }
      newQuestions.push({
        type: choices.length === 4 ? 'qcm4' : 'qcm3',
        q: qMatch[1].trim(),
        choices: choices,
        r: rIdx,
        nb: nb.trim()
      });
    });
    if (newQuestions.length === 0) {
      this.toast('❌ Aucune question valide trouvée. Vérifie le format.', 'danger', 5000);
      return;
    }
    this.state._accompForm.questions.push(...newQuestions);
    ta.value = '';
    this.toast(`✓ ${newQuestions.length} question${newQuestions.length > 1 ? 's' : ''} importée${newQuestions.length > 1 ? 's' : ''}${errors > 0 ? ' (' + errors + ' erreur' + (errors > 1 ? 's' : '') + ')' : ''}`, 'success', 4000);
    this.render();
  },

  // === SAUVEGARDER (création ou modification) ===
  async saveAccompSession(statut) {
    if (!this.state._accompForm) return;
    const form = this.state._accompForm;
    // Validation
    if (!form.titre || form.titre.trim().length < 5) {
      this.toast('⚠️ Le titre doit faire au moins 5 caractères', 'danger');
      return;
    }
    if (!form.date) {
      this.toast('⚠️ La date est requise', 'danger');
      return;
    }
    if (statut === 'publie' && form.questions.length === 0) {
      this.toast('⚠️ Impossible de publier une session sans question', 'danger', 4000);
      return;
    }
    // Vérifier doublon de titre (V63.30 — Q4 : bloquer)
    const existingSessions = this.state._accompSessions || [];
    const duplicate = existingSessions.find(s =>
      s.id !== form.id
      && s.titre.trim().toLowerCase() === form.titre.trim().toLowerCase()
    );
    if (duplicate) {
      this.toast('⚠️ Une session avec ce titre existe déjà', 'danger', 4000);
      return;
    }
    const sessionData = {
      titre: form.titre.trim(),
      numero: form.numero || 0,
      date: form.date,
      description: form.description.trim(),
      questions: form.questions,
      isPremium: form.isPremium,
      statut: statut
    };
    try {
      let result;
      if (form.id) {
        // Modification
        result = await window.SessionsFirestore.updateSession(form.id, sessionData);
      } else {
        // Création
        result = await window.SessionsFirestore.createSession(sessionData);
      }
      if (result.success) {
        this.toast(form.id
          ? (statut === 'publie' ? '✅ Session mise à jour et publiée' : '✅ Session mise à jour')
          : (statut === 'publie' ? '🚀 Session créée et publiée !' : '💾 Brouillon créé'),
          'success', 3000);
        // Reset l'état + retour à la liste
        this.state._accompForm = null;
        this.state._accompEditingId = null;
        this.state._accompNewQ = null;
        this.state._accompImportMode = 'form';
        await this._loadAccompSessions(true);
        this.navigate('accompagnement');
      } else {
        this.toast('❌ ' + (result.error || 'Erreur'), 'danger', 4000);
      }
    } catch (e) {
      console.error('[V63.30] saveAccompSession:', e);
      this.toast('❌ Erreur', 'danger');
    }
  },

  // === ANNULER ===
  cancelAccompEdit() {
    if (this.state._accompForm && (this.state._accompForm.titre || this.state._accompForm.questions.length > 0)) {
      if (!confirm('Abandonner les modifications ?')) return;
    }
    this.state._accompForm = null;
    this.state._accompEditingId = null;
    this.state._accompNewQ = null;
    this.state._accompImportMode = 'form';
    this.navigate('accompagnement');
  },

    if (this.state._textesLoading && !forceRefresh) return;
    this.state._textesLoading = true;
    this.state._textesLoaded = true;
    try {
      const result = await window.TextsFirestore.getAllTexts();
      this.state._textesLoading = false;
      if (result.success) {
        if (this.state.currentPage === 'textes') this.render();
      } else {
        this.toast('❌ Erreur : ' + result.error, 'danger', 4000);
      }
    } catch (e) {
      this.state._textesLoading = false;
      console.error('[V63.34] _loadTextesFirestore:', e);
    }
  },

  async _saveTexte(key) {
    const el = document.getElementById('texte-' + key);
    if (!el) return;
    const value = el.value.trim();
    if (!value) {
      this.toast('⚠️ Le texte ne peut pas être vide', 'danger');
      return;
    }
    try {
      const result = await window.TextsFirestore.setText(key, value);
      if (result.success) {
        this.toast('💾 Texte enregistré — distribution en cours', 'success', 2500);
        this.render();
      } else {
        this.toast('❌ ' + (result.error || 'Erreur'), 'danger', 4000);
      }
    } catch (e) {
      console.error('[V63.34] _saveTexte:', e);
      this.toast('❌ Erreur', 'danger');
    }
  },

  async _resetTexte(key) {
    const meta = window.TextsFirestore.TEXTS_METADATA[key];
    if (!confirm('↩️ Restaurer le texte par défaut pour "' + meta.label + '" ?\n\nLa valeur sera réinitialisée immédiatement.')) return;
    try {
      const result = await window.TextsFirestore.resetText(key);
      if (result.success) {
        this.toast('↩️ Texte restauré au défaut', 'success', 2500);
        this.render();
      } else {
        this.toast('❌ ' + (result.error || 'Erreur'), 'danger', 4000);
      }
    } catch (e) {
      console.error('[V63.34] _resetTexte:', e);
      this.toast('❌ Erreur', 'danger');
    }
  },

    const dateUsage = c.usedAt ? new Date(c.usedAt).toLocaleDateString('fr-FR') : '';

    // V58.3 : Construire l'info "utilisé par" avec email + nom + téléphone
    let usedByInfo = '';

      const parts = [];
      if (c.usedBy.name && c.usedBy.name !== 'Anonyme') parts.push('<strong>' + c.usedBy.name + '</strong>');
      if (c.usedBy.email) parts.push('📧 ' + c.usedBy.email);
      if (c.usedBy.phone) parts.push('📱 ' + c.usedBy.phone);
      usedByInfo = parts.length > 0 ? ' par ' + parts.join(' • ') : '';
    }

    return `

  // === ACTIONS ===
  setCodesFilter(filter) {
    this.state.codesFilter = filter;
    this.render();

  async generateCodes(planId, count) {
    if (!window.ActivationCodes.isCurrentUserAdmin()) {
      this.toast('🚫 Tu n\'es pas autorisé à générer des codes', 'danger');
      return;
    }
    const result = await window.ActivationCodes.generateBatch(planId, count);
    if (!result.success) {
      this.toast('❌ ' + (result.error || 'Erreur de génération'), 'danger');
      return;
    }
    const planName = planId === 'weekly' ? '1 semaine' : planId === 'monthly' ? '1 mois' : planId === 'session2026' ? 'SESSION 2026' : '1 an';
    const sourceLabel = result.source === 'firestore' ? ' (synchronisé Firestore)' : ' (local uniquement)';
    this.toast(`✅ ${result.codes.length} codes "${planName}" générés${sourceLabel}`);
    this.render();
  },

  copyCodeToClipboard(code) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(code).then(() => this.toast('✅ Code copié : ' + code));
    } else {
      this.toast('❌ Copie impossible, sélectionne manuellement', 'danger');
    }
  },

  async deleteCode(code) {
    if (!confirm(`🗑️ Supprimer le code ${code} ?\n\nCette action est irréversible.`)) return;
    const result = await window.ActivationCodes.deleteCode(code);
    if (!result.success) {
      this.toast('❌ ' + (result.error || 'Erreur'), 'danger');
      return;
    }
    this.toast('🗑️ Code supprimé');
    this.render();
  },

  async deleteUnusedCodes() {
    const stats = window.ActivationCodes.getStatsLocal();
    if (!confirm(`🗑️ Supprimer les ${stats.unused} codes non utilisés ?\n\nCette action est irréversible. Les codes utilisés seront gardés pour l'historique.`)) return;
    const result = await window.ActivationCodes.deleteUnused();
    if (!result.success) {
      this.toast('❌ ' + (result.error || 'Erreur'), 'danger');
      return;
    }
    this.toast(`🗑️ ${result.count} codes supprimés`);
    this.render();
  },

  async exportCodesCSV() {
    const csv = await window.ActivationCodes.exportCSV();
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'bara-codes-' + new Date().toISOString().split('T')[0] + '.csv';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 100);
    this.toast('📥 CSV téléchargé');
  },

  // V58 : Connexion Google de l'admin
  async signInAdminWithGoogle() {
    if (!window.FirebaseAuth) {
      this.toast('❌ Firebase non chargé', 'danger');
      return;
    }
    if (!window.FirebaseAuth.isFirebaseReady) {
      this.toast('⏳ Initialisation Firebase...');
      const ok = await window.FirebaseAuth.init();
      if (!ok) {
        this.toast('❌ Impossible d\'initialiser Firebase', 'danger');
        return;
      }
    }
    const result = await window.FirebaseAuth.signInWithGoogle();
    if (!result.success) {
      this.toast('❌ ' + (result.error || 'Erreur de connexion'), 'danger');
      return;
    }
    // Vérifier que c'est bien l'email admin
    if (!window.ActivationCodes.isCurrentUserAdmin()) {
      this.toast('🚫 Ce compte n\'est pas administrateur', 'danger');
      // Déconnexion immédiate
      await window.FirebaseAuth.signOut();
      this.render();
      return;
    }
    this.toast('✅ Connecté comme admin');
    this.render();
  },

  async signOutAndReconnect() {
    if (window.FirebaseAuth && window.FirebaseAuth.isFirebaseReady) {
      await window.FirebaseAuth.signOut();
    }
    this.toast('Déconnecté. Reconnecte-toi avec bara.formation@gmail.com');
    this.render();
  },

  renderBackupStats() {
    const keys = [
      ['bara_custom_questions', 'Questions ajoutées'],
      ['bara_edited_questions', 'Questions modifiées'],
      ['bara_deleted_questions', 'Questions supprimées'],
      ['bara_import_batches', 'Lots d\'import'],
      ['bara_concours_matieres_overrides', 'Concours modifiés'],
      ['bara_sessions_accompagnement', 'Sessions créées'],
      ['bara_edited_matieres', 'Matières éditées'],
      ['bara_mass_action_history', 'Actions de masse']
    ];

    return keys.map(([key, label]) => {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return `<div>${label} : <span style="color:#9ca3af">vide</span></div>`;
        const val = JSON.parse(raw);
        let count = 0;
        if (Array.isArray(val)) {
          count = val.length;
        } else if (typeof val === 'object') {
          Object.values(val).forEach(v => {
            if (Array.isArray(v)) count += v.length;
            else if (typeof v === 'object' && v !== null) count += Object.keys(v).length;
            else count++;
          });
        }
        return `<div>${label} : <strong style="color:${count > 0 ? 'var(--green-bf)' : '#9ca3af'}">${count}</strong></div>`;
      } catch (e) {
        return `<div>${label} : <span style="color:#dc2626">erreur</span></div>`;
      }
    }).join('');
  },

  exportFullBackup() {
    const data = {};
    const baraKeys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('bara_')) {
        baraKeys.push(k);
        try {
          data[k] = JSON.parse(localStorage.getItem(k));
        } catch (e) {
          data[k] = localStorage.getItem(k);
        }
      }
    }

    const backup = {
      type: 'bara_full_backup',
      version: 'v31',
      createdAt: new Date().toISOString(),
      sourceUrl: location.pathname,
      keysCount: baraKeys.length,
      data: data
    };

    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'bara-SAUVEGARDE-COMPLETE-' + new Date().toISOString().split('T')[0] + '.json';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 100);

    this.toast('✅ Sauvegarde complète téléchargée — Garde-la précieusement !', 'success');
  },

  triggerFullBackupImport() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json,application/json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          this.applyFullBackup(data);
        } catch (err) {
          this.toast('❌ Fichier JSON invalide : ' + err.message, 'danger');
        }
      };
      reader.readAsText(file);
    };
    input.click();
  },

  applyFullBackup(backup) {
    // Validation
    if (!backup) {
      this.toast('❌ Fichier vide', 'danger');
      return;
    }

    // 2 formats acceptés :
    // Format A (V31) : { type:'bara_full_backup', data: {...} }
    // Format B (récupération brute via console) : { data: {...} } ou directement les clés bara_*
    let dataToRestore = null;
    if (backup.type === 'bara_full_backup' && backup.data) {
      dataToRestore = backup.data;
    } else if (backup.data && typeof backup.data === 'object') {
      dataToRestore = backup.data;
    } else {
      // Peut-être que c'est directement le dump des clés
      const baraKeys = Object.keys(backup).filter(k => k.startsWith('bara_'));
      if (baraKeys.length > 0) {
        dataToRestore = {};
        baraKeys.forEach(k => { dataToRestore[k] = backup[k]; });
      }
    }

    if (!dataToRestore || Object.keys(dataToRestore).length === 0) {
      this.toast('❌ Aucune donnée Bara trouvée dans le fichier', 'danger');
      return;
    }

    // Compter ce qu'on va restaurer
    const keys = Object.keys(dataToRestore).filter(k => k.startsWith('bara_'));
    let summary = '';
    keys.forEach(k => {
      const v = dataToRestore[k];
      let n = 0;
      if (Array.isArray(v)) n = v.length;
      else if (typeof v === 'object' && v !== null) {
        Object.values(v).forEach(x => {
          if (Array.isArray(x)) n += x.length;
          else if (typeof x === 'object' && x !== null) n += Object.keys(x).length;
          else n++;
        });
      }
      summary += '  • ' + k.replace('bara_', '') + ' : ' + n + ' items\n';
    });

    if (!confirm(
      '📥 RESTAURATION COMPLÈTE\n\n' +
      'Tu vas RESTAURER les données suivantes :\n\n' +
      summary + '\n' +
      '⚠️ Les données actuelles seront ÉCRASÉES.\n\n' +
      '💡 Conseil : exporte d\'abord une sauvegarde de tes données actuelles si tu veux les garder.\n\n' +
      'Confirmer la restauration ?'
    )) return;

    // Appliquer
    let restoredCount = 0;
    keys.forEach(k => {
      try {
        localStorage.setItem(k, JSON.stringify(dataToRestore[k]));
        restoredCount++;
      } catch (e) {
        console.error('Échec restauration ' + k + ' :', e);
      }
    });

    this.toast('✅ ' + restoredCount + ' clés restaurées — Recharge la page pour voir les changements', 'success');
    setTimeout(() => location.reload(), 1500);
  },

  resetDemoData() {
    if (!confirm('⚠️ Effacer TOUTES les données démo ?\\n\\nCette action est irréversible.')) return;
    localStorage.removeItem('bara_admin_pending_payments');
    localStorage.removeItem('bara_admin_users');
    localStorage.removeItem('bara_forum_topics');

    this.toast('Données démo effacées', 'success');
    this.render();

  },

  search(q) {
    this.state.searchQuery = q;
    // V63.19 : Re-render complet, MAIS on restaure le focus + curseur sur la search-input après
    const activeEl = document.activeElement;
    const wasInSearch = activeEl && activeEl.classList && activeEl.classList.contains('search-input');
    const cursorPos = wasInSearch ? activeEl.selectionStart : null;
    this.render();
    // V63.19 : Restaurer le focus et la position du curseur
    if (wasInSearch) {
      setTimeout(() => {
        const newSearchInput = document.querySelector('.search-input');
        if (newSearchInput) {
          newSearchInput.focus();
          if (cursorPos !== null) {
            try { newSearchInput.setSelectionRange(cursorPos, cursorPos); } catch(e) {}
          }
        }
      }, 0);
    }
  },

  toggleSidebar() {
    this.state.sidebarOpen = !this.state.sidebarOpen;
    this.render();
  },

  escapeHTML(s) {
    return (s || '').replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
  },

  formatPrice(amount) {
    return amount.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
  },

  formatPhone(p) {
    if (!p) return '';
    if (p.startsWith('+226')) {
      const n = p.substring(4);
      return `+226 ${n.substring(0,2)} ${n.substring(2,4)} ${n.substring(4,6)} ${n.substring(6,8)}`;
    }
    return p;
  },

  formatRelativeTime(timestamp) {
    if (!timestamp) return '-';
    const diff = Date.now() - timestamp;
    const min = 60 * 1000, hour = 60 * min, day = 24 * hour;
    if (diff < min) return 'à l\'instant';
    if (diff < hour) return `il y a ${Math.floor(diff / min)} min`;
    if (diff < day) return `il y a ${Math.floor(diff / hour)} h`;
    if (diff < 7 * day) return `il y a ${Math.floor(diff / day)} j`;
    return new Date(timestamp).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
  },

  toast(msg, type = '') {
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  },

  // ============================================
  // INIT
  // ============================================

  init() {
    this.render();

    // V58.2 : Initialiser Firebase au démarrage de l'admin
    if (window.FirebaseAuth) {
      window.FirebaseAuth.init().then(ok => {
        if (ok) {
          console.log('[Admin] Firebase prêt');
          // Re-render pour mettre à jour l'UI (le badge "Firebase non chargé" disparaît)
          this.render();
          // Écouter les changements d'auth pour re-render la page Codes Premium
          window.FirebaseAuth.onAuthChange(() => {
            if (this.state.currentPage === 'codes') this.render();
          });
        } else {
          console.warn('[Admin] Firebase non disponible');
        }
      }).catch(e => {
        console.error('[Admin] Erreur init Firebase :', e);
      });
    }
  }
};

Admin.init();
</script>
