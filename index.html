    const initials = F.getInitials(topic.authorName);
    const color = F.getAvatarColor(topic.authorName);
    const time = F.formatRelativeTime(topic.timestamp);
    const replies = topic.replies || [];

    return `
      <div class="page">
        <header class="header">
          <div class="header-bar">
            <button class="header-back" onclick="App.navigate('forum')">←</button>
            <div class="header-title-row">Discussion</div>
            <div class="header-spacer"></div>
          </div>
        </header>

        <div class="content mt-overlap">
          <div class="topic-detail-card">
            <div class="topic-head">
              <div class="avatar" style="background:${color}">${initials}</div>
              <div class="author-info">
                <div class="author-name">
                  ${topic.authorName}
                  ${topic.authorIsPremium ? '<span class="premium-badge-mini">⭐ PRO</span>' : ''}
                </div>
                <div class="topic-meta">${topic.authorCity ? topic.authorCity + ' • ' : ''}${time}</div>
              </div>
            </div>
            <div class="topic-detail-title">${this.escapeHTML(topic.title)}</div>
            <div class="topic-detail-body">${this.escapeHTML(topic.body)}</div>
            <div class="topic-footer">
              <button class="topic-stat ${this.hasUpvoted(topic.id) ? 'upvoted' : ''}" onclick="App.toggleUpvote('${topic.id}', event)">
                👍 ${topic.upvotes || 0} ${this.hasUpvoted(topic.id) ? '· Voté' : ''}
              </button>
              <div class="topic-stat">💬 ${replies.length}</div>
              <button class="topic-stat" onclick="App.reportTopic('${topic.id}')" style="margin-left:auto; color:var(--ink-mute)">
                🚩 Signaler
              </button>
            </div>
          </div>

          <div class="replies-section">
            <div class="replies-title">${replies.length} réponse${replies.length > 1 ? 's' : ''}</div>

            ${replies.length === 0 ? `
              <div style="background:white; border-radius:var(--radius); padding:1.5rem 1rem; text-align:center; color:var(--ink-mute); font-size:0.85rem; border:1px dashed var(--line)">
                Aucune réponse pour l'instant. Sois le premier à répondre !
              </div>
            ` : replies.map(r => this.renderReply(r)).join('')}
          </div>

          ${u.isLoggedIn ? `
            <div class="reply-input-row">
              <textarea class="reply-input" id="replyInput" placeholder="Écris ta réponse..." rows="1" oninput="App.adjustReplyHeight(this)"></textarea>
              <button class="reply-send" onclick="App.sendReply()" aria-label="Envoyer">📤</button>
            </div>
          ` : `
            <div class="signup-prompt-card" style="margin-top:1rem" onclick="App.navigate(window.FirebaseAuth && window.FirebaseAuth.USE_FIREBASE_AUTH ? 'auth-welcome' : 'auth-phone')">
              <div class="signup-prompt-icon">🔒</div>
              <div class="signup-prompt-title">Connecte-toi pour <span>répondre</span></div>
              <button class="signup-prompt-cta">Créer mon compte →</button>
            </div>
          `}
        </div>
      </div>
    `;
  },

  renderReply(reply) {
    const F = window.ForumService;
    const initials = F.getInitials(reply.authorName);
    const color = F.getAvatarColor(reply.authorName);
    const time = F.formatRelativeTime(reply.timestamp);

    return `
      <div class="reply-card">
        <div class="topic-head" style="margin-bottom:0">
          <div class="avatar" style="background:${color}; width:30px; height:30px; font-size:0.72rem">${initials}</div>
          <div class="author-info">
            <div class="author-name" style="font-size:0.8rem">
              ${reply.authorName}
              ${reply.authorIsPremium ? '<span class="premium-badge-mini">⭐ PRO</span>' : ''}
            </div>
            <div class="topic-meta">${time}</div>

  adjustReplyHeight(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  },

  // V63.21 : Cache local de likes (pour affichage instantané sans aller-retour Firestore)
  hasUpvoted(topicId) {
    // V63.21 : Cache local des likes utilisateur
    const cache = this.state._myLikes || {};
    if (cache[topicId] !== undefined) return cache[topicId];
    // Fallback localStorage (anciens votes locaux)
    const upvotes = JSON.parse(localStorage.getItem('bara_upvotes') || '[]');
    return upvotes.includes(topicId);
  },

  // V63.21 : Récupère le compteur de likes pour un topic depuis le cache Firestore
  getTopicLikesCount(topicId) {
    if (window.ForumFirestore && window.ForumFirestore._topicsCache) {
      const ft = window.ForumFirestore._topicsCache.find(t => t.id === topicId);
      if (ft && ft.likesCount !== undefined) return ft.likesCount;
    }
    // Fallback : valeur dans le topic du state
    const topics = this.state.forumTopics || [];
    const topic = topics.find(t => t.id === topicId);
    return (topic && topic.upvotes) || 0;
  },

  async toggleUpvote(topicId, event) {
    if (event) event.stopPropagation();

    if (!this.state.user.isLoggedIn) {
      this.toast('🔒 Connecte-toi pour voter');
      return;
    }

    // V63.21 : Tentative Firestore
    if (window.ForumFirestore && window.FirebaseAuth && window.FirebaseAuth.isFirebaseReady) {
      // Optimistic UI : on suppose que le vote va réussir et on met à jour l'affichage tout de suite
      if (!this.state._myLikes) this.state._myLikes = {};
      const wasLiked = this.hasUpvoted(topicId);
      this.state._myLikes[topicId] = !wasLiked;
      // Mettre à jour le cache Firestore pour le compteur
      if (window.ForumFirestore._topicsCache) {
        const ft = window.ForumFirestore._topicsCache.find(t => t.id === topicId);
        if (ft) {
          ft.likesCount = Math.max(0, (ft.likesCount || 0) + (wasLiked ? -1 : 1));
        }
      }
      this.render();

      // Envoyer au serveur
      try {
        const result = await window.ForumFirestore.toggleTopicLike(topicId);
        if (!result.success) {
          // Rollback en cas d'erreur
          this.state._myLikes[topicId] = wasLiked;
          if (window.ForumFirestore._topicsCache) {
            const ft = window.ForumFirestore._topicsCache.find(t => t.id === topicId);
            if (ft) ft.likesCount = Math.max(0, (ft.likesCount || 0) + (wasLiked ? 1 : -1));
          }
          this.toast('❌ ' + (result.error || 'Erreur'), 'danger', 3000);
          this.render();
        }
      } catch (e) {
        console.error('[V63.21] toggleUpvote:', e);
        this.state._myLikes[topicId] = wasLiked;
        this.toast('❌ Erreur réseau', 'danger');
        this.render();
      }
      return;
    }

    // Fallback localStorage (Firebase non dispo)
    const upvotes = JSON.parse(localStorage.getItem('bara_upvotes') || '[]');
    const topics = this.getForumTopics();
    const topic = topics.find(t => t.id === topicId);
    if (!topic) return;

    if (upvotes.includes(topicId)) {
      const idx = upvotes.indexOf(topicId);
      upvotes.splice(idx, 1);
      topic.upvotes = Math.max(0, (topic.upvotes || 0) - 1);
    } else {
      upvotes.push(topicId);
      topic.upvotes = (topic.upvotes || 0) + 1;
    }

    localStorage.setItem('bara_upvotes', JSON.stringify(upvotes));
    this.saveForumTopics();
    this.render();
  },

  // V63.21 : Précharger les likes du user pour les topics affichés
  async preloadMyLikes() {
    if (!window.ForumFirestore || !window.FirebaseAuth || !window.FirebaseAuth.isFirebaseReady) return;
    if (!this.state.user.isLoggedIn) return;
    const cache = window.ForumFirestore._topicsCache;
    if (!cache || cache.length === 0) return;
    if (!this.state._myLikes) this.state._myLikes = {};
    // Charger en parallèle (mais limité aux topics actuellement affichés)
    const toCheck = cache.slice(0, 30).filter(t => this.state._myLikes[t.id] === undefined);
    if (toCheck.length === 0) return;
    try {
      await Promise.all(toCheck.map(async t => {
        try {
          this.state._myLikes[t.id] = await window.ForumFirestore.hasUserLikedTopic(t.id);
        } catch(e) {
          this.state._myLikes[t.id] = false;
        }
      }));
      // Re-render si on est sur le forum
      if (['forum', 'forum-topic'].includes(this.state.currentScreen)) {
        this.render();
      }
    } catch(e) {
      console.warn('[V63.21] preloadMyLikes:', e);
    }
  },

  reportTopic(topicId) {
    if (!confirm('Voulez-vous signaler ce sujet pour modération ?')) return;
    const reports = JSON.parse(localStorage.getItem('bara_reports') || '[]');
    if (!reports.includes(topicId)) {
      reports.push(topicId);
      localStorage.setItem('bara_reports', JSON.stringify(reports));
    }
    this.toast('✓ Signalement envoyé. Merci !');
  },

  async sendReply() {
    if (!this.state.user.isLoggedIn) {
      this.toast('Connecte-toi pour répondre');
      return;
    }

    const input = document.getElementById('replyInput');
    if (!input) return;
    const text = input.value.trim();

    const validation = window.ForumService.validateReply(text);
    if (!validation.valid) {
      this.toast(validation.errors[0]);
      return;
    }

    // Anti-spam : limites
    const replyHistory = JSON.parse(localStorage.getItem('bara_reply_history') || '[]');
    if (!window.ForumService.canUserReply(replyHistory)) {
      this.toast('⏳ Trop de réponses récentes. Attends un peu.');
      return;
    }

    // V63.20 : Envoi via Firestore prioritairement
    if (window.ForumFirestore && window.FirebaseAuth && window.FirebaseAuth.isFirebaseReady) {
      // Vider l'input tout de suite pour UX réactive
      const replyText = text;
      input.value = '';
      try {
        const result = await window.ForumFirestore.addReply(this.state.currentTopicId, replyText);
        if (result.success) {
          replyHistory.push({ type: 'reply', timestamp: Date.now() });
          localStorage.setItem('bara_reply_history', JSON.stringify(replyHistory));
          this.toast('✓ Réponse publiée');
          // Le listener temps réel va mettre à jour automatiquement
        } else {
          // Restaurer le texte en cas d'erreur
          input.value = replyText;
          this.toast('❌ ' + (result.error || 'Erreur d\'envoi'), 'danger', 4000);
        }
      } catch (e) {
        console.error('[V63.20] sendReply Firestore exception :', e);
        input.value = replyText;
        this.toast('❌ Erreur réseau', 'danger', 4000);
      }
      return;
    }

    // Fallback localStorage
    const u = this.state.user;
    const topics = this.getForumTopics();
    const topic = topics.find(t => t.id === this.state.currentTopicId);
    if (!topic) return;

    if (!topic.replies) topic.replies = [];
    topic.replies.push({
      id: 'r_' + Date.now(),
      authorName: u.name || 'Anonyme',
      authorIsPremium: window.PremiumService.isUserPremium(u),
      text,
      timestamp: Date.now(),
      upvotes: 0
    });
    topic.replyCount = topic.replies.length;

    replyHistory.push({ type: 'reply', timestamp: Date.now() });
    localStorage.setItem('bara_reply_history', JSON.stringify(replyHistory));

    this.saveForumTopics();
    this.toast('✓ Réponse publiée (mode local)');
    this.render();
  },

  // === CRÉER UN NOUVEAU SUJET ===
  renderForumCreate() {
    const t = this.state.composerTitle || '';
    const b = this.state.composerBody || '';
    const F = window.ForumService;

    return `
      <div class="page">
        <header class="header">
          <div class="header-bar">
            <button class="header-back" onclick="App.cancelCompose()">←</button>
            <div class="header-title-row">Nouveau sujet</div>
            <div class="header-spacer"></div>
          </div>
          <div class="header-h1" style="font-size:1.4rem">Lance la <span>discussion</span></div>
        </header>

        <div class="content mt-overlap">

          <div class="forum-rules">
            <strong>📌 Avant de poster :</strong> Donne un titre clair et précis. Vérifie qu'un sujet similaire n'existe pas déjà. Reste respectueux. Pas de liens externes ni de coordonnées personnelles.
          </div>

            <textarea
              class="composer-textarea"
              id="composerBody"
              placeholder="Décris ta question ou ton expérience en détail. Plus tu donnes de contexte, plus tu auras de réponses utiles..."
              maxlength="${F.MAX_BODY_LENGTH}"
              oninput="App.updateComposerBody(this)">${this.escapeHTML(b)}</textarea>
            <div class="composer-counter ${b.length > F.MAX_BODY_LENGTH * 0.9 ? 'warning' : ''}" id="bodyCounter">${b.length} / ${F.MAX_BODY_LENGTH}</div>

            <button class="btn-primary" onclick="App.publishTopic()" style="width:100%">

            </button>
          </div>

          <div style="text-align:center; font-size:0.75rem; color:var(--ink-mute); padding:0.5rem 1rem">

  updateComposerTitle(el) {
    this.state.composerTitle = el.value;
    const F = window.ForumService;
    const counter = document.getElementById('titleCounter');
    if (counter) {
      counter.textContent = `${el.value.length} / ${F.MAX_TITLE_LENGTH}`;
      counter.className = 'composer-counter' + (el.value.length > F.MAX_TITLE_LENGTH * 0.9 ? ' warning' : '');
    }
  },

  updateComposerBody(el) {
    this.state.composerBody = el.value;
    const F = window.ForumService;
    const counter = document.getElementById('bodyCounter');
    if (counter) {
      counter.textContent = `${el.value.length} / ${F.MAX_BODY_LENGTH}`;
      counter.className = 'composer-counter' + (el.value.length > F.MAX_BODY_LENGTH * 0.9 ? ' warning' : '');
    }
  },

  cancelCompose() {
    if ((this.state.composerTitle || '').trim() || (this.state.composerBody || '').trim()) {
      if (!confirm('Abandonner ce sujet ? Ton texte sera perdu.')) return;
    }
    this.state.composerTitle = '';
    this.state.composerBody = '';
    this.navigate('forum');
  },

  async publishTopic() {
    if (!this.state.user.isLoggedIn) {
      this.toast('🔒 Connecte-toi pour publier');
      return;
    }

    const title = (this.state.composerTitle || '').trim();
    const body = (this.state.composerBody || '').trim();

    const validation = window.ForumService.validatePost(title, body);
    if (!validation.valid) {
      alert('⚠️ ' + validation.errors[0]);
      return;
    }

    // Anti-spam
    const postHistory = JSON.parse(localStorage.getItem('bara_post_history') || '[]');
    if (!window.ForumService.canUserPost(postHistory)) {
      this.toast('⏳ Tu as déjà publié plusieurs sujets cette heure. Attends un peu.');
      return;
    }

    // V63.20 : Tentative de publication via Firestore (prioritaire)
    if (window.ForumFirestore && window.FirebaseAuth && window.FirebaseAuth.isFirebaseReady) {
      this.toast('⏳ Publication...', 'info');
      try {
        const result = await window.ForumFirestore.createTopic(title, body);
        if (result.success) {
          postHistory.push({ type: 'post', timestamp: Date.now() });
          localStorage.setItem('bara_post_history', JSON.stringify(postHistory));
          this.state.composerTitle = '';
          this.state.composerBody = '';
          this.toast('🎉 Sujet publié avec succès !', 'success');
          // Recharger les topics depuis Firestore
          await this.loadForumTopicsFromFirestore();
          // Ouvrir le nouveau topic
          this.openTopic(result.topicId);
          return;
        } else {
          // Erreur Firestore : fallback ou affichage erreur
          console.warn('[V63.20] Publication Firestore échouée :', result.error);
          this.toast('❌ ' + (result.error || 'Erreur de publication'), 'danger', 4000);
          return;
        }
      } catch (e) {
        console.error('[V63.20] Publication Firestore exception :', e);
        this.toast('❌ Erreur réseau. Réessaie.', 'danger', 4000);
        return;
      }
    }

    // Fallback localStorage (Firebase non dispo)
    const u = this.state.user;
    const newTopic = {
      id: 'topic_' + Date.now(),
      authorName: u.name || 'Anonyme',
      authorCity: u.city || '',
      authorIsPremium: window.PremiumService.isUserPremium(u),
      title,
      body,
      timestamp: Date.now(),
      replyCount: 0,
      upvotes: 0,
      replies: []
    };

    const topics = this.getForumTopics();
    topics.unshift(newTopic);
    this.saveForumTopics();

    postHistory.push({ type: 'post', timestamp: Date.now() });
    localStorage.setItem('bara_post_history', JSON.stringify(postHistory));

    this.state.composerTitle = '';
    this.state.composerBody = '';
    this.toast('🎉 Sujet publié (mode local - sans synchro) !');
    this.openTopic(newTopic.id);
  },

  // ============================================
  // === GESTIONNAIRE DE SUJETS ET EXAMENS PAUSE
  // ============================================
  SujetsManager: {
    // Configuration
    QUESTIONS_PAR_SUJET_TRAIN: 25,
    QUESTIONS_PAR_SUJET_EXAM: 50,
    DUREE_EXAM_MINUTES: 60, // 1h pour 50 questions

    // Récupère l'historique des sujets faits pour une matière
    getHistorique(matiereId, mode) {
      try {
        const all = JSON.parse(localStorage.getItem('bara_sujets_historique') || '{}');
        const key = matiereId + '_' + mode;
        return all[key] || [];
      } catch(e) { return []; }
    },

    // Sauvegarde un sujet terminé dans l'historique
    saveSujet(matiereId, mode, sujetData) {
      try {
        const all = JSON.parse(localStorage.getItem('bara_sujets_historique') || '{}');
        const key = matiereId + '_' + mode;
        if (!all[key]) all[key] = [];
        all[key].push(sujetData);
        // Limiter à 50 sujets par matière/mode pour pas surcharger
        if (all[key].length > 50) all[key] = all[key].slice(-50);
        localStorage.setItem('bara_sujets_historique', JSON.stringify(all));
      } catch(e) { console.error('Erreur save sujet:', e); }
    },

    // Calcule le prochain numéro de sujet
    getProchainNumero(matiereId, mode) {
      const historique = this.getHistorique(matiereId, mode);
      return historique.length + 1;
    },

    // Génère les questions pour un nouveau sujet (tirage aléatoire)
    genererQuestions(matiereId, mode) {
      const allQ = (window.QUESTIONS && window.QUESTIONS[matiereId]) ? [...window.QUESTIONS[matiereId]] : [];
      if (allQ.length === 0) return [];

      const cible = mode === 'exam' ? this.QUESTIONS_PAR_SUJET_EXAM : this.QUESTIONS_PAR_SUJET_TRAIN;

      // Mélanger
      for (let i = allQ.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [allQ[i], allQ[j]] = [allQ[j], allQ[i]];
      }

      // Si on a assez de questions, on prend les N premières
      if (allQ.length >= cible) {
        return allQ.slice(0, cible);
      }
      // Sinon, on recycle pour atteindre le nombre cible
      const result = [...allQ];
      while (result.length < cible) {
        for (let i = allQ.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [allQ[i], allQ[j]] = [allQ[j], allQ[i]];
        }
        result.push(...allQ.slice(0, cible - result.length));
      }
      return result.slice(0, cible);
    },

    // === EXAMEN EN PAUSE ===
    savePendingExam(examState) {
      try {
        // On ne sauvegarde que les données essentielles, pas les références circulaires
        const toSave = {
          matiereId: examState.matiereId,
          concoursId: examState.concoursId,
          questions: examState.questions,
          current: examState.current,
          answers: examState.answers,
          score: examState.score,
          timeLeft: examState.timeLeft,
          totalTime: examState.totalTime,
          numero: examState.numero,
          savedAt: Date.now()
        };
        localStorage.setItem('bara_exam_pending', JSON.stringify(toSave));
        return true;
      } catch(e) { return false; }
    },

    loadPendingExam() {
      try {
        const saved = localStorage.getItem('bara_exam_pending');
        if (!saved) return null;
        const data = JSON.parse(saved);
        // Si plus vieux que 7 jours, on l'ignore
        if (Date.now() - data.savedAt > 7 * 24 * 60 * 60 * 1000) {
          this.clearPendingExam();
          return null;
        }
        return data;
      } catch(e) { return null; }
    },

    clearPendingExam() {
      localStorage.removeItem('bara_exam_pending');
    },

    hasPendingExam() {
      return this.loadPendingExam() !== null;
    }
  },

  // ===========================================
  // V47 : GESTIONNAIRE DE SUJETS POUR LES SESSIONS D'ACCOMPAGNEMENT
  // (Inspiré de SujetsManager, adapté au cas des Sessions Premium)
  // ===========================================
  SessionSujetsManager: {
    // Configuration
    QUESTIONS_PAR_SUJET_TRAIN: 25,
    SEUIL_AJOUT_RESTE: 5,  // Si reste ≤ 5 après un sujet de 25, on l'ajoute au sujet précédent

    // Clé localStorage
    STORAGE_KEY: 'bara_session_sujets_historique',

    // Récupérer l'historique pour une session donnée
    getHistorique(sessionId) {
      try {
        const all = JSON.parse(localStorage.getItem(this.STORAGE_KEY) || '{}');
        return all[sessionId] || [];
      } catch(e) { return []; }
    },

    // Sauvegarder un sujet terminé
    saveSujet(sessionId, sujetData) {
      try {
        const all = JSON.parse(localStorage.getItem(this.STORAGE_KEY) || '{}');
        if (!all[sessionId]) all[sessionId] = [];
        all[sessionId].push(sujetData);
        if (all[sessionId].length > 30) all[sessionId] = all[sessionId].slice(-30);
        localStorage.setItem(this.STORAGE_KEY, JSON.stringify(all));
      } catch(e) { console.error('Erreur save session-sujet:', e); }
    },

    // Calcule le prochain numéro
    getProchainNumero(sessionId) {
      return this.getHistorique(sessionId).length + 1;
    },

    // Récupérer un sujet déjà fait par numéro (pour refaire)
    getSujet(sessionId, numero) {
      return this.getHistorique(sessionId).find(s => s.numero === numero);
    },

    // === LOGIQUE CRUCIALE : déterminer la TAILLE du prochain sujet ===
    // Règle Issoufou V47 :
    //   - Si reste >= 25 : nouveau sujet de 25
    //   - Si 5 < reste < 25 : nouveau sujet de taille "reste" (mini-sujet)
    //   - Si reste <= 5 : ajouter au sujet précédent (donc PAS de nouveau sujet possible)
    //   - Si la session totale < 30 Q : 1 seul sujet de toutes les Q
    calculerProchainSujetSize(sessionTotalQ, qDejaVues) {
      const reste = sessionTotalQ - qDejaVues;
      if (reste <= 0) return 0;  // Tout vu

      // Cas spécial : si session totale < 30 et personne n'a encore rien fait → 1 seul sujet
      if (qDejaVues === 0 && sessionTotalQ < (this.QUESTIONS_PAR_SUJET_TRAIN + this.SEUIL_AJOUT_RESTE)) {
        return sessionTotalQ;
      }

      // Sinon : 25 si possible, ou tout le reste si < 25
      return Math.min(this.QUESTIONS_PAR_SUJET_TRAIN, reste);
    },

    // Indique si on doit "ajouter les restes" au sujet courant (au lieu de créer un nouveau)
    // Ex: si on génère un sujet de 25 et qu'il reste 3 Q non vues APRÈS → on ajoute les 3
    shouldMergeRemains(sessionTotalQ, qDejaVuesAvant, tailleSujetCourant) {
      const resteApres = sessionTotalQ - qDejaVuesAvant - tailleSujetCourant;
      return resteApres > 0 && resteApres <= this.SEUIL_AJOUT_RESTE;
    },

    // Calculer quelles questions tirer pour le prochain sujet
    // Anti-doublon : exclut les indices déjà tirés dans les sujets précédents
    genererQuestionsProchainSujet(session) {
      const allQ = session.questions || [];
      if (allQ.length === 0) return { indices: [], questions: [] };

      const historique = this.getHistorique(session.id);

      // Collecter tous les indices déjà tirés
      const dejaTires = new Set();
      historique.forEach(sujet => {
        if (Array.isArray(sujet.indicesQuestions)) {
          sujet.indicesQuestions.forEach(i => dejaTires.add(i));
        }
      });

      const qDejaVues = dejaTires.size;

      // Calculer taille théorique
      let taille = this.calculerProchainSujetSize(allQ.length, qDejaVues);
      if (taille === 0) return { indices: [], questions: [] };

      // Vérifier si on doit fusionner les restes (cas : tirage 25 alors qu'il reste 28 → 25+3)
      if (this.shouldMergeRemains(allQ.length, qDejaVues, taille)) {
        taille = allQ.length - qDejaVues;  // Prend tout le reste
      }

      // Indices disponibles (non encore tirés)
      const disponibles = [];
      for (let i = 0; i < allQ.length; i++) {
        if (!dejaTires.has(i)) disponibles.push(i);
      }

      // Mélanger les indices disponibles
      for (let i = disponibles.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [disponibles[i], disponibles[j]] = [disponibles[j], disponibles[i]];
      }

      // Prendre les N premiers
      const indicesChoisis = disponibles.slice(0, taille);
      const questions = indicesChoisis.map(i => allQ[i]);

      return { indices: indicesChoisis, questions: questions };
    },

    // Indique si toutes les questions de la session ont été vues (= session terminée totalement)
    isSessionTotalementTerminee(session) {
      const allQ = session.questions || [];
      const historique = this.getHistorique(session.id);
      const dejaTires = new Set();
      historique.forEach(sujet => {
        if (Array.isArray(sujet.indicesQuestions)) {
          sujet.indicesQuestions.forEach(i => dejaTires.add(i));
        }
      });
      return dejaTires.size >= allQ.length;
    },

    // Reset l'historique pour une session (pour le "Tout recommencer")
    resetSession(sessionId) {
      try {
        const all = JSON.parse(localStorage.getItem(this.STORAGE_KEY) || '{}');
        delete all[sessionId];
        localStorage.setItem(this.STORAGE_KEY, JSON.stringify(all));
      } catch(e) {}
    },

    // === SAUVEGARDE EN COURS (sujet pas encore terminé) ===
    SAVE_PENDING_KEY: 'bara_session_sujet_pending',

    savePendingSujet(data) {
      try {
        localStorage.setItem(this.SAVE_PENDING_KEY, JSON.stringify({
          ...data,
          savedAt: Date.now()
        }));
      } catch(e) {}
    },

    loadPendingSujet(sessionId) {
      try {
        const saved = localStorage.getItem(this.SAVE_PENDING_KEY);
        if (!saved) return null;
        const data = JSON.parse(saved);
        if (data.sessionId !== sessionId) return null;
        // Plus vieux que 7 jours = ignoré
        if (Date.now() - data.savedAt > 7 * 24 * 60 * 60 * 1000) {
          this.clearPendingSujet();
          return null;
        }
        return data;
      } catch(e) { return null; }
    },

    clearPendingSujet() {
      localStorage.removeItem(this.SAVE_PENDING_KEY);
    }
  },

  // ===========================================
  // GESTIONNAIRE FREEMIUM (limite gratuite quotidienne)
  // ===========================================
  FreemiumManager: {
    // Configuration
    LIMITE_QUOTIDIENNE_GRATUITE: 30, // 30 questions par jour pour les non-Premium
    // V63.11 : Limite spécifique pour les questions d'actualité
    LIMITE_ACTUALITE_GRATUIT: 10,    // 10 questions actualité/jour pour les non-Premium
    // Matières considérées comme "actualité" (la limite s'applique à ces matières)
    MATIERES_ACTUALITE: ['actualite', 'actualite_bf'],

    // Clé localStorage pour le compteur
    STORAGE_KEY: 'bara_freemium_counter',
    STORAGE_KEY_ACTU: 'bara_freemium_counter_actu',  // V63.11

    // Récupérer l'état actuel
    getState() {
      try {
        const data = JSON.parse(localStorage.getItem(this.STORAGE_KEY) || '{}');
        const today = new Date().toISOString().split('T')[0]; // YYYY-MM-DD
        // Si on est un nouveau jour, on reset
        if (data.date !== today) {
          return { date: today, count: 0 };
        }
        return data;
      } catch (e) {
        return { date: new Date().toISOString().split('T')[0], count: 0 };
      }
    },

    // V63.11 : État spécifique actualité
    getActuState() {
      try {
        const data = JSON.parse(localStorage.getItem(this.STORAGE_KEY_ACTU) || '{}');
        const today = new Date().toISOString().split('T')[0];
        if (data.date !== today) {
          return { date: today, count: 0 };
        }
        return data;
      } catch (e) {
        return { date: new Date().toISOString().split('T')[0], count: 0 };
      }
    },

    // Combien de questions répondues aujourd'hui
    getCountToday() {
      return this.getState().count;
    },

    // V63.11 : Combien de questions actualité répondues aujourd'hui
    getActuCountToday() {
      return this.getActuState().count;
    },

    // Combien il en reste aujourd'hui
    getRemaining() {
      return Math.max(0, this.LIMITE_QUOTIDIENNE_GRATUITE - this.getCountToday());
    },

    // V63.11 : Combien de questions actualité restantes aujourd'hui
    getActuRemaining() {
      return Math.max(0, this.LIMITE_ACTUALITE_GRATUIT - this.getActuCountToday());
    },

    // V63.11 : Une matière est-elle considérée comme "actualité" ?
    isActualiteMatiere(matiere) {
      if (!matiere) return false;
      return this.MATIERES_ACTUALITE.includes(matiere);
    },

    // L'utilisateur a-t-il atteint la limite ?
    hasReachedLimit(user) {
      // Premium = pas de limite
      if (window.PremiumService && window.PremiumService.isUserPremium(user)) {
        return false;
      }
      return this.getCountToday() >= this.LIMITE_QUOTIDIENNE_GRATUITE;
    },

    // V63.11 : L'utilisateur a-t-il atteint la limite actualité ?
    hasReachedActuLimit(user) {
      if (window.PremiumService && window.PremiumService.isUserPremium(user)) {
        return false;
      }
      return this.getActuCountToday() >= this.LIMITE_ACTUALITE_GRATUIT;
    },

    // V63.11 : Vérifier la limite pour une matière spécifique (générale OU actualité)
    canAnswerMatiere(user, matiere) {
      if (window.PremiumService && window.PremiumService.isUserPremium(user)) {
        return { allowed: true };
      }
      if (this.isActualiteMatiere(matiere) && this.hasReachedActuLimit(user)) {
        return {
          allowed: false,
          reason: 'actualite_limit',
          message: `Tu as atteint la limite de ${this.LIMITE_ACTUALITE_GRATUIT} questions Actualité par jour. Reviens demain ou passe Premium pour un accès illimité.`
        };
      }
      if (this.hasReachedLimit(user)) {
        return {
          allowed: false,
          reason: 'general_limit',
          message: `Tu as atteint la limite de ${this.LIMITE_QUOTIDIENNE_GRATUITE} questions par jour.`
        };
      }
      return { allowed: true };
    },

    // Incrémenter le compteur (1 question répondue)
    incrementCount(user, matiere) {
      // Premium = on ne compte pas
      if (window.PremiumService && window.PremiumService.isUserPremium(user)) {
        return;
      }
      const state = this.getState();
      state.count++;
      localStorage.setItem(this.STORAGE_KEY, JSON.stringify(state));

      // V63.11 : Incrémenter aussi le compteur actualité si la matière en est
      if (matiere && this.isActualiteMatiere(matiere)) {
        const actuState = this.getActuState();
        actuState.count++;
        localStorage.setItem(this.STORAGE_KEY_ACTU, JSON.stringify(actuState));
      }
    },

    // Réinitialiser (debug/admin)
    reset() {
      localStorage.removeItem(this.STORAGE_KEY);
    }
  },

  // === Charger les modifications du tableau d'admin ===
  loadAdminCustomizations() {
    try {
      // V63.4 : Injecter "actualite" comme matière de tous les concours
      // (commune à tous les concours, gérée par Bara Formation)
      if (window.CONCOURS && Array.isArray(window.CONCOURS)) {
        window.CONCOURS.forEach(c => {
          if (!c.matieres) c.matieres = [];
          if (!c.matieres.includes('actualite')) {
            c.matieres.push('actualite');
          }
        });
      }

      // 0. Charger les annales personnalisées
      if (window.AnnalesHelper && window.AnnalesHelper.loadCustomAnnales) {
        window.AnnalesHelper.loadCustomAnnales();
      }

      // 1. Modifications des matières (renommage, icônes, etc.)
      const editedMatieres = JSON.parse(localStorage.getItem('bara_edited_matieres') || '{}');
      Object.keys(editedMatieres).forEach(id => {
        if (window.MATIERES_CATALOG[id]) {
          Object.assign(window.MATIERES_CATALOG[id], editedMatieres[id]);
        }
      });

      // 2. Questions ajoutées par l'admin
      const customQ = JSON.parse(localStorage.getItem('bara_custom_questions') || '{}');

      // 3. Questions supprimées par l'admin
      const deleted = JSON.parse(localStorage.getItem('bara_deleted_questions') || '{}');

      // 4. Questions modifiées par l'admin
      const edited = JSON.parse(localStorage.getItem('bara_edited_questions') || '{}');

      // Pour chaque matière, reconstruire la liste finale
      Object.keys(window.MATIERES_CATALOG).forEach(matiereId => {
        const defaultQ = (window.QUESTIONS && window.QUESTIONS[matiereId]) ? [...window.QUESTIONS[matiereId]] : [];
        const customMQ = customQ[matiereId] || [];
        const deletedKeys = new Set(deleted[matiereId] || []);
        const editedMap = edited[matiereId] || {};

        // Filtrer les questions par défaut supprimées + appliquer les éditions
        const filteredDefault = defaultQ
          .map((q, idx) => {
            const key = 'default_' + idx;
            if (deletedKeys.has(key)) return null;
            return editedMap[key] || q;
          })
          .filter(q => q !== null);

        // Filtrer les questions custom supprimées
        const filteredCustom = customMQ
          .map((q, idx) => {
            const key = 'custom_' + idx;
            if (deletedKeys.has(key)) return null;
            return editedMap[key] || q;
          })
          .filter(q => q !== null);

        // Reconstituer
        if (window.QUESTIONS) {
          window.QUESTIONS[matiereId] = [...filteredDefault, ...filteredCustom];
        }
      });

      console.log('[App] Modifications admin chargées');
    } catch (e) {
      console.error('[App] Erreur chargement admin :', e);
    }
  },

  // === INIT ===
  async init() {
    // Charger les modifications faites dans le tableau d'admin
    this.loadAdminCustomizations();

    this.load();
    this.render();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then(reg => console.log('[SW] Enregistré', reg.scope))
          .catch(err => console.error('[SW] Erreur', err));
      });
    }

    // V63 : Mise à jour automatique du compte à rebours d'examen hebdo
    // Re-render toutes les 60 secondes si l'utilisateur est sur Home ou page weekly-exam
    setInterval(() => {
      if (['home', 'weekly-exam'].includes(this.state.currentScreen)) {
        this.render();
      }
    }, 60000);

    // V63 : Si l'utilisateur a déjà autorisé les notifications, planifier les rappels
    if ('Notification' in window && Notification.permission === 'granted') {
      this.scheduleExamReminders();
    }

    if (window.FirebaseAuth) {
      window.FirebaseAuth.init().then(async (ok) => {
        if (!ok) {
          console.log('[App] Mode local (Firebase non configuré)');
          return;
        }
        console.log('[App] Firebase prêt');

        // V57 : Si l'utilisateur a déjà une session Firebase active, le reconnecter automatiquement
        // S'abonner aux changements d'auth pour restaurer la session
        if (window.FirebaseAuth.USE_FIREBASE_AUTH) {
          window.FirebaseAuth.onAuthChange((user, profile) => {
            if (user && profile && !this.state.user.isLoggedIn) {
              // Session Firebase active mais utilisateur local pas connecté → restaurer
              console.log('[App] Restauration session Firebase pour', user.email);
              this.state.user = {
                ...this.state.user,
                isLoggedIn: true,
                uid: user.uid,
                email: user.email || '',
                firstName: profile.displayName ? profile.displayName.split(' ')[0] : (this.state.user.firstName || ''),
                lastName: profile.displayName ? profile.displayName.split(' ').slice(1).join(' ') : (this.state.user.lastName || ''),
                phoneNumber: profile.phoneNumber || '',
                ville: profile.region || '',
                photoURL: profile.photoURL || '',
                authProvider: profile.authProvider || 'email',
                isPremium: profile.isPremium || false,
                premiumPlan: profile.premiumPlan || null,
                premiumExpiresAt: profile.premiumExpiresAt || null,
                premiumActivatedAt: profile.premiumActivatedAt || null
              };
              this.save();
              // Si on est sur le splash, aller à home
              if (this.state.currentScreen === 'splash' || this.state.currentScreen === 'auth-welcome') {
                this.navigate('home');
              }
            }
          });
        }
      });
    }

    if (window.Notifications) {
      Notifications.init().then(() => {
        console.log('[App] Notifications initialisées :', Notifications.getStatus().label);
      });
    }

    let lastTouch = 0;
    document.addEventListener('touchend', (e) => {
      const now = Date.now();
      if (now - lastTouch < 300) e.preventDefault();
      lastTouch = now;
    }, { passive: false });

    // === GESTION DU BOUTON RETOUR ANDROID ===
    // On pousse un état initial pour pouvoir intercepter le bouton retour
    history.pushState({ page: 'init' }, '', '');

    window.addEventListener('popstate', (e) => {
      // Si on est sur l'écran d'accueil (home) ou splash → demander confirmation pour quitter
      const screen = this.state.currentScreen;
      const screensAccueil = ['home', 'splash'];

      if (screensAccueil.includes(screen)) {
        // Empêcher la sortie immédiate, demander confirmation
        this.confirmExit();
      } else if (screen === 'qcm' && this.state.currentMode === 'exam') {
        // Pendant un examen, demander confirmation spéciale
        history.pushState({ page: 'app' }, '', ''); // empêcher la sortie
        if (confirm('⚠️ Tu es en plein examen !\n\nVeux-tu vraiment quitter ?\nTon progrès sera sauvegardé.')) {
          this.pauseExam();
        }
      } else {
        // Sur les autres écrans : remettre l'état et naviguer vers l'écran précédent
        history.pushState({ page: 'app' }, '', '');
        this.handleBackNavigation();
      }
    });
  },

  // Confirmation de sortie de l'app (V35 : dialog personnalisé robuste)
  confirmExit() {
    // Remettre l'état pour empêcher la sortie immédiate
    history.pushState({ page: 'app' }, '', '');

    // Éviter d'afficher 2 dialogs en même temps
    if (this.state.showExitConfirm) return;
    this.state.showExitConfirm = true;
    this.render();
  },

  // V58.1 : Action quand l'utilisateur confirme qu'il veut quitter
  doExit() {
    // Toujours fermer le dialogue d'abord (pour ne pas rester bloqué)
    this.state.showExitConfirm = false;
    this.save();

    // V63.9 : Détection robuste de l'environnement
    const isCordova = !!(window.navigator && window.navigator.app && window.navigator.app.exitApp);
    const displayMode = window.matchMedia('(display-mode: standalone)').matches
                     || window.matchMedia('(display-mode: fullscreen)').matches
                     || window.matchMedia('(display-mode: minimal-ui)').matches;
    // Sur Safari iOS : navigator.standalone === true si app installée
    const isIOSStandalone = window.navigator.standalone === true;
    const isPWAInstalled = displayMode || isIOSStandalone;

    // 1) Cordova / TWA wrappée : on peut vraiment fermer
    if (isCordova) {
      try {
        window.navigator.app.exitApp();
        return;
      } catch(e) {
        console.warn('Cordova exitApp a échoué :', e);
      }
    }

    // 2) PWA installée (Add to Home Screen) : tentative window.close + history.back
    if (isPWAInstalled) {
      this.render();
      // Marquer l'intention de fermeture (au cas où la fenêtre se rouvre)
      try {
        window.close();
      } catch(e) {}
      // Si window.close n'a pas marché (la plupart des cas), montrer un message
      setTimeout(() => {
        // Si on est toujours là après 200ms, c'est que rien ne s'est fermé
        this.toast('💡 Appuie sur le bouton ACCUEIL de ton téléphone pour quitter complètement.', 'info', 5000);
      }, 200);
      return;
    }

    // 3) Mode navigateur web classique : impossible de fermer l'onglet via JS
    //    Mais on peut au moins ouvrir une page neutre (about:blank) pour signaler le départ
    this.render();
    setTimeout(() => {
      this.toast('💡 Pour quitter, ferme cet onglet avec le × ou installe l\'app sur ton écran d\'accueil.', 'info', 5000);
    }, 100);
  },

  // V35 : Action quand l'utilisateur annule la sortie
  cancelExit() {
    this.state.showExitConfirm = false;
    this.render();
  },

  // V35 : Rendu du dialog de confirmation de sortie (au-dessus de tout)
  renderExitDialog() {
    if (!this.state.showExitConfirm) return '';
    // V63.9 : Détection robuste de l'environnement (alignée avec doExit)
    const isCordova = !!(window.navigator && window.navigator.app && window.navigator.app.exitApp);
    const displayMode = window.matchMedia('(display-mode: standalone)').matches
                     || window.matchMedia('(display-mode: fullscreen)').matches
                     || window.matchMedia('(display-mode: minimal-ui)').matches;
    const isIOSStandalone = window.navigator.standalone === true;
    const isPWAInstalled = displayMode || isIOSStandalone;
    const isWebBrowser = !isCordova && !isPWAInstalled;

    // Label & message adaptés selon contexte
    let message, exitLabel;
    if (isCordova) {
      message = 'Tu peux toujours revenir t\'entraîner plus tard. Tes données restent sauvegardées.';
      exitLabel = 'Quitter';
    } else if (isPWAInstalled) {
      message = 'Tes données restent sauvegardées. Pour quitter complètement, utilise le bouton ACCUEIL de ton téléphone.';
      exitLabel = '🏠 OK, je vais à l\'accueil';
    } else {
      // Mode navigateur web (cas le plus courant chez Issoufou)
      message = '💡 Astuce : installe Bara Concours sur ton écran d\'accueil pour une vraie expérience d\'app. Pour quitter maintenant, ferme cet onglet avec le ×.';
      exitLabel = '✅ J\'ai compris';
    }

    return `
      <div style="position:fixed; inset:0; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; z-index:9999; padding:1.5rem; animation:fadeIn 0.2s">
        <div style="background:white; border-radius:20px; padding:1.8rem 1.5rem; max-width:340px; width:100%; box-shadow:0 20px 60px rgba(0,0,0,0.3); text-align:center">
          <div style="font-size:3.5rem; margin-bottom:0.5rem">🚪</div>
          <h3 style="font-family:'Instrument Serif',serif; font-size:1.5rem; color:var(--green-bf); margin-bottom:0.6rem">Quitter Bara Concours ?</h3>
          <p style="color:var(--ink-soft); font-size:0.92rem; line-height:1.5; margin-bottom:1.5rem">
            ${message}
          </p>
          <div style="display:flex; flex-direction:column; gap:0.6rem">
            <button onclick="App.cancelExit()" style="background:var(--green-bf); color:white; border:none; padding:0.9rem; border-radius:12px; font-weight:700; font-size:0.95rem; cursor:pointer; width:100%">
              👍 Rester dans l'app
            </button>
            <button onclick="App.doExit()" style="background:transparent; color:var(--ink-mute); border:1.5px solid var(--line); padding:0.85rem; border-radius:12px; font-weight:600; font-size:0.9rem; cursor:pointer; width:100%">
              ${exitLabel}
            </button>
          </div>
        </div>
      </div>
    `;
  },

  // Navigation arrière intelligente selon l'écran
  handleBackNavigation() {
    const screen = this.state.currentScreen;

    // Carte de retour : depuis chaque écran, où va-t-on ?
    const retourMap = {
      'concours-detail': 'home',
      'mode-select': 'concours-detail',
      'qcm': 'mode-select',
      'results': 'mode-select',
      'session-2026': 'home',
      'session-jour-detail': 'session-2026',
      'forum-create': 'forum',
      'forum-detail': 'forum',
      'premium': 'profile',
      'edit-profile': 'profile',
      'auth-otp': 'auth-phone',
      'onboarding': 'home',
      'annales-list': 'home',
      'annale-detail': 'annales-list'
    };

    const target = retourMap[screen] || 'home';
    this.navigate(target);
  }
};

App.init();
</script>

</body>
</html>
