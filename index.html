  // Carte d'un sujet déjà fait dans l'historique
  renderSujetHistorique(sujet, mode) {
    const pct = Math.round((sujet.score / sujet.total) * 100);
    const date = new Date(sujet.date).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
    const scoreClass = pct >= 70 ? 'good' : pct >= 50 ? 'mid' : 'low';

    // V49 FIX : Stocker le sujet dans un cache et passer juste un index
    // (sinon les apostrophes dans les questions cassent l'onclick HTML)
    if (!this._sujetRefaireCache) this._sujetRefaireCache = [];
    const cacheIdx = this._sujetRefaireCache.length;
    this._sujetRefaireCache.push({ numero: sujet.numero, questions: sujet.questions, mode });

    return `
      <div class="sujet-history-card">
        <div class="sujet-history-num">N°${sujet.numero}</div>
        <div class="sujet-history-content">
          <div class="sujet-history-title">Sujet ${sujet.numero}</div>
          <div class="sujet-history-meta">${date} • ${this.formatDuration(sujet.duration)}</div>
        </div>
        <div class="sujet-history-score ${scoreClass}">
          <div class="sujet-history-score-pct">${pct}%</div>
          <div class="sujet-history-score-frac">${sujet.score}/${sujet.total}</div>
        </div>
        <button class="sujet-history-refaire" onclick="App.refaireSujet(${cacheIdx})" title="Refaire ce sujet">🔁</button>
      </div>
    `;
  },

  // V49 FIX : Refaire un sujet — lit depuis le cache pour éviter les bugs d'échappement HTML
  refaireSujet(cacheIdx) {
    if (typeof cacheIdx === 'number') {
      // Nouveau format (V49) : index dans le cache
      const data = this._sujetRefaireCache && this._sujetRefaireCache[cacheIdx];
      if (!data || !data.questions) {
        this.toast('❌ Impossible de retrouver ce sujet', 'danger');
        return;
      }
      this.startQCM(data.mode, { numero: data.numero, questions: data.questions });
    } else if (cacheIdx && cacheIdx.questions) {
      // Ancien format (compatibilité) : objet direct
      this.startQCM(cacheIdx.mode, { numero: cacheIdx.numero, questions: cacheIdx.questions });
    }
  },

  formatDuration(seconds) {
    if (!seconds) return '0s';
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    if (m === 0) return s + 's';
    if (m < 60) return m + 'min ' + (s > 0 ? s + 's' : '');
    const h = Math.floor(m / 60);
    return h + 'h ' + (m % 60) + 'min';
  },

  // === QCM ===
  startQCM(mode, refaireSujet = null) {
    const isPremium = window.PremiumService && window.PremiumService.isUserPremium(this.state.user);

    if (mode === 'exam' && !isPremium) {
      this.toast('🔒 Le mode examen est réservé aux membres Premium');
      setTimeout(() => this.navigate('premium'), 800);
      return;
    }

    const matId = this.state.currentMatiere;
    const allQ = (QUESTIONS && QUESTIONS[matId]) || [];
    if (allQ.length === 0) {
      this.toast('Aucune question disponible pour cette matière');
      return;
    }

    const cibleNb = mode === 'exam' ? this.SujetsManager.QUESTIONS_PAR_SUJET_EXAM : this.SujetsManager.QUESTIONS_PAR_SUJET_TRAIN;
    const dureeMinutes = this.SujetsManager.DUREE_EXAM_MINUTES;

    let questions, numero;

    if (refaireSujet && refaireSujet.questions) {
      // On refait un sujet déjà fait → mêmes questions
      questions = [...refaireSujet.questions];
      numero = refaireSujet.numero;
      this.toast(`🔁 Refaire le Sujet ${numero}`);
    } else {
      // Nouveau sujet → tirage aléatoire
      questions = this.SujetsManager.genererQuestions(matId, mode);
      numero = this.SujetsManager.getProchainNumero(matId, mode);
    }

    this.state.currentMode = mode;
    this.state.currentSujet = numero;
    this.state.qcm = {
      questions,
      current: 0,
      answers: new Array(questions.length).fill(null),
      score: 0,
      startTime: Date.now(),
      timeLimit: mode === 'exam' ? dureeMinutes * 60 : 0,
      timeLeft: mode === 'exam' ? dureeMinutes * 60 : 0,
      timerInterval: null,
      numero: numero,
      matiereId: matId,
      concoursId: this.state.currentConcours,
      isResumed: false
    };

    this.navigate('qcm');

    if (mode === 'exam') {
      this.startExamTimer();
      // Sauvegarder dès le début pour permettre la reprise
      this.savePendingExam();
    }
  },

  // Démarrer/redémarrer le timer d'examen
  startExamTimer() {
    if (this.state.qcm.timerInterval) clearInterval(this.state.qcm.timerInterval);
    this.state.qcm.timerInterval = setInterval(() => {
      this.state.qcm.timeLeft--;
      if (this.state.qcm.timeLeft <= 0) {
        clearInterval(this.state.qcm.timerInterval);
        this.SujetsManager.clearPendingExam();
        this.endQCM();
        return;
      }
      this.updateTimer();
      // Sauvegarder toutes les 5 secondes pendant l'examen
      if (this.state.qcm.timeLeft % 5 === 0) {
        this.savePendingExam();
      }
    }, 1000);
  },

  // Sauvegarder l'examen en cours
  savePendingExam() {
    if (this.state.currentMode !== 'exam') return;
    this.SujetsManager.savePendingExam({
      matiereId: this.state.qcm.matiereId,
      concoursId: this.state.qcm.concoursId,
      questions: this.state.qcm.questions,
      current: this.state.qcm.current,
      answers: this.state.qcm.answers,
      score: this.state.qcm.score,
      timeLeft: this.state.qcm.timeLeft,
      totalTime: this.state.qcm.timeLimit,
      numero: this.state.qcm.numero
    });
  },

  // Mettre l'examen en pause manuellement
  pauseExam() {
    if (this.state.currentMode !== 'exam') return;
    if (this.state.qcm.timerInterval) clearInterval(this.state.qcm.timerInterval);
    this.savePendingExam();
    this.toast('⏸ Examen mis en pause. Tu peux reprendre plus tard.', 'success');
    setTimeout(() => this.navigate('home'), 800);
  },

  // Reprendre un examen en pause
  resumePendingExam() {
    const pending = this.SujetsManager.loadPendingExam();
    if (!pending) {
      this.toast('Aucun examen en pause');
      return;
    }

    // Trouver le concours et la matière
    this.state.currentConcours = pending.concoursId;
    this.state.currentMatiere = pending.matiereId;
    this.state.currentMode = 'exam';
    this.state.currentSujet = pending.numero;
    this.state.showResumeDialog = false;

    this.state.qcm = {
      questions: pending.questions,
      current: pending.current,
      answers: pending.answers,
      score: pending.score,
      startTime: Date.now(),
      timeLimit: pending.totalTime,
      timeLeft: pending.timeLeft,
      timerInterval: null,
      numero: pending.numero,
      matiereId: pending.matiereId,
      concoursId: pending.concoursId,
      isResumed: true
    };

    this.navigate('qcm');
    this.startExamTimer();

    const minutes = Math.floor(pending.timeLeft / 60);
    const secondes = pending.timeLeft % 60;
    this.toast(`▶️ Examen repris à la Q${pending.current + 1} • ${minutes}:${String(secondes).padStart(2, '0')} restantes`, 'success');
  },

  // Annuler l'examen en pause
  cancelPendingExam() {
    if (!confirm('Annuler l\'examen en pause ? Cette action est irréversible.')) return;
    this.SujetsManager.clearPendingExam();
    this.state.showResumeDialog = false;
    this.render();
    this.toast('🗑 Examen annulé');
  },

  renderQCM() {
    const q = this.state.qcm.questions[this.state.qcm.current];
    if (!q) return this.renderResults();

    const m = MATIERES_CATALOG[this.state.currentMatiere] || { icone: "📚", nom: this.state.currentMatiere || "Questions", couleur: "#0f5132" };
    const isExam = this.state.currentMode === 'exam';
    const answer = this.state.qcm.answers[this.state.qcm.current];
    const answered = answer !== null;
    const progress = ((this.state.qcm.current + 1) / this.state.qcm.questions.length) * 100;
    const letters = ['A','B','C','D'];

    return `
      <div class="page qcm-container">
        <div class="qcm-topbar">
          <button class="qcm-quit" onclick="App.confirmQuitQCM()">✕</button>
          <div class="qcm-progress-wrap">
            <div class="qcm-progress-fill" style="width:${progress}%"></div>
          </div>
          ${isExam ? `
            <button class="qcm-pause" onclick="App.pauseExam()" title="Mettre en pause">⏸</button>
            <div class="qcm-timer" id="timer">⏱ ${this.formatTime(this.state.qcm.timeLeft)}</div>
          ` : ''}
        </div>

        <div class="qcm-meta-row">
          <div class="qcm-num">${m.icone} ${m.nom} ${this.state.qcm.numero ? `• Sujet ${this.state.qcm.numero}` : ''} • Q${this.state.qcm.current + 1}/${this.state.qcm.questions.length}</div>
          <div class="qcm-score-mini">${this.state.qcm.score} bonnes</div>
        </div>

        <div class="qcm-card">
          <div class="qcm-question">${q.q}</div>
          <div class="qcm-options">
            ${q.o.map((opt, i) => {
              let cls = 'qcm-option';
              if (answered && !isExam) {
                cls += ' locked';
                if (i === q.r) cls += ' correct';
                else if (i === answer && answer !== q.r) cls += ' wrong';
              } else if (isExam && answer === i) {
                // Mode examen : marquer la sélection (même si on peut encore changer)
                cls += ' selected';
              }
              return `
                <button class="${cls}" onclick="App.pickAnswer(${i})">
                  <div class="qcm-option-letter">${letters[i]}</div>
                  <span>${opt}</span>
                </button>
              `;
            }).join('')}
          </div>

          ${(answered && !isExam) ? `
            <div class="qcm-explication show">
              <strong>📌 Explication :</strong> ${q.x}
            </div>
          ` : ''}
        </div>

        <div class="qcm-actions">
          ${!isExam && this.state.qcm.current > 0 ? `<button type="button" class="btn-prev" onclick="event.preventDefault(); App.prevQuestion(); return false;">← Précédent</button>` : ''}
          <button type="button" class="btn-next" onclick="event.preventDefault(); App.nextQuestion(); return false;" ${(!answered && !isExam) || (isExam && !answered) ? 'disabled' : ''}>
            ${this.state.qcm.current === this.state.qcm.questions.length - 1 ? 'Terminer 🏁' : 'Suivant →'}
          </button>
        </div>
      </div>
    `;
  },

  pickAnswer(i) {
    const isExam = this.state.currentMode === 'exam';
    const cur = this.state.qcm.current;
    const q = this.state.qcm.questions[cur];

    // En mode entraînement : verrouillé après réponse
    if (!isExam && this.state.qcm.answers[cur] !== null) return;

    // === FREEMIUM : Vérifier la limite quotidienne ===
    const isPremium = window.PremiumService && window.PremiumService.isUserPremium(this.state.user);
    if (!isPremium && this.state.qcm.answers[cur] === null) {
      // V63.11 : Vérifier la limite spécifique à la matière (général + actualité)
      const currentMatiere = this.state.qcm.matiereId || this.state.currentMatiere;
      const check = this.FreemiumManager.canAnswerMatiere(this.state.user, currentMatiere);
      if (!check.allowed) {
        // Limite atteinte → bloquer et proposer Premium
        if (check.reason === 'actualite_limit') {
          this.showActualiteLimitDialog();
        } else {
          this.showFreemiumLimitDialog();
        }
        return;
      }
    }

    // Récup ancien score si on change de réponse en mode examen
    const previousAnswer = this.state.qcm.answers[cur];
    if (isExam && previousAnswer !== null && previousAnswer === q.r) {
      this.state.qcm.score--;
    }

    // V63.11 : Incrémenter le compteur freemium (+ actualité si concerné) seulement à la 1ère réponse
    if (this.state.qcm.answers[cur] === null) {
      const currentMatiere = this.state.qcm.matiereId || this.state.currentMatiere;
      this.FreemiumManager.incrementCount(this.state.user, currentMatiere);
    }

    this.state.qcm.answers[cur] = i;
    if (i === q.r) {
      if (!isExam || previousAnswer !== q.r) this.state.qcm.score++;
    }

    // Sauvegarde automatique en mode examen à chaque réponse
    if (isExam) this.savePendingExam();

    this.render();
  },

  // Afficher le dialogue de limite freemium atteinte
  showFreemiumLimitDialog() {
    this.state.showFreemiumDialog = true;
    this.render();
  },

  closeFreemiumDialog() {
    this.state.showFreemiumDialog = false;
    this.render();
  },

  // V63.11 : Dialog spécifique limite actualité
  showActualiteLimitDialog() {
    this.state.showActualiteLimitDialog = true;
    this.render();
  },

  closeActualiteLimitDialog() {
    this.state.showActualiteLimitDialog = false;
    this.render();
  },

  goToPremiumFromActu() {
    this.state.showActualiteLimitDialog = false;
    this.navigate('premium');
  },

  goToPremium() {
    this.state.showFreemiumDialog = false;
    this.navigate('premium');
  },

  nextQuestion() {
    try {
      if (this.state.qcm.current < this.state.qcm.questions.length - 1) {
        this.state.qcm.current++;
        // Sauvegarde auto en mode examen à chaque changement de question
        if (this.state.currentMode === 'exam') {
          try { this.savePendingExam(); } catch(e) { console.warn('[nextQuestion] savePending:', e); }
        }
        this.render();
      } else {
        this.endQCM();
      }
    } catch(e) {
      console.error('[nextQuestion] Erreur :', e);
      // Si on est à la dernière question et qu'on plante, on force la fin du QCM
      if (this.state.qcm && this.state.qcm.current === this.state.qcm.questions.length - 1) {
        try { this.navigate('results'); } catch(e2) {}
      }
    }
  },

  prevQuestion() {
    if (this.state.qcm.current > 0) {
      this.state.qcm.current--;
      this.render();
    }
  },

  updateTimer() {
    const t = document.getElementById('timer');
    if (!t) return;
    t.textContent = `⏱ ${this.formatTime(this.state.qcm.timeLeft)}`;
    if (this.state.qcm.timeLeft <= 60) t.className = 'qcm-timer danger';
    else if (this.state.qcm.timeLeft <= 300) t.className = 'qcm-timer warning';
  },

  confirmQuitQCM() {
    if (confirm('Voulez-vous vraiment quitter ? Votre progression sera perdue.')) {
      if (this.state.qcm.timerInterval) clearInterval(this.state.qcm.timerInterval);
      this.navigate('concours-detail');
    }
  },

  endQCM() {
    // V63.16 : Sécurisation complète — On NAVIGUE toujours vers results, même si erreur dans les sauvegardes
    console.log('[endQCM] Démarrage finalisation QCM');
    try {
      if (this.state.qcm.timerInterval) clearInterval(this.state.qcm.timerInterval);
    } catch(e) { console.warn('[endQCM] timer:', e); }

    const duration = Math.round((Date.now() - this.state.qcm.startTime) / 1000);

    // Effacer l'examen en pause (puisque finalisé)
    try {
      if (this.state.currentMode === 'exam' && this.SujetsManager) {
        this.SujetsManager.clearPendingExam();
      }
    } catch(e) { console.warn('[endQCM] clearPending:', e); }

    // Sauvegarder le sujet dans l'historique des sujets numérotés
    try {
      if (this.state.qcm.numero && !this.state.qcm.isRefait && this.SujetsManager) {
        this.SujetsManager.saveSujet(
          this.state.qcm.matiereId || this.state.currentMatiere,
          this.state.currentMode,
          {
            numero: this.state.qcm.numero,
            date: Date.now(),
            score: this.state.qcm.score,
            total: this.state.qcm.questions.length,
            duration,
            concoursId: this.state.qcm.concoursId || (this.state.currentConcours && this.state.currentConcours.id),
            questions: this.state.qcm.questions,
            answers: this.state.qcm.answers
          }
        );
      }
    } catch(e) { console.warn('[endQCM] saveSujet:', e); }

    // Sauvegarder dans l'historique général
    try {
      this.state.history.push({
        date: Date.now(),
        concoursId: this.state.currentConcours ? this.state.currentConcours.id : null,
        matiereId: this.state.currentMatiere,
        mode: this.state.currentMode,
        score: this.state.qcm.score,
        total: this.state.qcm.questions.length,
        duration,
        sujetNumero: this.state.qcm.numero || null
      });
    } catch(e) { console.warn('[endQCM] history:', e); }

    // Mettre à jour les stats par matière
    try {
      const matId = this.state.currentMatiere;
      if (matId) {
        if (!this.state.matiereStats[matId]) {
          this.state.matiereStats[matId] = { attempts: 0, totalScore: 0, totalQuestions: 0 };
        }
        this.state.matiereStats[matId].attempts++;
        this.state.matiereStats[matId].totalScore += this.state.qcm.score;
        this.state.matiereStats[matId].totalQuestions += this.state.qcm.questions.length;
      }
    } catch(e) { console.warn('[endQCM] stats:', e); }

    // Sauvegarder dans localStorage
    try { this.save(); } catch(e) { console.warn('[endQCM] save:', e); }

    // Synchro Firebase (async, ne doit pas bloquer la navigation)
    try {
      if (window.FirebaseAuth && window.FirebaseAuth.isFirebaseReady && window.FirebaseAuth.isLoggedIn()) {
        window.FirebaseAuth.saveQCMResult({
          date: Date.now(),
          concoursId: this.state.currentConcours ? this.state.currentConcours.id : null,
          matiereId: this.state.currentMatiere,
          mode: this.state.currentMode,
          score: this.state.qcm.score,
          total: this.state.qcm.questions.length,
          duration,
          sujetNumero: this.state.qcm.numero || null
        }).catch(e => console.error('[endQCM] Firebase sync:', e));
      }
    } catch(e) { console.warn('[endQCM] firebase block:', e); }

    // GARANTI : Navigation vers résultats même si des sauvegardes ont échoué
    console.log('[endQCM] Navigation vers results');
    this.navigate('results');
  },

  // === RESULTS ===
  renderResults() {
    const { score, questions, startTime } = this.state.qcm;
    const total = questions.length;
    const pct = Math.round(score / total * 100);
    const duration = Math.round((Date.now() - startTime) / 1000);

    else if (pct >= 60) { mention = 'Bien'; sub = 'Bon niveau. Continue à réviser pour viser l\'excellence.'; }
    else if (pct >= 40) { mention = 'Passable'; sub = 'Des efforts supplémentaires sont nécessaires. Refais le QCM.'; }
    else { mention = 'À retravailler'; sub = 'Ne te décourage pas ! Reprends les bases avant de réessayer.'; }

    return `
      <div class="page">
        <header class="header">
          <div class="header-bar">
            <button class="header-back" onclick="App.navigate('home')">←</button>
            <div class="header-title-row">Résultats</div>
            <div class="header-spacer"></div>
          </div>
          <div class="header-h1" style="font-size:1.5rem">${m.icone} ${m.nom}</div>
          <div class="header-sub">${this.state.currentMode === 'exam' ? 'Mode examen chronométré' : 'Mode entraînement'}</div>
        </header>

        <div class="results">
          <div class="results-circle-wrap">
            <div class="results-circle">
              <div class="num">${score}</div>
              <div class="denom">sur ${total}</div>
            </div>
          </div>

          <div class="results-mention">${mention}</div>
          <div class="results-sub">${sub}</div>

          <div class="results-stats">
            <div class="results-stat">
              <div class="results-stat-num green">${score}</div>
              <div class="results-stat-label">Bonnes</div>
            </div>
            <div class="results-stat">
              <div class="results-stat-num red">${total - score}</div>
              <div class="results-stat-label">Erreurs</div>
            </div>
            <div class="results-stat">
              <div class="results-stat-num gold">${pct}%</div>
              <div class="results-stat-label">Score</div>
            </div>
          </div>

          <div class="results-stats" style="margin-bottom:1.5rem">
            <div class="results-stat" style="grid-column:span 3">
              <div class="results-stat-num" style="color:var(--green-bf)">${this.formatTime(duration)}</div>
              <div class="results-stat-label">Durée totale</div>
            </div>
          </div>

          <div class="results-actions">
            <button class="btn-primary" onclick="App.showCorrection()">📖 Voir le corrigé détaillé</button>
            <button class="btn-secondary" onclick="App.startQCM('${this.state.currentMode}')">🔄 Refaire un QCM</button>
            <button class="btn-secondary" onclick="App.navigate('concours-detail')">← Retour aux matières</button>
          </div>
        </div>
      </div>
    `;
  },

  // === CORRECTION DÉTAILLÉE (mode examen) ===
  showCorrection() {
    this.navigate('correction');
  },

  renderCorrection() {
    const { questions, answers, score } = this.state.qcm;
    const total = questions.length;
    const m = MATIERES_CATALOG[this.state.currentMatiere] || { icone: "📚", nom: this.state.currentMatiere || "Questions", couleur: "#0f5132" };
    const letters = ['A','B','C','D'];

    return `
      <div class="page">
        <header class="header">
          <div class="header-bar">
            <button class="header-back" onclick="App.navigate('results')">←</button>
            <div class="header-title-row">Corrigé détaillé</div>
            <div class="header-spacer"></div>
          </div>
          <div class="header-h1" style="font-size:1.4rem">📖 ${m.icone} ${m.nom}</div>
          <div class="header-sub">Score : ${score}/${total} • Revois chaque question pour progresser</div>
        </header>

        <div class="content mt-overlap">

          <div style="background:#f0f9ff; border-left:3px solid #2563eb; padding:0.9rem 1rem; border-radius:0 var(--radius-sm) var(--radius-sm) 0; font-size:0.82rem; color:#1e40af; line-height:1.5; margin-bottom:1rem">
            <strong>💡 Conseil :</strong> Lis attentivement les explications des questions où tu t'es trompé(e). C'est en comprenant ses erreurs qu'on progresse !
          </div>

          ${questions.map((q, i) => this.renderCorrectionItem(q, i, answers[i], letters)).join('')}

          <div style="margin-top:1.5rem; display:flex; flex-direction:column; gap:0.6rem">
            <button class="btn-primary" onclick="App.startQCM('${this.state.currentMode}')" style="width:100%">🔄 Refaire un nouveau QCM</button>
            <button class="btn-secondary" onclick="App.navigate('concours-detail')" style="width:100%">← Retour aux matières</button>
          </div>

        </div>
      </div>
    `;
  },

  renderCorrectionItem(q, index, userAnswer, letters) {
    const isCorrect = userAnswer === q.r;
    const noAnswer = userAnswer === null || userAnswer === undefined;

    let statusBadge = '';
    let statusColor = '';
    if (noAnswer) {
      statusBadge = '⊘ Sans réponse';
      statusColor = '#6b7280';
    } else if (isCorrect) {
      statusBadge = '✓ Correct';
      statusColor = 'var(--success)';
    } else {
      statusBadge = '✗ Incorrect';
      statusColor = 'var(--danger)';
    }

    return `
      <div style="background:white; border-radius:var(--radius-lg); padding:1.2rem; margin-bottom:0.8rem; border:1px solid var(--line-soft); box-shadow:var(--shadow-sm)">

        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:0.8rem">
          <div style="font-size:0.78rem; font-weight:700; color:var(--ink-mute); text-transform:uppercase; letter-spacing:0.04em">Question ${index + 1}/${this.state.qcm.questions.length}</div>
          <div style="font-size:0.72rem; font-weight:700; padding:0.25rem 0.65rem; border-radius:999px; background:${statusColor}22; color:${statusColor}">${statusBadge}</div>
        </div>

        <div style="font-size:0.95rem; font-weight:700; color:var(--ink); line-height:1.5; margin-bottom:1rem">${q.q}</div>

        <div style="display:flex; flex-direction:column; gap:0.4rem; margin-bottom:0.9rem">
          ${q.o.map((opt, oi) => {
            const isUserChoice = oi === userAnswer;
            const isRightAnswer = oi === q.r;

            let bg = '#fafafa';
            let border = 'var(--line)';
            let color = 'var(--ink)';
            let icon = '';

            if (isRightAnswer) {
              bg = '#f0fdf4';
              border = 'var(--success)';
              color = '#166534';
              icon = '<span style="margin-left:auto; color:var(--success); font-weight:800; font-size:1.1rem">✓</span>';
            }
            if (isUserChoice && !isRightAnswer) {
              bg = '#fef2f2';
              border = 'var(--danger)';
              color = '#991b1b';
              icon = '<span style="margin-left:auto; color:var(--danger); font-weight:800; font-size:1.1rem">✗</span>';
            }
            if (isUserChoice && isRightAnswer) {
              icon = '<span style="margin-left:auto; color:var(--success); font-weight:800; font-size:1.1rem">✓ Ton choix</span>';
            }

            return `
              <div style="display:flex; align-items:center; gap:0.7rem; padding:0.7rem 0.85rem; background:${bg}; border:1.5px solid ${border}; border-radius:10px; font-size:0.88rem; color:${color}">
                <div style="width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.75rem; flex-shrink:0; background:white; border:1.5px solid ${border}">${letters[oi]}</div>
                <span style="flex:1">${opt}</span>
                ${icon}
              </div>
            `;
          }).join('')}
        </div>

        <div style="background:#fffbeb; border-left:3px solid var(--gold-bf-dark); border-radius:0 var(--radius-sm) var(--radius-sm) 0; padding:0.85rem 1rem; font-size:0.85rem; color:#713f12; line-height:1.55">
          <strong style="color:#854d0e">📌 Explication :</strong> ${q.x}
        </div>
      </div>
    `;
  },

  // === STATS ===
  renderStats() {
    const total = this.state.history.length;
    const avgScore = total > 0
      ? Math.round(this.state.history.reduce((s, h) => s + (h.score / h.total * 100), 0) / total)
      : 0;
    const totalTime = this.state.history.reduce((s, h) => s + (h.duration || 0), 0);

    // Performance par matière
    const matPerf = Object.entries(this.state.matiereStats)
      .map(([mid, stats]) => ({
        mid,
        m: MATIERES_CATALOG[mid],
        pct: Math.round(stats.totalScore / stats.totalQuestions * 100),
        attempts: stats.attempts
      }))
      .filter(x => x.m && x.attempts > 0)
      .sort((a, b) => b.pct - a.pct);

    return `
      <div class="page">
        <header class="header">
          <div class="header-h1" style="font-size:1.6rem">📊 Mes <span>Statistiques</span></div>
          <div class="header-sub">Suis ta progression matière par matière</div>
        </header>

        <div class="content mt-overlap">
          ${total === 0 ? `
            <div class="empty-state">
              <div class="empty-icon">📈</div>
              <div class="empty-title">Aucune statistique pour le moment</div>
              <div class="empty-sub">Réalise ton premier QCM pour voir tes performances ici.</div>

          ` : `
            <div class="big-stat">

              <div class="big-stat-text">

              </div>

              <div class="big-stat-icon" style="background:linear-gradient(135deg,var(--gold-bf),var(--gold-bf-dark));color:var(--green-bf-dark)">⭐</div>
              <div class="big-stat-text">
                <div class="big-stat-label">Score moyen</div>
                <div class="big-stat-value">${avgScore}<small>%</small></div>
              </div>
            </div>
            <div class="big-stat">
              <div class="big-stat-icon" style="background:linear-gradient(135deg,#dc2626,#991b1b)">⏱</div>
              <div class="big-stat-text">
                <div class="big-stat-label">Temps de pratique</div>
                <div class="big-stat-value">${Math.round(totalTime / 60)}<small> min</small></div>
              </div>
            </div>

            ${matPerf.length > 0 ? `
              <div class="section-title" style="margin-top:1.2rem">Performance par matière</div>
              ${matPerf.map(p => `
                <div class="matiere-perf">
                  <div class="matiere-perf-head">
                    <div class="matiere-perf-name">${p.m.icone} ${p.m.nom}</div>
                    <div class="matiere-perf-pct" style="color:${p.m.couleur}">${p.pct}%</div>
                  </div>
                  <div class="matiere-perf-bar">
                    <div class="matiere-perf-bar-fill" style="width:${p.pct}%; background:${p.m.couleur}"></div>
                  </div>
                </div>
              `).join('')}
            ` : ''}
          `}
        </div>
      </div>
    `;
  },

  async payWithCinetPay() {
    if (!this.state.user.isLoggedIn) {

    const sel = this.state.premiumSelection;
    if (!sel || !sel.plan) return;

    this.toast('⏳ Initialisation du paiement...');
    try {
      const result = await window.PremiumService.initCinetPayPayment(
        sel.plan,
        this.state.user,
        sel.operator || 'orange'
      );
      if (result.success && result.paymentUrl) {
        // Sauvegarder la référence pour vérification au retour
        sessionStorage.setItem('bara_last_payment_ref', result.reference);
        sessionStorage.setItem('bara_last_payment_plan', sel.plan);
        // Rediriger vers CinetPay
        window.location.href = result.paymentUrl;
      } else {
        this.toast('❌ Erreur : ' + (result.error || 'Impossible de démarrer le paiement'));

      this.toast('❌ ' + e.message);

  renderPaymentInstructions(plan, operatorId) {
    const op = window.PremiumService.OPERATORS[operatorId];

    if (!this.state.premiumSelection.reference) {
      this.state.premiumSelection.reference = window.PremiumService.generatePaymentReference();

    const ref = this.state.premiumSelection.reference;
    const baraNum = window.PremiumService.BARA_NUMBERS[operatorId] || window.PremiumService.BARA_NUMBERS.orange;
    const u = this.state.user;
    const userPhone = u.phoneNumber && window.FirebaseAuth?.formatPhone ? window.FirebaseAuth.formatPhone(u.phoneNumber) : (u.phoneNumber || '');
    const waLink = window.PremiumService.getWhatsAppLink(plan.id, operatorId, userPhone, u.name, ref);

    // V51 : Codes USSD pré-remplis (montant + numéro Bara) pour faciliter le paiement

    // V52 : Format Moov corrigé : *555*2*1*NUMERO*MONTANT#
    const ussdMoov = `*555*2*1*${baraNumNoSpaces}*${plan.price}#`;
    // tel: nécessite # encodé en %23
    const telUssdOrange = `tel:${encodeURIComponent(ussdOrange)}`;
    const telUssdMoov = `tel:${encodeURIComponent(ussdMoov)}`;

    let opSpecific = '';
    if (operatorId === 'orange') {
      opSpecific = `<div class="payment-step">
        <div class="payment-step-num">1</div>

          <div style="margin-top:0.5rem; display:flex; gap:0.5rem; align-items:stretch; flex-wrap:wrap">
            <code style="flex:1; min-width:180px; background:#fff; padding:0.5rem 0.7rem; border-radius:8px; border:1.5px solid #FF6600; display:flex; align-items:center; font-size:1rem; font-weight:700; color:#9a3412; word-break:break-all">${ussdOrange}</code>
            <button onclick="window.location.href='${telUssdOrange}'" style="background:linear-gradient(135deg, #FF6600, #c2410c); color:white; border:none; padding:0.5rem 0.9rem; border-radius:8px; font-weight:700; font-size:0.82rem; cursor:pointer; white-space:nowrap">📞 Composer</button>
            <button onclick="App.copyToClipboard('${ussdOrange}', this)" style="background:white; color:#9a3412; border:1.5px solid #FF6600; padding:0.5rem 0.7rem; border-radius:8px; font-weight:700; font-size:0.82rem; cursor:pointer">📋 Copier</button>

  // V58 : Activation via code d'activation (async, vérifie Firestore)
  async activateWithCode() {
    const input = document.getElementById('activation-code-input');
    if (!input) return;
    const code = input.value.trim().toUpperCase();
    if (!code) {
      this.toast('❌ Entre ton code d\'activation', 'danger');
      return;
    }

    if (!window.ActivationCodes) {
      this.toast('❌ Module d\'activation non disponible', 'danger');
      return;
    }

    // V58 : Indiquer qu'on vérifie (latence réseau possible)
    this.toast('⏳ Vérification du code...');

    // Valider et utiliser le code (async maintenant)
    const userInfo = {
      uid: this.state.user.uid,
      email: window.FirebaseAuth?.user?.email || '',
      firstName: this.state.user.firstName,
      lastName: this.state.user.lastName,
      displayName: this.state.user.firstName + ' ' + (this.state.user.lastName || ''),
      phoneNumber: this.state.user.phoneNumber
    };
    const result = await window.ActivationCodes.useCode(code, userInfo);
    if (!result.valid) {
      this.toast('❌ ' + (result.reason || 'Code invalide'), 'danger');
      return;
    }

    // Activer Premium avec le plan du code
    const planId = result.planId;
    const updates = window.PremiumService.activatePremium(this.state.user, planId);
    if (!updates) {
      this.toast('❌ Plan inconnu : ' + planId, 'danger');
      return;
    }

    this.state.user = { ...this.state.user, ...updates };
    this.save();

    // V58 : Synchroniser Premium dans Firestore (pour multi-appareils)
    if (window.FirebaseAuth && window.FirebaseAuth.isFirebaseReady && window.FirebaseAuth.user) {
      try {
        await window.FirebaseAuth.updateProfile(updates);
        console.log('[V58] Premium synchronisé dans Firestore');
      } catch(e) { console.error('Sync premium :', e); }
    }

    const planName = window.PremiumService.PLANS[planId]?.name || 'Premium';
    this.toast('🎉 ' + planName + ' activé avec succès !');
    setTimeout(() => {
      this.navigate('home');
      setTimeout(() => this.toast('⭐ Bienvenue dans Premium !'), 800);
    }, 1500);
  },

  // V63.20 : Lecture des topics — Firestore prioritaire, fallback localStorage
  getForumTopics() {
    // V63.20 : Si Firestore est prêt et qu'on a un cache récent, utiliser ça
    if (window.ForumFirestore
        && window.FirebaseAuth
        && window.FirebaseAuth.isFirebaseReady
        && window.ForumFirestore._topicsCache
        && window.ForumFirestore._topicsCache.length > 0) {
      // Normaliser le format Firestore vers le format attendu par l'UI
      return window.ForumFirestore._topicsCache.map(t => ({
        id: t.id,
        title: t.title,
        body: t.body,
        authorId: t.authorUid,
        authorName: t.authorName,
        authorIsPremium: t.authorIsPremium,
        authorCity: '',
        timestamp: t.createdAt,
        replyCount: t.repliesCount,
        replies: [], // Chargées séparément
        upvotes: t.likesCount || 0,  // V63.21 : depuis Firestore
        upvotedBy: [],
        isPinned: t.isPinned
      }));
    }
    // Fallback localStorage (offline ou pas encore chargé)
    if (!this.state.forumTopics) {
      const saved = localStorage.getItem('bara_forum_topics');
      if (saved) {
        try { this.state.forumTopics = JSON.parse(saved); }
        catch { this.state.forumTopics = []; }
      } else {
        // V63.20 : Ne PAS injecter les démos si Firestore est disponible
        if (window.FirebaseAuth && window.FirebaseAuth.isFirebaseReady) {
          this.state.forumTopics = [];
        } else {
          this.state.forumTopics = window.ForumService.getDemoTopics();
        }
      }
    }
    return this.state.forumTopics;
  },

  // V63.20 : Chargement initial des topics depuis Firestore (au premier affichage)
  async loadForumTopicsFromFirestore() {
    if (!window.ForumFirestore || !window.FirebaseAuth || !window.FirebaseAuth.isFirebaseReady) {
      return;
    }
    if (this.state._forumLoading) return;
    this.state._forumLoading = true;
    try {
      const result = await window.ForumFirestore.getAllTopics();
      this.state._forumLoading = false;
      if (result.success) {
        // Re-render si on est sur la page forum
        if (this.state.currentScreen === 'forum') {
          this.render();
        }
      } else {
        console.warn('[V63.20] Forum getAllTopics échoué :', result.error);
      }
    } catch (e) {
      this.state._forumLoading = false;
      console.error('[V63.20] Forum chargement :', e);
    }
  },

  // V63.20 : Démarre un listener temps réel pour le forum
  startForumLiveSync() {
    if (!window.ForumFirestore || !window.FirebaseAuth || !window.FirebaseAuth.isFirebaseReady) {
      return;
    }
    // Éviter les doubles listeners
    if (this.state._forumUnsubscribe) return;
    console.log('[V63.20] Démarrage sync temps réel du forum');
    const unsub = window.ForumFirestore.listenToTopics((topics) => {
      // Re-render seulement si on est sur la page forum
      if (this.state.currentScreen === 'forum') {
        this.render();
      }
      // V63.21 : Précharger les likes du user
      this.preloadMyLikes();
    });
    this.state._forumUnsubscribe = unsub;
  },

  // V63.20 : Arrête le listener (lors de la navigation hors forum)
  stopForumLiveSync() {
    if (this.state._forumUnsubscribe) {
      try { this.state._forumUnsubscribe(); } catch(e) {}
      this.state._forumUnsubscribe = null;
      console.log('[V63.20] Sync forum arrêté');

    if (this.state._topicRepliesUnsubscribe) {
      try { this.state._topicRepliesUnsubscribe(); } catch(e) {}
      this.state._topicRepliesUnsubscribe = null;
    }
  },

    try {

  // Démarrer l'examen
  async startWeeklyExam() {
    if (!window.WeeklyExam) return;

    const status = window.WeeklyExam.getCurrentStatus();
    if (status.status !== 'active') {
      this.toast('❌ L\'examen n\'est pas ouvert actuellement', 'danger');
      return;
    }

    // Avertissement anti-triche
    const ok = confirm(
      '⚠️ AVANT DE COMMENCER\n\n' +
      '• 50 questions à répondre\n' +
      '• 1 question à la fois, pas de retour en arrière\n' +
      '• L\'examen se termine à 20h30 STRICT\n' +
      '• Bara Concours détecte les scores anormaux\n' +
      '• Toute triche peut entraîner l\'exclusion permanente\n\n' +
      'Es-tu prêt(e) ?'
    );

    if (!ok) return;

    const result = window.WeeklyExam.startExam(this.state.user);
    if (!result.success) {
      this.toast('❌ ' + (result.error || 'Erreur'), 'danger');
      return;
    }

    this.navigate('weekly-exam-active');
  },

  // PAGE 2 : Examen en cours (question par question)
  renderWeeklyExamActive() {
    if (!window.WeeklyExam) return '<div>Module non chargé</div>';

    const state = window.WeeklyExam.getState();
    const exam = state.activeExam;
    if (!exam) {
      // Pas d'examen actif → retour à la page d'accueil
      setTimeout(() => this.navigate('weekly-exam'), 100);
      return '<div>Redirection...</div>';
    }

    const status = window.WeeklyExam.getCurrentStatus();
    if (status.status !== 'active') {
      // L'examen est clôturé → finir automatiquement
      setTimeout(() => this.finishWeeklyExam(), 100);
      return '<div>Finalisation...</div>';
    }

    const questions = exam.questions || [];
    const currentIdx = exam.currentIndex || 0;

    // Si toutes les questions sont répondues
    if (currentIdx >= questions.length) {
      setTimeout(() => this.finishWeeklyExam(), 100);
      return '<div>Calcul du score...</div>';
    }

    const q = questions[currentIdx];
    if (!q) {
      setTimeout(() => this.finishWeeklyExam(), 100);
      return '<div>Erreur...</div>';
    }

    // Temps restant
    const msLeft = exam.examEnd - Date.now();
    const minLeft = Math.floor(msLeft / 60000);
    const secLeft = Math.floor((msLeft % 60000) / 1000);
    const timeLabel = minLeft + ':' + String(secLeft).padStart(2, '0');
    const isUrgent = msLeft < 5 * 60 * 1000;  // <5 min

    // Progression
    const progress = ((currentIdx + 1) / questions.length) * 100;

    return `
      <div class="page" style="padding-bottom:1rem; min-height:100vh; background:var(--cream)">

        <!-- BARRE D'EN-TÊTE FIXE -->
        <div style="position:sticky; top:0; background:white; border-bottom:2px solid var(--line); padding:0.7rem 1rem; z-index:10; box-shadow:0 2px 8px rgba(0,0,0,0.05)">
          <div style="display:flex; justify-content:space-between; align-items:center; gap:0.7rem">
            <!-- V63.4 : Bouton retour bien visible -->
            <button onclick="App.confirmQuitWeeklyExam()" style="background:var(--green-bf-dark); color:white; border:none; width:36px; height:36px; border-radius:50%; font-size:1.2rem; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 6px rgba(0,0,0,0.15)" title="Quitter l'examen">←</button>
            <div style="font-size:0.78rem; font-weight:800; color:var(--green-bf-dark); letter-spacing:0.05em; flex:1; text-align:center">
              📅 Q ${currentIdx + 1}/${questions.length}
            </div>
            <!-- V63.4 : Timer avec ID pour update direct chaque seconde -->
            <div id="weekly-exam-timer" data-end="${exam.examEnd}" style="background:${isUrgent ? '#fee2e2' : '#fef3c7'}; color:${isUrgent ? '#991b1b' : '#92400e'}; padding:0.3rem 0.7rem; border-radius:999px; font-weight:800; font-family:monospace; font-size:0.95rem; ${isUrgent ? 'animation:pulse 1s infinite' : ''}; flex-shrink:0">
              ⏱️ ${timeLabel}
            </div>
          </div>
          <div style="height:5px; background:var(--line); border-radius:999px; margin-top:0.5rem; overflow:hidden">
            <div style="height:100%; background:linear-gradient(90deg, var(--green-bf), var(--gold-bf)); width:${progress}%; transition:width 0.3s"></div>
          </div>
        </div>

        <div style="padding:1.2rem 1rem">

          <!-- CATÉGORIE -->
          <div style="margin-bottom:0.7rem">
            <span style="background:var(--green-bf); color:white; padding:0.25rem 0.65rem; border-radius:999px; font-size:0.72rem; font-weight:800; letter-spacing:0.05em; text-transform:uppercase">
              ${this._categoryLabel(q._category)}
            </span>
          </div>

          <!-- QUESTION -->
          <div style="background:white; border-radius:14px; padding:1.2rem; border:1px solid var(--line); margin-bottom:1rem">
            <div style="font-size:1.05rem; line-height:1.55; color:var(--ink); font-weight:500">
              ${q.q}
            </div>
          </div>

          <!-- OPTIONS -->
          <div style="display:flex; flex-direction:column; gap:0.6rem">
            ${(q.o || []).map((text, optIdx) => {
              if (!text) return '';
              const letter = ['A','B','C','D'][optIdx];
              return `
                <button onclick="App.answerWeeklyQuestion(${optIdx})" style="background:white; border:2px solid var(--line); padding:0.9rem 1rem; border-radius:12px; text-align:left; cursor:pointer; transition:all 0.15s; display:flex; align-items:flex-start; gap:0.7rem; font-size:0.95rem; line-height:1.4; width:100%; font-family:inherit">
                  <span style="background:var(--cream); border:1.5px solid var(--line); width:32px; height:32px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-weight:800; color:var(--ink); flex-shrink:0">${letter}</span>
                  <span style="flex:1; padding-top:0.4rem">${text}</span>
                </button>
              `;
            }).join('')}
          </div>

          <!-- AVERTISSEMENT BAS -->
          <div style="margin-top:1.2rem; padding:0.7rem 0.9rem; background:#fef3c7; border-left:3px solid #d97706; border-radius:6px; font-size:0.78rem; color:#78350f; line-height:1.45">
            ⚠️ Une fois la réponse cliquée, tu ne peux pas revenir en arrière. Réfléchis bien.
          </div>

        </div>

      </div>
    `;
  },

  // V63.13 : Formatter une date d'examen avec "Aujourd'hui" / "Demain" si pertinent
  _formatExamDate(timestamp) {
    const d = new Date(timestamp);
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const tomorrow = new Date(today);
    tomorrow.setDate(tomorrow.getDate() + 1);
    const examDay = new Date(d);
    examDay.setHours(0, 0, 0, 0);

    const diffDays = Math.round((examDay - today) / (24 * 60 * 60 * 1000));
    if (diffDays === 0) return 'Aujourd\'hui';
    if (diffDays === 1) return 'Demain';
    if (diffDays === -1) return 'Hier';
    // Pour les autres jours, format complet
    return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
  },

  _categoryLabel(cat) {
    const labels = {
      'cg': '🌍 Culture générale',
      'francais': '📝 Français',
      'maths': '🔢 Mathématiques',
      'actualite': '📰 Actualité',
      'actualite_bf': '📰 Actualité',
      'droit': '⚖️ Droit',
      'informatique': '💻 Informatique'
    };
    return labels[cat] || cat;
  },

  // Répondre à une question
  // V63.4 : optIdx est maintenant un INDEX numérique (0/1/2/3) au lieu d'une lettre
  answerWeeklyQuestion(optIdx) {
    if (!window.WeeklyExam) return;
    const state = window.WeeklyExam.getState();
    const exam = state.activeExam;
    if (!exam) return;

    const currentIdx = exam.currentIndex || 0;
    const result = window.WeeklyExam.answerQuestion(currentIdx, optIdx);
    if (!result.success) {
      this.toast('❌ ' + (result.error || 'Erreur'), 'danger');
      return;
    }

    // Auto-démarrage du timer de mise à jour (rafraîchir l'affichage)
    this.render();
  },

  // V63.4 : Démarrer le tick du chrono d'examen (mise à jour chaque seconde)
  startWeeklyExamTimer() {
    // Arrêter l'ancien timer s'il existe
    if (this._weeklyExamTimerId) {
      clearInterval(this._weeklyExamTimerId);
      this._weeklyExamTimerId = null;
    }

    const tick = () => {
      const el = document.getElementById('weekly-exam-timer');
      if (!el) {
        // Plus sur la page → arrêt
        if (this._weeklyExamTimerId) {
          clearInterval(this._weeklyExamTimerId);
          this._weeklyExamTimerId = null;
        }
        return;
      }
      const endTs = parseInt(el.dataset.end, 10);
      const now = Date.now();
      const msLeft = endTs - now;

      if (msLeft <= 0) {
        // Fin de l'examen
        el.textContent = '⏱️ 00:00';
        if (this._weeklyExamTimerId) {
          clearInterval(this._weeklyExamTimerId);
          this._weeklyExamTimerId = null;
        }
        this.toast('⏰ Temps écoulé !', 'danger');
        this.finishWeeklyExam();
        return;
      }

      const minLeft = Math.floor(msLeft / 60000);
      const secLeft = Math.floor((msLeft % 60000) / 1000);
      const label = '⏱️ ' + minLeft + ':' + String(secLeft).padStart(2, '0');
      el.textContent = label;

      // Couleur urgente si <5 min
      const isUrgent = msLeft < 5 * 60 * 1000;
      if (isUrgent && el.style.background !== 'rgb(254, 226, 226)') {
        el.style.background = '#fee2e2';
        el.style.color = '#991b1b';
        if (!el.style.animation) el.style.animation = 'pulse 1s infinite';
      }
    };

    tick();  // immédiat
    this._weeklyExamTimerId = setInterval(tick, 1000);
  },

  // V63.4 : Confirmation avant de quitter l'examen
  confirmQuitWeeklyExam() {
    const ok = confirm(
      '⚠️ QUITTER L\'EXAMEN ?\n\n' +
      'Le temps continuera à courir.\n' +
      'Tu pourras reprendre où tu en étais en revenant.\n\n' +
      'Vraiment quitter ?'
    );
    if (ok) {
      if (this._weeklyExamTimerId) {
        clearInterval(this._weeklyExamTimerId);
        this._weeklyExamTimerId = null;
      }
      this.navigate('weekly-exam');
    }
  },

  // Terminer l'examen
  async finishWeeklyExam() {
    if (!window.WeeklyExam) return;
    const result = await window.WeeklyExam.finishExam(this.state.user);
    if (!result.success) {
      this.toast('❌ ' + (result.error || 'Erreur'), 'danger');
      return;
    }
    this.toast('✅ Examen terminé ! Score : ' + result.result.score + '/' + result.result.total);
    this.navigate('weekly-exam-result');

              <p style="color:#78350f; margin:0 0 1rem; font-size:0.88rem; line-height:1.5">

                ⭐ Voir les offres Premium
              </button>
            </div>
          `}

          <!-- V62 + V63.13 : ACTIONS CLASSEMENT & CORRECTION (verrouillées pendant l'examen) -->
          ${(() => {
            // Vérifier si l'examen est encore actif
            const examEndTs = lastResult.examStart && window.WeeklyExam.getExamEnd
              ? window.WeeklyExam.getExamEnd(lastResult.examStart) : null;
            const examActive = examEndTs && Date.now() < examEndTs;
            if (examActive) {
              const minLeft = Math.max(1, Math.ceil((examEndTs - Date.now()) / 60000));
              return `
                <div style="background:linear-gradient(135deg, #fef3c7, white); border:2px solid var(--gold-bf); border-radius:14px; padding:1rem 1.1rem; margin-bottom:1rem; text-align:center">
                  <div style="font-size:1.6rem">⏱️</div>

                </button>

          <!-- ACTIONS -->
          <div style="display:flex; gap:0.6rem">
            <button onclick="App.navigate('weekly-exam')" style="flex:1; background:white; color:var(--green-bf-dark); border:1.5px solid var(--green-bf); padding:0.85rem; border-radius:10px; font-weight:700; cursor:pointer">

  // =================================================================
  // FIN V61 EXAMEN HEBDOMADAIRE
  // =================================================================

  // =================================================================
  // V62 : CLASSEMENT NATIONAL + CORRECTION DÉTAILLÉE
  // =================================================================

  // PAGE 4 : Classement national de l'examen
  renderWeeklyExamRanking() {
    if (!window.WeeklyExam) return '<div>Module non chargé</div>';

    // Quel examen ? Par défaut : le dernier examen passé par l'utilisateur
    const examId = this.state.weeklyRankingExamId || (window.WeeklyExam.getLastResult()?.examId);
    if (!examId) {
      return `
        <div class="page" style="padding-bottom:5rem">
          <header class="header">
            <button class="header-btn" onclick="App.navigate('weekly-exam')">←</button>
            <div class="header-title">🏆 Classement</div>
          </header>
          <div style="padding:2rem 1.2rem; text-align:center">
            <div style="font-size:3rem">📅</div>
            <h3 style="font-family:'Instrument Serif',serif; color:var(--green-bf-dark); margin:1rem 0">Pas encore de classement</h3>
            <p style="color:var(--ink-soft); font-size:0.92rem; line-height:1.55; max-width:340px; margin:0 auto">
              Participe à l'examen hebdomadaire ce dimanche pour voir le classement national.
            </p>
            <button onclick="App.navigate('weekly-exam')" style="margin-top:1.2rem; background:var(--green-bf); color:white; border:none; padding:0.85rem 1.5rem; border-radius:10px; font-weight:700; cursor:pointer">
              📅 Voir l'examen
            </button>
          </div>
        </div>
      `;
    }

    const isPremium = window.PremiumService.isUserPremium(this.state.user);
    const cache = this.state.weeklyRankingCache || {};
    const cachedData = cache[examId];

    // V63.13 : ANTI-TRICHE — Bloquer le classement pendant l'examen actif
    // (voir le score de quelqu'un à 50/50 = on peut déduire les bonnes réponses)
    const lastRes = window.WeeklyExam.getResultByExamId(examId);
    const rankExamEnd = lastRes && lastRes.examStart && window.WeeklyExam.getExamEnd
      ? window.WeeklyExam.getExamEnd(lastRes.examStart)
      : null;
    if (rankExamEnd && Date.now() < rankExamEnd) {
      const minutesUntil = Math.max(1, Math.ceil((rankExamEnd - Date.now()) / 60000));
      return `
        <div class="page" style="padding-bottom:5rem">
          <header class="header">
            <button class="header-btn" onclick="App.navigate('weekly-exam-result')">←</button>
            <div class="header-title">🔒 Classement</div>
          </header>
          <div style="padding:2rem 1.2rem; text-align:center; max-width:480px; margin:0 auto">
            <div style="font-size:3.5rem">🏆</div>
            <h2 style="font-family:'Instrument Serif',serif; color:var(--green-bf-dark); margin:0.8rem 0">Classement verrouillé</h2>
            <p style="color:var(--ink-soft); font-size:0.95rem; line-height:1.6">
              Le classement national sera publié <strong>à 20h30</strong>, quand tous les candidats auront terminé.
            </p>
            <div style="background:linear-gradient(135deg, #fef3c7, white); border:2px solid var(--gold-bf); border-radius:14px; padding:1.2rem; margin-top:1.5rem">
              <div style="font-size:1.8rem">⏳</div>
              <div style="font-family:'Instrument Serif',serif; font-size:1.4rem; color:#854d0e; margin-top:0.3rem">${minutesUntil} min restantes</div>

            <div style="display:flex; gap:0.6rem; margin-top:1.5rem; flex-wrap:wrap; justify-content:center">
              <button onclick="App.navigate('weekly-exam-result')" style="background:white; color:var(--green-bf-dark); border:1.5px solid var(--green-bf); padding:0.85rem 1.3rem; border-radius:10px; font-weight:700; cursor:pointer">
                📊 Mon résultat
              </button>
              <button onclick="App.navigate('home')" style="background:var(--green-bf); color:white; border:none; padding:0.85rem 1.3rem; border-radius:10px; font-weight:700; cursor:pointer">
                🏠 Accueil
              </button>
            </div>
          </div>
        </div>
      `;
    }

    // V62 : Refresh async du classement depuis Firestore (pattern admin codes)
    if (!this.state._weeklyRankingLoading) {
      this.state._weeklyRankingLoading = true;
      window.WeeklyExam.getRanking(examId, isPremium ? 100 : 10).then(result => {
        this.state._weeklyRankingLoading = false;
        if (result.success) {
          this.state.weeklyRankingCache = this.state.weeklyRankingCache || {};
          this.state.weeklyRankingCache[examId] = result;
          this.render();
        }
      });
    }

    // Affichage : si on a un cache → afficher, sinon afficher loader
    if (!cachedData) {
      return `
        <div class="page" style="padding-bottom:5rem">
          <header class="header">
            <button class="header-btn" onclick="App.navigate('weekly-exam-result')">←</button>
            <div class="header-title">🏆 Classement national</div>
          </header>
          <div style="padding:3rem 1.2rem; text-align:center">
            <div style="font-size:2rem">⏳</div>
            <p style="color:var(--ink-soft); margin-top:0.5rem">Chargement du classement...</p>
          </div>
        </div>
      `;
    }

    const ranking = cachedData.ranking || [];
    const total = cachedData.total || 0;
    const userPosition = cachedData.userPosition;
    const userResult = cachedData.userResult;

    // Date affichée
    const examDate = examId.replace('exam_', '');
    const dateLabel = new Date(examDate).toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

    // État vide
    if (ranking.length === 0) {
      return `
        <div class="page" style="padding-bottom:5rem">
          <header class="header">
            <button class="header-btn" onclick="App.navigate('weekly-exam-result')">←</button>
            <div class="header-title">🏆 Classement national</div>
          </header>
          <div style="padding:2rem 1.2rem; text-align:center">
            <div style="font-size:3rem">🌱</div>
            <h3 style="font-family:'Instrument Serif',serif; color:var(--green-bf-dark); margin:1rem 0">Premier participant !</h3>
            <p style="color:var(--ink-soft); font-size:0.92rem; line-height:1.55; max-width:340px; margin:0 auto">
              Tu es le premier à passer l'examen de ce dimanche. Le classement se construit au fur et à mesure des participations.
              <br><br>
              Invite tes amis sur Bara Concours pour avoir une vraie compétition nationale !
            </p>
            <button onclick="App.shareApp()" style="margin-top:1.2rem; background:#25D366; color:white; border:none; padding:0.85rem 1.5rem; border-radius:10px; font-weight:700; cursor:pointer">
              💬 Partager Bara Concours
            </button>
          </div>
        </div>
      `;
    }

    // Construire le classement avec medailles
    const medalEmoji = (pos) => {
      if (pos === 1) return '🥇';
      if (pos === 2) return '🥈';
      if (pos === 3) return '🥉';
      return '#' + pos;
    };
    const rowBackground = (pos, isMe) => {
      if (isMe) return 'linear-gradient(135deg, #fef3c7, #fde68a)';
      if (pos === 1) return 'linear-gradient(135deg, #fef9c3, white)';
      if (pos <= 3) return 'linear-gradient(135deg, #f0fdf4, white)';
      return 'white';
    };

    const myUid = window.FirebaseAuth?.user?.uid;

    // Position personnelle hors top
    let outOfTopBanner = '';
    if (userPosition && userPosition > ranking.length) {
      outOfTopBanner = `
        <div style="background:linear-gradient(135deg, #fef3c7, #fde68a); border:2px solid #d97706; border-radius:12px; padding:0.9rem 1rem; margin-bottom:1rem; display:flex; align-items:center; gap:0.8rem">
          <div style="font-size:2rem">📍</div>
          <div style="flex:1">
            <div style="font-weight:800; color:#92400e">Ta position</div>
            <div style="font-size:0.85rem; color:#78350f">#${userPosition} sur ${total} • ${userResult?.score}/${userResult?.total} points</div>
          </div>
        </div>
      `;
    }

    return `
      <div class="page" style="padding-bottom:5rem">
        <header class="header">
          <button class="header-btn" onclick="App.navigate('weekly-exam-result')">←</button>
          <div class="header-title">🏆 Classement national</div>
        </header>

        <div style="padding:1rem 1.2rem">

          <!-- HEADER DATE -->
          <div style="text-align:center; margin-bottom:1.2rem">
            <div style="font-family:'Instrument Serif',serif; color:var(--green-bf-dark); font-size:1.3rem">${dateLabel}</div>
            <div style="font-size:0.85rem; color:var(--ink-soft); margin-top:0.2rem">${total} participant${total > 1 ? 's' : ''} • Examen national hebdomadaire</div>
          </div>

          ${outOfTopBanner}

          <!-- PODIUM TOP 3 (si on a au moins 3 participants) -->
          ${ranking.length >= 3 ? `
            <div style="display:grid; grid-template-columns:1fr 1.2fr 1fr; gap:0.4rem; margin-bottom:1.2rem; align-items:end">
              <!-- 2ème -->
              <div style="background:linear-gradient(180deg, #e5e7eb, white); border-radius:12px 12px 0 0; padding:0.8rem 0.5rem 1.3rem; text-align:center; border-top:4px solid #9ca3af">
                <div style="font-size:1.8rem">🥈</div>
                <div style="font-weight:700; font-size:0.85rem; margin-top:0.3rem; word-break:break-word">${this._truncateName(ranking[1].displayName)}</div>
                <div style="font-size:0.75rem; color:var(--ink-mute); margin-top:0.15rem">${ranking[1].score}/${ranking[1].total}</div>
              </div>
              <!-- 1er -->
              <div style="background:linear-gradient(180deg, #fef3c7, white); border-radius:12px 12px 0 0; padding:1rem 0.5rem 1.5rem; text-align:center; border-top:4px solid var(--gold-bf); transform:translateY(-8px)">
                <div style="font-size:2.2rem">🥇</div>
                <div style="font-weight:800; font-size:0.95rem; margin-top:0.3rem; color:var(--green-bf-dark); word-break:break-word">${this._truncateName(ranking[0].displayName)}</div>
                <div style="font-size:0.78rem; color:#854d0e; font-weight:700; margin-top:0.15rem">${ranking[0].score}/${ranking[0].total}</div>
              </div>
              <!-- 3ème -->
              <div style="background:linear-gradient(180deg, #fed7aa, white); border-radius:12px 12px 0 0; padding:0.7rem 0.5rem 1.2rem; text-align:center; border-top:4px solid #ea580c">
                <div style="font-size:1.6rem">🥉</div>
                <div style="font-weight:700; font-size:0.83rem; margin-top:0.3rem; word-break:break-word">${this._truncateName(ranking[2].displayName)}</div>
                <div style="font-size:0.74rem; color:var(--ink-mute); margin-top:0.15rem">${ranking[2].score}/${ranking[2].total}</div>
              </div>
            </div>
          ` : ''}

          <!-- LISTE COMPLÈTE -->
          <div style="background:white; border-radius:12px; border:1px solid var(--line); overflow:hidden">
            ${ranking.map((r, idx) => {
              const pos = idx + 1;
              const isMe = r.userId === myUid;
              return `
                <div style="display:flex; align-items:center; gap:0.7rem; padding:0.75rem 0.9rem; background:${rowBackground(pos, isMe)}; border-bottom:1px solid var(--line); ${isMe ? 'border-left:4px solid var(--gold-bf)' : ''}">
                  <div style="font-weight:800; font-size:${pos <= 3 ? '1.1rem' : '0.9rem'}; min-width:36px; color:${pos <= 3 ? 'var(--green-bf-dark)' : 'var(--ink-soft)'}">${medalEmoji(pos)}</div>
                  <div style="flex:1; min-width:0">
                    <div style="font-weight:${isMe ? 800 : 600}; font-size:0.9rem; color:var(--ink)">${this._truncateName(r.displayName)}${isMe ? ' <span style="background:var(--gold-bf); color:white; padding:0.1rem 0.4rem; border-radius:999px; font-size:0.65rem; font-weight:800; margin-left:0.3rem">TOI</span>' : ''}</div>
                    <div style="font-size:0.75rem; color:var(--ink-mute); margin-top:0.1rem">
                      ${r.city || ''}${r.city && r.targetConcours ? ' • ' : ''}${r.targetConcours || ''}
                    </div>
                  </div>
                  <div style="text-align:right">
                    <div style="font-weight:800; color:var(--green-bf-dark); font-size:0.95rem">${r.score}/${r.total}</div>
                    <div style="font-size:0.72rem; color:var(--ink-mute)">${r.percent}%</div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>

          <!-- PROMO PREMIUM SI GRATUIT -->
          ${!isPremium && total > 10 ? `
            <div style="background:linear-gradient(135deg, #fef3c7, white); border:2px solid var(--gold-bf); border-radius:14px; padding:1rem 1.2rem; margin-top:1.2rem; text-align:center">
              <div style="font-size:1.8rem">🔒</div>
              <h3 style="font-family:'Instrument Serif',serif; color:#854d0e; margin:0.4rem 0; font-size:1.15rem">Tu vois seulement le Top 10</h3>
              <p style="color:#78350f; margin:0 0 0.9rem; font-size:0.85rem; line-height:1.5">
                Premium te donne accès au classement complet (${total} participants), ta position exacte, et l'analyse comparative.
              </p>
              <button onclick="App.navigate('premium')" style="background:linear-gradient(135deg, #d97706, #b45309); color:white; border:none; padding:0.7rem 1.3rem; border-radius:8px; font-weight:800; cursor:pointer; font-size:0.88rem">
                ⭐ Devenir Premium
              </button>
            </div>
          ` : ''}

        </div>
      </div>
    `;
  },

  _truncateName(name) {
    if (!name) return 'Anonyme';
    if (name.length > 22) return name.substring(0, 22) + '…';
    return name;
  },

  shareApp() {
    const text = '🎓 Bara Concours — Prépare-toi aux concours du Burkina Faso avec des QCM ciblés et l\'examen national hebdomadaire chaque dimanche à 19h30 ! https://bara-formation.github.io/bara-concours/';
    if (navigator.share) {
      navigator.share({ title: 'Bara Concours', text: text }).catch(() => {});
    } else if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(() => this.toast('📋 Lien copié !'));
    } else {
      // Fallback : WhatsApp direct
      window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
    }
  },

  // PAGE 5 : Correction détaillée (Premium uniquement)
  renderWeeklyExamCorrection() {
    if (!window.WeeklyExam) return '<div>Module non chargé</div>';

    const examId = this.state.weeklyCorrectionExamId || (window.WeeklyExam.getLastResult()?.examId);
    const result = examId ? window.WeeklyExam.getResultByExamId(examId) : null;

    if (!result) {
      return `
        <div class="page" style="padding-bottom:5rem">
          <header class="header">
            <button class="header-btn" onclick="App.navigate('weekly-exam')">←</button>
            <div class="header-title">✏️ Correction</div>
          </header>
          <div style="padding:2rem 1.2rem; text-align:center">
            <div style="font-size:3rem">📭</div>
            <p style="color:var(--ink-soft); margin-top:1rem">Aucune correction disponible.<br>Passe l'examen d'abord !</p>
            <button onclick="App.navigate('weekly-exam')" style="margin-top:1rem; background:var(--green-bf); color:white; border:none; padding:0.8rem 1.5rem; border-radius:10px; font-weight:700; cursor:pointer">📅 Examen hebdo</button>
          </div>
        </div>
      `;
    }

    // V63.13 : ANTI-TRICHE — Bloquer la correction tant que l'examen est en cours
    // (entre 19h30 et 20h30 dimanche). La correction s'ouvre à 20h30 strict pour tout le monde.
    const examEnd = result.examStart && window.WeeklyExam.getExamEnd
      ? window.WeeklyExam.getExamEnd(result.examStart)
      : null;
    const now = Date.now();
    const examStillActive = examEnd && now < examEnd;

    if (examStillActive) {
      const minutesUntil = Math.max(1, Math.ceil((examEnd - now) / 60000));
      return `
        <div class="page" style="padding-bottom:5rem">
          <header class="header">
            <button class="header-btn" onclick="App.navigate('weekly-exam-result')">←</button>
            <div class="header-title">🔒 Correction</div>
          </header>
          <div style="padding:2rem 1.2rem; text-align:center; max-width:480px; margin:0 auto">
            <div style="font-size:3.5rem">⏱️</div>
            <h2 style="font-family:'Instrument Serif',serif; color:var(--green-bf-dark); margin:0.8rem 0">Correction verrouillée</h2>
            <p style="color:var(--ink-soft); font-size:0.95rem; line-height:1.6">
              La correction détaillée sera disponible <strong>à la clôture de l'examen national</strong> à <strong>20h30</strong>.
            </p>
            <p style="color:var(--ink-soft); font-size:0.88rem; line-height:1.5; margin-top:0.6rem">
              Cette mesure garantit l'équité entre tous les candidats : personne ne peut tricher en consultant les réponses pendant que d'autres composent encore.
            </p>
            <div style="background:linear-gradient(135deg, #fef3c7, white); border:2px solid var(--gold-bf); border-radius:14px; padding:1.2rem; margin-top:1.5rem">
              <div style="font-size:1.8rem">⏳</div>
              <div style="font-family:'Instrument Serif',serif; font-size:1.4rem; color:#854d0e; margin-top:0.3rem">${minutesUntil} min restantes</div>
              <div style="font-size:0.82rem; color:#92400e; margin-top:0.4rem">avant la publication de la correction</div>
            </div>
            <div style="display:flex; gap:0.6rem; margin-top:1.5rem; flex-wrap:wrap; justify-content:center">
              <button onclick="App.navigate('weekly-exam-result')" style="background:white; color:var(--green-bf-dark); border:1.5px solid var(--green-bf); padding:0.85rem 1.3rem; border-radius:10px; font-weight:700; cursor:pointer">
                📊 Mon résultat
              </button>
              <button onclick="App.navigate('home')" style="background:var(--green-bf); color:white; border:none; padding:0.85rem 1.3rem; border-radius:10px; font-weight:700; cursor:pointer">
                🏠 Accueil
              </button>
            </div>
          </div>
        </div>
      `;
    }

    // V62 : Vérifier Premium
    const isPremium = window.PremiumService.isUserPremium(this.state.user);
    if (!isPremium) {
      return `
        <div class="page" style="padding-bottom:5rem">
          <header class="header">
            <button class="header-btn" onclick="App.navigate('weekly-exam-result')">←</button>
            <div class="header-title">✏️ Correction détaillée</div>
          </header>
          <div style="padding:2rem 1.2rem; text-align:center">
            <div style="font-size:3.5rem">🔒</div>
            <h2 style="font-family:'Instrument Serif',serif; color:var(--green-bf-dark); margin:0.8rem 0">Correction détaillée réservée Premium</h2>
            <p style="color:var(--ink-soft); font-size:0.95rem; line-height:1.6; max-width:380px; margin:0 auto">
              Avec Premium, tu as accès à :<br>
              ✅ La correction de chaque question avec explication<br>
              ✅ Pourquoi tu as eu faux (raisonnement)<br>
              ✅ Les points clés à retenir<br>
              ✅ L'analyse de tes lacunes par matière
            </p>
            <button onclick="App.navigate('premium')" style="margin-top:1.5rem; background:linear-gradient(135deg, #d97706, #b45309); color:white; border:none; padding:0.95rem 1.8rem; border-radius:12px; font-weight:800; cursor:pointer; font-size:1rem; box-shadow:0 4px 14px rgba(217,119,6,0.25)">
              ⭐ Voir les plans Premium
            </button>
          </div>
        </div>
      `;
    }

    // Filtre actif (toutes / fausses / correctes)
    const filter = this.state.weeklyCorrectionFilter || 'all';
    const details = result.detailedResults || [];
    let filteredDetails = details;
    if (filter === 'wrong') filteredDetails = details.filter(d => !d.isCorrect);
    if (filter === 'correct') filteredDetails = details.filter(d => d.isCorrect);
    if (filter && filter.startsWith('cat_')) {

  // === NOTIFICATIONS V63 (best effort) ===

  // Demande la permission de notifier (à appeler à un moment opportun)
  async requestExamNotifications() {
    if (!('Notification' in window)) {
      this.toast('🔕 Notifications non supportées sur ce navigateur', 'danger');
      return false;
    }
    if (Notification.permission === 'granted') {
      this.scheduleExamReminders();
      return true;
    }
    if (Notification.permission === 'denied') {
      this.toast('🔕 Notifications refusées dans les réglages', 'danger');
      return false;
    }
    try {
      const result = await Notification.requestPermission();
      if (result === 'granted') {
        this.toast('🔔 Tu seras notifié(e) avant chaque examen !');
        this.scheduleExamReminders();
        return true;
      }
    } catch(e) {
      console.warn('[V63] Erreur permission notif :', e);
    }
    return false;
  },

  // Planifier les rappels d'examen (best effort)
  // Limitation : ne marche que si l'utilisateur ouvre l'app au moins une fois pendant la fenêtre
  scheduleExamReminders() {
    if (!window.WeeklyExam) return;
    if (Notification.permission !== 'granted') return;

    const status = window.WeeklyExam.getCurrentStatus();
    if (status.status !== 'active' && status.status !== 'before') return;

    // V63.13 : Dédoublonnage par examId
    // Si on a déjà planifié les rappels pour CET examen précis, on ne refait rien.
    const examId = window.WeeklyExam.getExamId(status.examStart);
    if (this._lastScheduledExamId === examId) {
      // Déjà planifié pour ce dimanche → on évite les doublons
      return;
    }

    // Annuler les anciens timers s'ils existaient (autre examen, plus pertinent)
    if (this._examReminderTimers && this._examReminderTimers.length) {
      this._examReminderTimers.forEach(id => clearTimeout(id));
    }
    this._examReminderTimers = [];

    // V63.13 : Vérifier aussi qu'on n'a pas DÉJÀ envoyé une notif aujourd'hui (cross-session)
    // (utile si l'utilisateur ferme l'app puis la rouvre)
    const sentKey = 'bara_exam_notifs_sent_' + examId;
    const alreadySent = JSON.parse(localStorage.getItem(sentKey) || '{"hour":false,"start":false}');

    const timers = [];
    const now = Date.now();
    const oneHourBefore = status.examStart - 60 * 60 * 1000;
    const atStart = status.examStart;

    // V63.13 : Rappel 1h avant (1 SEUL — pas de "10 min avant" pour éviter le spam)
    if (oneHourBefore > now && !alreadySent.hour) {
      const id = setTimeout(() => {
        this._sendExamNotification('📅 Examen hebdomadaire dans 1 heure', 'Sois prêt(e) à 19h30 pour 50 questions en 60 min !');
        alreadySent.hour = true;
        try { localStorage.setItem(sentKey, JSON.stringify(alreadySent)); } catch(e) {}
      }, oneHourBefore - now);
      timers.push(id);
    }

    // V63.13 : Rappel au démarrage (1 SEUL)
    if (atStart > now && !alreadySent.start) {
      const id = setTimeout(() => {
        this._sendExamNotification('🔴 EN DIRECT : L\'examen est ouvert !', 'Clique pour commencer maintenant. Tu as jusqu\'à 20h30.');
        alreadySent.start = true;
        try { localStorage.setItem(sentKey, JSON.stringify(alreadySent)); } catch(e) {}
      }, atStart - now);
      timers.push(id);
    }

    this._examReminderTimers = timers;
    this._lastScheduledExamId = examId;
    console.log('[V63.13] Rappels d\'examen planifiés (' + timers.length + ' timers) pour ' + examId);
  },

  _sendExamNotification(title, body) {
    try {
      const notif = new Notification(title, {
        body,
        icon: 'icons/icon-192.png',
        badge: 'icons/icon-192.png',
        tag: 'bara-weekly-exam',
        requireInteraction: false,
        renotify: false  // V63.13 : Pas de re-notification si même tag
      });
      notif.onclick = () => {
        window.focus();
        this.navigate('weekly-exam');
        notif.close();
      };
    } catch(e) {
      console.warn('[V63] Erreur notif :', e);
    }
  },

  renderTopicCard(topic) {
    const F = window.ForumService;
    const initials = F.getInitials(topic.authorName);
    const color = F.getAvatarColor(topic.authorName);
    const time = F.formatRelativeTime(topic.timestamp);

    return `
      <div class="topic-card" onclick="App.openTopic('${topic.id}')">
        <div class="topic-head">
          <div class="avatar" style="background:${color}">${initials}</div>
          <div class="author-info">
            <div class="author-name">
              ${topic.authorName}
              ${topic.authorIsPremium ? '<span class="premium-badge-mini">⭐ PRO</span>' : ''}
            </div>
            <div class="topic-meta">${topic.authorCity ? topic.authorCity + ' • ' : ''}${time}</div>
          </div>
        </div>
        <div class="topic-title">${this.escapeHTML(topic.title)}</div>
        <div class="topic-body">${this.escapeHTML(topic.body)}</div>

          <div class="topic-stat">💬 ${topic.replyCount || 0}</div>
          <div class="topic-stat">👍 ${topic.upvotes || 0}</div>
        </div>
      </div>

  },

  escapeHTML(s) {
    return (s || '').replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
  },

  openTopic(id) {
    this.state.currentTopicId = id;
    // V63.20 : Reset les réponses chargées (sera rechargé pour ce topic)
    this.state._currentTopicReplies = null;
    this.state._currentTopicRepliesLoaded = false;
    // Stopper l'éventuel listener sur un autre topic
    if (this.state._topicRepliesUnsubscribe) {
      try { this.state._topicRepliesUnsubscribe(); } catch(e) {}
      this.state._topicRepliesUnsubscribe = null;
    }
    this.navigate('forum-topic');
  },

  // V63.20 : Charger les réponses d'un topic depuis Firestore + sync temps réel
  async loadTopicRepliesFromFirestore(topicId) {
    if (!window.ForumFirestore) return;
    if (!topicId) return;
    if (this.state._currentTopicRepliesLoaded && this.state._topicRepliesUnsubscribe) return;
    // Marquer comme en cours
    this.state._currentTopicRepliesLoaded = true;
    // Démarrer un listener temps réel (auto-charge la liste initiale + écoute les nouveaux)
    const unsub = window.ForumFirestore.listenToReplies(topicId, (replies) => {
      // Mettre à jour le state
      this.state._currentTopicReplies = replies.map(r => ({
        id: r.id,
        authorName: r.authorName,
        authorIsPremium: r.authorIsPremium,
        body: r.body,
        timestamp: r.createdAt
      }));
      // Re-render si on est encore sur ce topic
      if (this.state.currentScreen === 'forum-topic' && this.state.currentTopicId === topicId) {
        this.render();
      }
    });
    this.state._topicRepliesUnsubscribe = unsub;
  },

  // === DÉTAIL D'UN SUJET ===
  renderForumTopic() {

    let topic = null;
    if (window.ForumFirestore && window.ForumFirestore._topicsCache) {
      const ft = window.ForumFirestore._topicsCache.find(t => t.id === this.state.currentTopicId);

          authorName: ft.authorName,

          authorIsPremium: ft.authorIsPremium,
          timestamp: ft.createdAt,
          upvotes: 0,
          replyCount: ft.repliesCount,
          replies: this.state._currentTopicReplies || []
        };
      }
    }
    // Fallback localStorage
    if (!topic) {
      const topics = this.getForumTopics();
      topic = topics.find(t => t.id === this.state.currentTopicId);
    }
    if (!topic) { this.navigate('forum'); return ''; }

    // V63.20 : Charger les réponses depuis Firestore (au premier render) + sync temps réel
    if (window.ForumFirestore && window.FirebaseAuth && window.FirebaseAuth.isFirebaseReady) {
      this.loadTopicRepliesFromFirestore(topic.id);
    }

    const F = window.ForumService;
