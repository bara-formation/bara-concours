  // ===========================================

  renderAuthPhone() {
    const a = this.state.auth;
    const bioEnabled = window.BiometricAuth && window.BiometricAuth.isEnabled();
    const bioUser = bioEnabled ? window.BiometricAuth.getEnrolledUser() : null;
    return `
      <div class="page auth-screen">
        <button class="auth-back" onclick="App.navigate('splash')">←</button>

        <div class="auth-logo-row">
          <img src="icons/icon-192.png" class="auth-logo" alt="Bara Concours">
          <div>
            <div class="auth-brand">Bara <span>Concours</span></div>
            <div class="auth-tagline">Concours du Burkina Faso 🇧🇫</div>
          </div>
        </div>

        ${bioEnabled && bioUser ? `
          <div class="bio-quick-login" onclick="App.loginWithBiometric()">
            <div class="bio-quick-icon">👆</div>
            <div class="bio-quick-body">
              <div class="bio-quick-title">Connexion rapide</div>
              <div class="bio-quick-desc">${bioUser.nom || bioUser.phone || 'Utilisateur'} • Empreinte digitale</div>
            </div>
            <div class="bio-quick-arrow">›</div>
          </div>
          <div class="auth-divider">
            <span>ou par SMS</span>
          </div>
        ` : ''}

        <div class="auth-card">
          <div class="auth-title">Bienvenue !</div>
          <div class="auth-subtitle">Saisis ton numéro de téléphone pour recevoir un code de vérification par SMS.</div>

          <div class="auth-info">
            <strong>📱 Numéro Burkina Faso (8 chiffres)</strong><br>
            Exemple : 70 12 34 56
          </div>

          ${a.error ? `<div class="auth-error show">⚠️ ${a.error}</div>` : ''}

          <div class="auth-input-group">
            <label class="auth-label">Numéro de téléphone</label>
            <div class="auth-input-wrap">
              <div class="auth-input-prefix">🇧🇫 +226</div>
              <input
                type="tel"
                class="auth-input"
                id="phoneInput"
                placeholder="70 12 34 56"
                maxlength="11"
                value="${a.phoneInput}"
                oninput="App.formatPhoneInput(this)"
                autocomplete="tel-national"
                inputmode="numeric">
            </div>
          </div>

          <button class="auth-btn ${a.isLoading ? 'loading' : ''}" onclick="App.sendOTP()" ${a.isLoading ? 'disabled' : ''}>
            Recevoir le code SMS
          </button>
        </div>

        <div class="auth-skip">
          Pas le temps de t'inscrire ?<br>
          <a href="#" onclick="App.continueWithoutAccount(); return false;">Continuer sans compte</a>
        </div>

        <div class="auth-foot">
          🔒 Tes données sont sécurisées et confidentielles
        </div>
      </div>
    `;
  },

  formatPhoneInput(input) {
    let v = input.value.replace(/\D/g, '');
    if (v.length > 8) v = v.substring(0, 8);
    let formatted = '';
    for (let i = 0; i < v.length; i++) {
      if (i > 0 && i % 2 === 0) formatted += ' ';
      formatted += v[i];
    }
    input.value = formatted;
    this.state.auth.phoneInput = formatted;
  },

  async sendOTP() {
    const a = this.state.auth;
    const cleaned = a.phoneInput.replace(/\s+/g, '');

    if (cleaned.length !== 8) {
      a.error = 'Numéro invalide. Le numéro doit contenir 8 chiffres.';
      this.render();
      return;
    }

    a.error = '';
    a.isLoading = true;
    this.render();

    // Vérifier si Firebase est disponible et configuré
    const firebaseReady = window.FirebaseAuth && window.FirebaseAuth.isFirebaseReady;

    if (!firebaseReady) {
      // Mode démo — passe à l'écran OTP avec le code 123456
      setTimeout(() => {
        a.isLoading = false;
        a.error = '';
        a.pendingPhone = '+226' + cleaned;
        a.otpInput = '';
        this.toast('📱 Mode démo : utilise le code 123456');
        this.navigate('auth-otp');
      }, 600);
      return;
    }

    try {
      window.FirebaseAuth.initRecaptcha('recaptcha-container');
      const result = await window.FirebaseAuth.sendOTP('+226' + cleaned);
      a.pendingPhone = result.phoneNumber;
      a.isLoading = false;
      a.otpInput = '';
      this.startResendCooldown();
      this.navigate('auth-otp');
    } catch (e) {
      a.error = e.message || 'Erreur d\'envoi. Réessaie.';
      a.isLoading = false;
      this.render();
    }
  },

  renderAuthOTP() {
    const a = this.state.auth;
    const firebaseReady = window.FirebaseAuth && window.FirebaseAuth.isFirebaseReady;
    const isDemo = !firebaseReady;
    const formatPhone = (window.FirebaseAuth && window.FirebaseAuth.formatPhone)
      ? window.FirebaseAuth.formatPhone(a.pendingPhone)
      : a.pendingPhone;

    return `
      <div class="page auth-screen">
        <button class="auth-back" onclick="App.navigate('auth-phone')">←</button>

        <div class="auth-logo-row">
          <img src="icons/icon-192.png" class="auth-logo" alt="Bara Concours">
          <div>
            <div class="auth-brand">Vérification</div>
            <div class="auth-tagline">${formatPhone}</div>
          </div>
        </div>

        <div class="auth-card">
          <div class="auth-title">Code de vérification</div>
          <div class="auth-subtitle">${isDemo
            ? `Mode démo activé. Utilise le code <strong style="color:var(--green-bf)">123456</strong> pour continuer.`
            : `Saisis le code à 6 chiffres reçu par SMS au ${formatPhone}.`}</div>

          ${isDemo ? `
            <div class="auth-info" style="background:#f0fdf4; border-left-color:var(--success); color:#166534">
              <strong>📱 Mode démo</strong><br>
              Pas de SMS envoyé. Saisis simplement <strong>123456</strong> pour tester l'inscription.
            </div>
          ` : ''}

          ${a.error ? `<div class="auth-error show">⚠️ ${a.error}</div>` : ''}

          <input
            type="tel"
            class="auth-otp-input"
            id="otpInput"
            placeholder="••••••"
            maxlength="6"
            value="${a.otpInput}"
            oninput="App.handleOTPInput(this)"
            autocomplete="one-time-code"
            inputmode="numeric">

          <button class="auth-btn ${a.isLoading ? 'loading' : ''}" onclick="App.verifyOTP()" ${a.isLoading ? 'disabled' : ''}>
            Vérifier le code
          </button>

          ${!isDemo ? `
            <div class="auth-resend">
              ${a.resendCooldown > 0
                ? `Renvoyer le code dans ${a.resendCooldown}s`
                : `<button onclick="App.resendOTP()">📤 Renvoyer le code</button>`
              }
            </div>
          ` : ''}
        </div>

        <div class="auth-foot">${isDemo ? '🛠️ Configurer Firebase pour les vrais SMS — voir FIREBASE_SETUP.md' : '🔒 Code valable 10 minutes'}</div>
      </div>
    `;
  },

  handleOTPInput(input) {
    let v = input.value.replace(/\D/g, '');
    if (v.length > 6) v = v.substring(0, 6);
    input.value = v;
    this.state.auth.otpInput = v;
    if (v.length === 6) setTimeout(() => this.verifyOTP(), 200);
  },

  async verifyOTP() {
    const a = this.state.auth;
    if (a.otpInput.length !== 6) {
      a.error = 'Le code doit contenir 6 chiffres';
      this.render();
      return;
    }

    a.error = '';
    a.isLoading = true;
    this.render();

    const firebaseReady = window.FirebaseAuth && window.FirebaseAuth.isFirebaseReady;

    if (!firebaseReady) {
      // Mode démo — accepte uniquement le code 123456
      setTimeout(() => {
        if (a.otpInput === '123456') {
          this.state.user = {
            ...this.state.user,
            isLoggedIn: true,
            phoneNumber: a.pendingPhone,
            uid: 'demo_' + Date.now()
          };
          this.save();
          a.isLoading = false;
          this.toast('🎉 Connexion réussie (mode démo)');
          this.navigate('onboarding');
        } else {
          a.error = 'Code incorrect. En mode démo, utilise 123456';
          a.isLoading = false;
          this.render();
        }
      }, 500);
      return;
    }

    try {
      const result = await window.FirebaseAuth.verifyOTP(a.otpInput);
      a.isLoading = false;
      this.state.user = {
        ...this.state.user,
        isLoggedIn: true,
        uid: result.user.uid,
        phoneNumber: result.user.phoneNumber
      };
      this.save();
      this.toast('🎉 Connexion réussie !');

      if (result.isNewUser) {
        this.navigate('onboarding');
      } else {
        const cloudHistory = await window.FirebaseAuth.syncHistory();
        if (cloudHistory.length > this.state.history.length) {
          this.state.history = cloudHistory;
          this.save();
        }
        this.navigate('home');
      }
    } catch (e) {
      a.error = e.message || 'Erreur de vérification';
      a.isLoading = false;
      this.render();
    }
  },

  startResendCooldown() {
    const a = this.state.auth;
    a.resendCooldown = 60;
    if (a.resendInterval) clearInterval(a.resendInterval);
    a.resendInterval = setInterval(() => {
      a.resendCooldown--;
      if (a.resendCooldown <= 0) {
        clearInterval(a.resendInterval);
        a.resendInterval = null;
      }
      const el = document.querySelector('.auth-resend');
      if (el) {
        el.innerHTML = a.resendCooldown > 0
          ? `Renvoyer le code dans ${a.resendCooldown}s`
          : `<button onclick="App.resendOTP()">📤 Renvoyer le code</button>`;
      }
    }, 1000);
  },

  async resendOTP() {
    if (this.state.auth.resendCooldown > 0) return;
    this.state.auth.phoneInput = this.state.auth.pendingPhone.replace('+226', '').match(/.{1,2}/g).join(' ');
    await this.sendOTP();
  },

  // ===========================================

  renderOnboarding() {

    const niveaux = ['CEP', 'BEPC', 'BAC', 'Licence', 'Licence et plus'];

          <div>

          </div>

          ${o.step === 1 ? `
            <div class="auth-title">Comment t'appelles-tu ?</div>
            <div class="auth-subtitle">Pour personnaliser tes encouragements et statistiques.</div>
            <input type="text" class="edit-input" id="onboardName" placeholder="Ton prénom ou pseudo" value="${o.name}" maxlength="40">

            <div class="auth-input-group" style="margin-top:0.5rem">
              <label class="auth-label">Ville (optionnel)</label>
              <select class="edit-select" id="onboardCity">
                <option value="">— Choisir ma ville —</option>
                ${villes.map(v => `<option value="${v}" ${o.city === v ? 'selected' : ''}>${v}</option>`).join('')}
              </select>
            </div>

            <button class="auth-btn" onclick="App.onboardingNext()">Continuer →</button>
          ` : ''}

          ${o.step === 2 ? `
            <div class="auth-title">Quel concours vises-tu ?</div>

            <!-- BUG #2 FIX : filtre par niveau scolaire -->

              ${['Tous', 'BEPC', 'BAC', 'Licence', 'Master'].map(niv => {
                const active = (o.filterNiveau || 'Tous') === niv;
                return `
                  <button onclick="App.setOnboardingNiveau('${niv}')"
                    style="padding:0.4rem 0.85rem; border-radius:999px; border:1.5px solid ${active ? 'var(--green-bf)' : 'var(--line)'}; background:${active ? 'var(--green-bf)' : 'white'}; color:${active ? 'white' : 'var(--ink)'}; font-weight:700; font-size:0.78rem; cursor:pointer">
                    ${niv}
                  </button>
                `;
              }).join('')}
            </div>

            <div style="display:flex; flex-direction:column; gap:0.5rem; margin-bottom:1rem; max-height:340px; overflow-y:auto">
              ${(() => {
                const niv = o.filterNiveau || 'Tous';
                const filtered = niv === 'Tous'
                  ? CONCOURS
                  : CONCOURS.filter(c => (c.niveau || '').toUpperCase().includes(niv.toUpperCase()));
                if (filtered.length === 0) {
                  return '<div style="text-align:center; color:var(--ink-mute); padding:1rem; font-size:0.85rem">Aucun concours de ce niveau</div>';
                }
                return filtered.slice(0, 20).map(c => `
                  <button class="toggle-row" onclick="App.selectTargetConcoursAndContinue('${c.id}')" style="border-color:${o.targetConcours === c.id ? 'var(--green-bf)' : 'var(--line)'}; background:${o.targetConcours === c.id ? '#f0fdf4' : 'white'}; cursor:pointer">
                    <div class="toggle-text">
                      <div class="toggle-label">${CATEGORIES_CONCOURS[c.categorie].icone} ${c.nom}</div>

                  </button>
                `).join('');
              })()}

            <button onclick="App.selectTargetConcoursAndContinue('')" style="background:transparent; color:var(--ink-mute); padding:0.6rem; width:100%; font-size:0.85rem; text-decoration:underline; margin-bottom:0.6rem">Je ne sais pas encore →</button>

            <button class="auth-btn" onclick="App.onboardingNext()">Continuer →</button>

          ${o.step === 3 ? `
            <div class="auth-title">Notifications quotidiennes</div>

  onboardingBack() {
    if (this.state.onboarding.step > 1) {
      this.state.onboarding.step--;
      this.render();
    }
  },

  onboardingNext() {
    const o = this.state.onboarding;
    if (o.step === 1) {
      const name = document.getElementById('onboardName')?.value.trim();
      const city = document.getElementById('onboardCity')?.value;
      if (!name) { this.toast('Saisis ton prénom ou pseudo'); return; }
      o.name = name;
      o.city = city || '';
      o.step = 2;
      this.render();
    } else if (o.step === 2) {
      o.step = 3;
      this.render();
    }
  },

  selectTargetConcours(id) {
    this.state.onboarding.targetConcours = id;
    this.render();
  },

  // BUG #2 FIX : filtre par niveau dans l'onboarding
  setOnboardingNiveau(niveau) {
    this.state.onboarding.filterNiveau = niveau;
    this.render();
  },

  // V34 : Filtre des concours selon le niveau scolaire de l'utilisateur
  // Mapping niveau utilisateur → niveaux de concours acceptés
  filterConcoursByLevel(userLevel) {
    if (!userLevel || userLevel === '') {
      // Pas de niveau choisi → tous les concours
      return CONCOURS;
    }

    // Hiérarchie : un utilisateur de niveau BAC peut viser concours BEPC OU BAC
    // Un utilisateur Licence peut viser BEPC, BAC, Licence
    const niveauxAcceptes = {
      'CEP': ['CEP'],
      'BEPC': ['CEP', 'BEPC'],
      'BAC': ['CEP', 'BEPC', 'BAC'],
      'Licence': ['CEP', 'BEPC', 'BAC', 'Licence', 'BAC+3', 'BAC+4', 'BAC+5'],
      'Licence et plus': ['CEP', 'BEPC', 'BAC', 'Licence', 'BAC+3', 'BAC+4', 'BAC+5', 'Master', 'Doctorat']
    };

    const accepts = niveauxAcceptes[userLevel] || [];
    if (accepts.length === 0) return CONCOURS;

    return CONCOURS.filter(c => {
      const niv = (c.niveau || '').toUpperCase();
      return accepts.some(a => niv.includes(a.toUpperCase()));
    });
  },

  // V34 : quand le niveau change dans le formulaire de profil, rafraîchir la liste
  onEditLevelChange() {
    // Sauvegarder temporairement les valeurs en cours pour ne pas perdre la saisie
    const tempName = document.getElementById('editName')?.value || '';
    const tempCity = document.getElementById('editCity')?.value || '';
    const newLevel = document.getElementById('editLevel')?.value || '';

    // Mettre à jour le state temporairement
    this.state.user = {
      ...this.state.user,
      name: tempName,
      city: tempCity,
      educationLevel: newLevel
    };
    // Re-render pour rafraîchir la liste des concours
    this.render();
  },

  // BUG #1 FIX : variante qui sélectionne ET avance à l'étape suivante
  selectTargetConcoursAndContinue(id) {
    this.state.onboarding.targetConcours = id;
    this.state.onboarding.step = 3;
    this.render();
  },

  async enableNotifsAndFinish() {
    const result = await Notifications.requestPermission();
    if (result.success) {
      this.state.user.notificationsEnabled = true;
      this.toast('🔔 Notifications activées !');
    } else if (result.reason === 'denied') {
      this.toast('Notifications bloquées dans les paramètres du navigateur');
    } else if (result.reason === 'file_protocol') {
      // BUG #3 FIX : message clair quand l'app est ouverte en file://
      this.toast('⚠️ Les notifications ne marchent pas en local. Elles marcheront sur Play Store !');
    } else if (result.reason === 'unsupported') {
      this.toast('Ce navigateur ne supporte pas les notifications');
    } else {
      this.toast('Notifications non activées');
    }
    this.finishOnboarding(result.success);
  },

  async finishOnboarding(notifsOK) {
    const o = this.state.onboarding;
    this.state.user = {
      ...this.state.user,
      name: o.name,
      nom: o.name,
      city: o.city,
      targetConcours: o.targetConcours,
      notificationsEnabled: notifsOK
    };
    this.save();

    if (window.FirebaseAuth && window.FirebaseAuth.isFirebaseReady && window.FirebaseAuth.isLoggedIn()) {
      try {
        await window.FirebaseAuth.updateProfile({
          displayName: o.name,
          city: o.city,
          targetConcours: o.targetConcours,
          notificationsEnabled: notifsOK
        });
      } catch (e) { console.error('Update profile :', e); }
    }

    this.toast('🎉 Bienvenue ' + o.name + ' !');
    this.navigate('home');

    // Proposer l'activation biométrique après 1.5s (laisser l'écran d'accueil charger)
    setTimeout(() => this.showBiometricEnrollPrompt(), 1500);

  async saveProfile() {
    const updates = {
      name: document.getElementById('editName').value.trim(),
      city: document.getElementById('editCity').value,
      educationLevel: document.getElementById('editLevel').value,
      targetConcours: document.getElementById('editConcours').value
    };

    if (!updates.name) { this.toast('Le nom est obligatoire'); return; }

    this.state.user = { ...this.state.user, ...updates };
    this.save();
    if (window.FirebaseAuth && window.FirebaseAuth.isFirebaseReady && window.FirebaseAuth.isLoggedIn()) {
      try {
        await window.FirebaseAuth.updateProfile({
          displayName: updates.name,
          city: updates.city,
          educationLevel: updates.educationLevel,
          targetConcours: updates.targetConcours
        });
      } catch (e) { console.error('Erreur sauvegarde cloud :', e); }
    }

    this.toast('✓ Profil mis à jour');
    this.navigate('profile');
  },

  // ===========================================
  // === GESTION NOTIFICATIONS
  // ===========================================

  async toggleNotifications() {
    if (Notifications.isEnabled()) {
      this.state.user.notificationsEnabled = !this.state.user.notificationsEnabled;
      this.save();
      this.toast(this.state.user.notificationsEnabled ? '🔔 Notifications activées' : '🔕 Notifications désactivées');
      this.render();
    } else {
      const result = await Notifications.requestPermission();
      if (result.success) {
        this.state.user.notificationsEnabled = true;
        this.save();
        this.toast('🔔 Notifications activées');
      } else if (result.reason === 'denied') {
        this.toast('Notifications bloquées. Va dans les paramètres du navigateur.');
      }
      this.render();
    }
  },

  async testNotification() {
    if (!Notifications.isEnabled()) {
      this.toast('Active d\'abord les notifications');
      return;
    }
    const ok = await Notifications.testNotification();
    if (ok) this.toast('🔔 Notification test envoyée');
  },

  // === Gestion des overrides admin (matières masquées/grisées/ajoutées/retirées) ===
  loadConcoursOverrides() {
    try {
      // 1. Récupérer les modifications locales de l'utilisateur (s'il en a fait depuis l'admin)
      const local = JSON.parse(localStorage.getItem('bara_concours_matieres_overrides') || '{}');
      // Si l'utilisateur a des modifs locales, on les utilise (priorité)
      if (Object.keys(local).length > 0) {
        return local;
      }
      // 2. Sinon, utiliser les overrides par défaut définis dans data/concours.js
      // Ces overrides ont été décidés par l'équipe Bara Formation
      if (window.DEFAULT_CONCOURS_OVERRIDES) {
        return window.DEFAULT_CONCOURS_OVERRIDES;
      }
      return {};
    } catch (e) {
      return {};
    }
  },

  // Récupérer les matières effectives d'un concours (avec overrides appliqués)
  // ATTENTION : on EXCLUT les matières "hidden" (l'utilisateur ne doit pas les voir)
  getEffectiveMatieres(concours) {
    const allOverrides = this.loadConcoursOverrides();
    const overrides = allOverrides[concours.id] || { added: [], removed: [], hidden: [], greyed: [] };

    // Base : matières d'origine
    let matieres = [...concours.matieres];

    // Ajouter les matières "added"
    (overrides.added || []).forEach(m => {
      if (!matieres.includes(m)) matieres.push(m);
    });

    // Retirer les "removed" ET les "hidden"
    matieres = matieres.filter(m => {
      if ((overrides.removed || []).includes(m)) return false;
      if ((overrides.hidden || []).includes(m)) return false;
      return true;
    });

    return matieres;
  },

  // Vérifier si une matière est grisée dans un concours
  isMatiereGreyed(concoursId, matiereId) {
    const allOverrides = this.loadConcoursOverrides();
    const overrides = allOverrides[concoursId] || {};
    return (overrides.greyed || []).includes(matiereId);
  },

  // Carte d'un sujet déjà fait dans l'historique
  renderSujetHistorique(sujet, mode) {
    const pct = Math.round((sujet.score / sujet.total) * 100);
    const date = new Date(sujet.date).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
    const scoreClass = pct >= 70 ? 'good' : pct >= 50 ? 'mid' : 'low';

    return `
      <div class="sujet-history-card">
        <div class="sujet-history-num">N°${sujet.numero}</div>
        <div class="sujet-history-content">
          <div class="sujet-history-title">Sujet ${sujet.numero}</div>
          <div class="sujet-history-meta">${date} • ${this.formatDuration(sujet.duration)}</div>
        </div>
        <div class="sujet-history-score ${scoreClass}">
          <div class="sujet-history-score-pct">${pct}%</div>
          <div class="sujet-history-score-frac">${sujet.score}/${sujet.total}</div>
        </div>
        <button class="sujet-history-refaire" onclick='App.refaireSujet(${JSON.stringify({numero: sujet.numero, questions: sujet.questions, mode}).replace(/"/g, "&quot;")})'>🔁</button>
      </div>
    `;
  },

  // Refaire un sujet déjà fait avec les mêmes questions
  refaireSujet(data) {
    if (!data || !data.questions) return;
    this.startQCM(data.mode, { numero: data.numero, questions: data.questions });
  },

  formatDuration(seconds) {
    if (!seconds) return '0s';
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    if (m === 0) return s + 's';
    if (m < 60) return m + 'min ' + (s > 0 ? s + 's' : '');
    const h = Math.floor(m / 60);
    return h + 'h ' + (m % 60) + 'min';
  },

  // === QCM ===
  startQCM(mode, refaireSujet = null) {
    const isPremium = window.PremiumService && window.PremiumService.isUserPremium(this.state.user);

    if (mode === 'exam' && !isPremium) {
      this.toast('🔒 Le mode examen est réservé aux membres Premium');
      setTimeout(() => this.navigate('premium'), 800);
      return;
    }

    const matId = this.state.currentMatiere;
    const allQ = (QUESTIONS && QUESTIONS[matId]) || [];
    if (allQ.length === 0) {
      this.toast('Aucune question disponible pour cette matière');
      return;
    }

    const cibleNb = mode === 'exam' ? this.SujetsManager.QUESTIONS_PAR_SUJET_EXAM : this.SujetsManager.QUESTIONS_PAR_SUJET_TRAIN;
    const dureeMinutes = this.SujetsManager.DUREE_EXAM_MINUTES;

    let questions, numero;

    if (refaireSujet && refaireSujet.questions) {
      // On refait un sujet déjà fait → mêmes questions
      questions = [...refaireSujet.questions];
      numero = refaireSujet.numero;
      this.toast(`🔁 Refaire le Sujet ${numero}`);
    } else {
      // Nouveau sujet → tirage aléatoire
      questions = this.SujetsManager.genererQuestions(matId, mode);
      numero = this.SujetsManager.getProchainNumero(matId, mode);
    }

    this.state.currentMode = mode;
    this.state.currentSujet = numero;
    this.state.qcm = {
      questions,
      current: 0,
      answers: new Array(questions.length).fill(null),
      score: 0,
      startTime: Date.now(),
      timeLimit: mode === 'exam' ? dureeMinutes * 60 : 0,
      timeLeft: mode === 'exam' ? dureeMinutes * 60 : 0,
      timerInterval: null,
      numero: numero,
      matiereId: matId,
      concoursId: this.state.currentConcours,
      isResumed: false
    };

    this.navigate('qcm');

    if (mode === 'exam') {
      this.startExamTimer();
      // Sauvegarder dès le début pour permettre la reprise
      this.savePendingExam();
    }
  },

  // Démarrer/redémarrer le timer d'examen
  startExamTimer() {
    if (this.state.qcm.timerInterval) clearInterval(this.state.qcm.timerInterval);
    this.state.qcm.timerInterval = setInterval(() => {
      this.state.qcm.timeLeft--;
      if (this.state.qcm.timeLeft <= 0) {
        clearInterval(this.state.qcm.timerInterval);
        this.SujetsManager.clearPendingExam();
        this.endQCM();
        return;
      }
      this.updateTimer();
      // Sauvegarder toutes les 5 secondes pendant l'examen
      if (this.state.qcm.timeLeft % 5 === 0) {
        this.savePendingExam();
      }
    }, 1000);
  },

  // Sauvegarder l'examen en cours
  savePendingExam() {
    if (this.state.currentMode !== 'exam') return;
    this.SujetsManager.savePendingExam({
      matiereId: this.state.qcm.matiereId,
      concoursId: this.state.qcm.concoursId,
      questions: this.state.qcm.questions,
      current: this.state.qcm.current,
      answers: this.state.qcm.answers,
      score: this.state.qcm.score,
      timeLeft: this.state.qcm.timeLeft,
      totalTime: this.state.qcm.timeLimit,
      numero: this.state.qcm.numero
    });
  },

  // Mettre l'examen en pause manuellement
  pauseExam() {
    if (this.state.currentMode !== 'exam') return;
    if (this.state.qcm.timerInterval) clearInterval(this.state.qcm.timerInterval);
    this.savePendingExam();
    this.toast('⏸ Examen mis en pause. Tu peux reprendre plus tard.', 'success');
    setTimeout(() => this.navigate('home'), 800);
  },

  // Reprendre un examen en pause
  resumePendingExam() {
    const pending = this.SujetsManager.loadPendingExam();
    if (!pending) {
      this.toast('Aucun examen en pause');
      return;
    }

    // Trouver le concours et la matière
    this.state.currentConcours = pending.concoursId;
    this.state.currentMatiere = pending.matiereId;
    this.state.currentMode = 'exam';
    this.state.currentSujet = pending.numero;
    this.state.showResumeDialog = false;

    this.state.qcm = {
      questions: pending.questions,
      current: pending.current,
      answers: pending.answers,
      score: pending.score,
      startTime: Date.now(),
      timeLimit: pending.totalTime,
      timeLeft: pending.timeLeft,
      timerInterval: null,
      numero: pending.numero,
      matiereId: pending.matiereId,
      concoursId: pending.concoursId,
      isResumed: true
    };

    this.navigate('qcm');
    this.startExamTimer();

    const minutes = Math.floor(pending.timeLeft / 60);
    const secondes = pending.timeLeft % 60;
    this.toast(`▶️ Examen repris à la Q${pending.current + 1} • ${minutes}:${String(secondes).padStart(2, '0')} restantes`, 'success');
  },

  // Annuler l'examen en pause
  cancelPendingExam() {
    if (!confirm('Annuler l\'examen en pause ? Cette action est irréversible.')) return;
    this.SujetsManager.clearPendingExam();
    this.state.showResumeDialog = false;
    this.render();
    this.toast('🗑 Examen annulé');
  },

  renderQCM() {
    const q = this.state.qcm.questions[this.state.qcm.current];
    if (!q) return this.renderResults();

    const m = MATIERES_CATALOG[this.state.currentMatiere];
    const isExam = this.state.currentMode === 'exam';
    const answer = this.state.qcm.answers[this.state.qcm.current];
    const answered = answer !== null;
    const progress = ((this.state.qcm.current + 1) / this.state.qcm.questions.length) * 100;
    const letters = ['A','B','C','D'];

    return `
      <div class="page qcm-container">
        <div class="qcm-topbar">
          <button class="qcm-quit" onclick="App.confirmQuitQCM()">✕</button>
          <div class="qcm-progress-wrap">
            <div class="qcm-progress-fill" style="width:${progress}%"></div>
          </div>
          ${isExam ? `
            <button class="qcm-pause" onclick="App.pauseExam()" title="Mettre en pause">⏸</button>
            <div class="qcm-timer" id="timer">⏱ ${this.formatTime(this.state.qcm.timeLeft)}</div>
          ` : ''}
        </div>

        <div class="qcm-meta-row">
          <div class="qcm-num">${m.icone} ${m.nom} ${this.state.qcm.numero ? `• Sujet ${this.state.qcm.numero}` : ''} • Q${this.state.qcm.current + 1}/${this.state.qcm.questions.length}</div>
          <div class="qcm-score-mini">${this.state.qcm.score} bonnes</div>
        </div>

        <div class="qcm-card">
          <div class="qcm-question">${q.q}</div>
          <div class="qcm-options">
            ${q.o.map((opt, i) => {
              let cls = 'qcm-option';
              if (answered && !isExam) {
                cls += ' locked';
                if (i === q.r) cls += ' correct';
                else if (i === answer && answer !== q.r) cls += ' wrong';
              } else if (isExam && answer === i) {
                // Mode examen : marquer la sélection (même si on peut encore changer)
                cls += ' selected';
              }
              return `
                <button class="${cls}" onclick="App.pickAnswer(${i})">
                  <div class="qcm-option-letter">${letters[i]}</div>
                  <span>${opt}</span>
                </button>
              `;
            }).join('')}
          </div>

          ${(answered && !isExam) ? `
            <div class="qcm-explication show">
              <strong>📌 Explication :</strong> ${q.x}
            </div>
          ` : ''}
        </div>

        <div class="qcm-actions">
          ${!isExam && this.state.qcm.current > 0 ? `<button class="btn-prev" onclick="App.prevQuestion()">← Précédent</button>` : ''}
          <button class="btn-next" onclick="App.nextQuestion()" ${(!answered && !isExam) || (isExam && !answered) ? 'disabled' : ''}>
            ${this.state.qcm.current === this.state.qcm.questions.length - 1 ? 'Terminer 🏁' : 'Suivant →'}
          </button>
        </div>
      </div>
    `;
  },

  pickAnswer(i) {
    const isExam = this.state.currentMode === 'exam';
    const cur = this.state.qcm.current;
    const q = this.state.qcm.questions[cur];

    // En mode entraînement : verrouillé après réponse
    if (!isExam && this.state.qcm.answers[cur] !== null) return;

    // === FREEMIUM : Vérifier la limite quotidienne ===
    const isPremium = window.PremiumService && window.PremiumService.isUserPremium(this.state.user);
    if (!isPremium && this.state.qcm.answers[cur] === null) {
      // Première réponse à cette question : on incrémente
      if (this.FreemiumManager.hasReachedLimit(this.state.user)) {
        // Limite atteinte → bloquer et proposer Premium
        this.showFreemiumLimitDialog();
        return;
      }
    }

    // Récup ancien score si on change de réponse en mode examen
    const previousAnswer = this.state.qcm.answers[cur];
    if (isExam && previousAnswer !== null && previousAnswer === q.r) {
      this.state.qcm.score--;
    }

    // Incrémenter le compteur freemium seulement à la 1ère réponse
    if (this.state.qcm.answers[cur] === null) {
      this.FreemiumManager.incrementCount(this.state.user);
    }

    this.state.qcm.answers[cur] = i;
    if (i === q.r) {
      if (!isExam || previousAnswer !== q.r) this.state.qcm.score++;
    }

    // Sauvegarde automatique en mode examen à chaque réponse
    if (isExam) this.savePendingExam();

    this.render();
  },

  // Afficher le dialogue de limite freemium atteinte
  showFreemiumLimitDialog() {
    this.state.showFreemiumDialog = true;
    this.render();
  },

  closeFreemiumDialog() {
    this.state.showFreemiumDialog = false;
    this.render();
  },

  goToPremium() {
    this.state.showFreemiumDialog = false;
    this.navigate('premium');
  },

  nextQuestion() {
    if (this.state.qcm.current < this.state.qcm.questions.length - 1) {
      this.state.qcm.current++;
      // Sauvegarde auto en mode examen à chaque changement de question
      if (this.state.currentMode === 'exam') this.savePendingExam();
      this.render();
    } else {
      this.endQCM();
    }
  },

  prevQuestion() {
    if (this.state.qcm.current > 0) {
      this.state.qcm.current--;
      this.render();
    }
  },

  updateTimer() {
    const t = document.getElementById('timer');
    if (!t) return;
    t.textContent = `⏱ ${this.formatTime(this.state.qcm.timeLeft)}`;
    if (this.state.qcm.timeLeft <= 60) t.className = 'qcm-timer danger';
    else if (this.state.qcm.timeLeft <= 300) t.className = 'qcm-timer warning';
  },

  confirmQuitQCM() {
    if (confirm('Voulez-vous vraiment quitter ? Votre progression sera perdue.')) {
      if (this.state.qcm.timerInterval) clearInterval(this.state.qcm.timerInterval);
      this.navigate('concours-detail');
    }
  },

  endQCM() {
    if (this.state.qcm.timerInterval) clearInterval(this.state.qcm.timerInterval);
    const duration = Math.round((Date.now() - this.state.qcm.startTime) / 1000);

    // Effacer l'examen en pause s'il y en avait un (puisque finalisé)
    if (this.state.currentMode === 'exam') {
      this.SujetsManager.clearPendingExam();
    }

    // Sauvegarder le sujet dans l'historique des sujets numérotés (si pas un refaire)
    if (this.state.qcm.numero && !this.state.qcm.isRefait) {
      this.SujetsManager.saveSujet(
        this.state.qcm.matiereId || this.state.currentMatiere,
        this.state.currentMode,
        {
          numero: this.state.qcm.numero,
          date: Date.now(),
          score: this.state.qcm.score,
          total: this.state.qcm.questions.length,
          duration,
          concoursId: this.state.qcm.concoursId || (this.state.currentConcours && this.state.currentConcours.id),
          questions: this.state.qcm.questions,
          answers: this.state.qcm.answers
        }
      );
    }

    // Sauvegarder dans l'historique général
    this.state.history.push({
      date: Date.now(),
      concoursId: this.state.currentConcours ? this.state.currentConcours.id : null,
      matiereId: this.state.currentMatiere,
      mode: this.state.currentMode,
      score: this.state.qcm.score,
      total: this.state.qcm.questions.length,
      duration,
      sujetNumero: this.state.qcm.numero || null
    });

    // Mettre à jour les stats par matière
    const matId = this.state.currentMatiere;
    if (!this.state.matiereStats[matId]) {
      this.state.matiereStats[matId] = { attempts: 0, totalScore: 0, totalQuestions: 0 };
    }
    this.state.matiereStats[matId].attempts++;
    this.state.matiereStats[matId].totalScore += this.state.qcm.score;
    this.state.matiereStats[matId].totalQuestions += this.state.qcm.questions.length;

    this.save();

    if (window.FirebaseAuth && window.FirebaseAuth.isFirebaseReady && window.FirebaseAuth.isLoggedIn()) {
      window.FirebaseAuth.saveQCMResult({
        date: Date.now(),
        concoursId: this.state.currentConcours ? this.state.currentConcours.id : null,
        matiereId: this.state.currentMatiere,
        mode: this.state.currentMode,
        score: this.state.qcm.score,
        total: this.state.qcm.questions.length,
        duration,
        sujetNumero: this.state.qcm.numero || null
      }).catch(e => console.error('Sync error :', e));
    }

    this.navigate('results');
  },

  // === RESULTS ===
  renderResults() {
    const { score, questions, startTime } = this.state.qcm;
    const total = questions.length;
    const pct = Math.round(score / total * 100);
    const duration = Math.round((Date.now() - startTime) / 1000);
    const m = MATIERES_CATALOG[this.state.currentMatiere];

    let mention, sub;
    if (pct >= 80) { mention = 'Excellent !'; sub = 'Tu maîtrises cette matière. Tu es prêt(e) pour le concours.'; }
    else if (pct >= 60) { mention = 'Bien'; sub = 'Bon niveau. Continue à réviser pour viser l\'excellence.'; }
    else if (pct >= 40) { mention = 'Passable'; sub = 'Des efforts supplémentaires sont nécessaires. Refais le QCM.'; }
    else { mention = 'À retravailler'; sub = 'Ne te décourage pas ! Reprends les bases avant de réessayer.'; }

    return `
      <div class="page">
        <header class="header">
          <div class="header-bar">
            <button class="header-back" onclick="App.navigate('home')">←</button>
            <div class="header-title-row">Résultats</div>
            <div class="header-spacer"></div>
          </div>
          <div class="header-h1" style="font-size:1.5rem">${m.icone} ${m.nom}</div>
          <div class="header-sub">${this.state.currentMode === 'exam' ? 'Mode examen chronométré' : 'Mode entraînement'}</div>
        </header>

        <div class="results">
          <div class="results-circle-wrap">
            <div class="results-circle">
              <div class="num">${score}</div>
              <div class="denom">sur ${total}</div>
            </div>
          </div>

          <div class="results-mention">${mention}</div>
          <div class="results-sub">${sub}</div>

          <div class="results-stats">
            <div class="results-stat">
              <div class="results-stat-num green">${score}</div>
              <div class="results-stat-label">Bonnes</div>
            </div>
            <div class="results-stat">
              <div class="results-stat-num red">${total - score}</div>
              <div class="results-stat-label">Erreurs</div>
            </div>
            <div class="results-stat">
              <div class="results-stat-num gold">${pct}%</div>
              <div class="results-stat-label">Score</div>
            </div>
          </div>

          <div class="results-stats" style="margin-bottom:1.5rem">
            <div class="results-stat" style="grid-column:span 3">
              <div class="results-stat-num" style="color:var(--green-bf)">${this.formatTime(duration)}</div>
              <div class="results-stat-label">Durée totale</div>
            </div>
          </div>

          <div class="results-actions">
            <button class="btn-primary" onclick="App.showCorrection()">📖 Voir le corrigé détaillé</button>
            <button class="btn-secondary" onclick="App.startQCM('${this.state.currentMode}')">🔄 Refaire un QCM</button>
            <button class="btn-secondary" onclick="App.navigate('concours-detail')">← Retour aux matières</button>
          </div>
        </div>
      </div>
    `;
  },

  // === CORRECTION DÉTAILLÉE (mode examen) ===
  showCorrection() {
    this.navigate('correction');
  },

  renderCorrection() {
    const { questions, answers, score } = this.state.qcm;
    const total = questions.length;
    const m = MATIERES_CATALOG[this.state.currentMatiere];
    const letters = ['A','B','C','D'];

    return `
      <div class="page">
        <header class="header">
          <div class="header-bar">
            <button class="header-back" onclick="App.navigate('results')">←</button>
            <div class="header-title-row">Corrigé détaillé</div>
            <div class="header-spacer"></div>
          </div>
          <div class="header-h1" style="font-size:1.4rem">📖 ${m.icone} ${m.nom}</div>
          <div class="header-sub">Score : ${score}/${total} • Revois chaque question pour progresser</div>
        </header>

        <div class="content mt-overlap">

          <div style="background:#f0f9ff; border-left:3px solid #2563eb; padding:0.9rem 1rem; border-radius:0 var(--radius-sm) var(--radius-sm) 0; font-size:0.82rem; color:#1e40af; line-height:1.5; margin-bottom:1rem">
            <strong>💡 Conseil :</strong> Lis attentivement les explications des questions où tu t'es trompé(e). C'est en comprenant ses erreurs qu'on progresse !
          </div>

          ${questions.map((q, i) => this.renderCorrectionItem(q, i, answers[i], letters)).join('')}

          <div style="margin-top:1.5rem; display:flex; flex-direction:column; gap:0.6rem">
            <button class="btn-primary" onclick="App.startQCM('${this.state.currentMode}')" style="width:100%">🔄 Refaire un nouveau QCM</button>
            <button class="btn-secondary" onclick="App.navigate('concours-detail')" style="width:100%">← Retour aux matières</button>
          </div>

        </div>
      </div>
    `;
  },

  renderCorrectionItem(q, index, userAnswer, letters) {
    const isCorrect = userAnswer === q.r;
    const noAnswer = userAnswer === null || userAnswer === undefined;

    let statusBadge = '';
    let statusColor = '';
    if (noAnswer) {
      statusBadge = '⊘ Sans réponse';
      statusColor = '#6b7280';
    } else if (isCorrect) {
      statusBadge = '✓ Correct';
      statusColor = 'var(--success)';
    } else {
      statusBadge = '✗ Incorrect';
      statusColor = 'var(--danger)';
    }

    return `
      <div style="background:white; border-radius:var(--radius-lg); padding:1.2rem; margin-bottom:0.8rem; border:1px solid var(--line-soft); box-shadow:var(--shadow-sm)">

        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:0.8rem">
          <div style="font-size:0.78rem; font-weight:700; color:var(--ink-mute); text-transform:uppercase; letter-spacing:0.04em">Question ${index + 1}/${this.state.qcm.questions.length}</div>
          <div style="font-size:0.72rem; font-weight:700; padding:0.25rem 0.65rem; border-radius:999px; background:${statusColor}22; color:${statusColor}">${statusBadge}</div>
        </div>

        <div style="font-size:0.95rem; font-weight:700; color:var(--ink); line-height:1.5; margin-bottom:1rem">${q.q}</div>

        <div style="display:flex; flex-direction:column; gap:0.4rem; margin-bottom:0.9rem">
          ${q.o.map((opt, oi) => {
            const isUserChoice = oi === userAnswer;
            const isRightAnswer = oi === q.r;

            let bg = '#fafafa';
            let border = 'var(--line)';
            let color = 'var(--ink)';
            let icon = '';

            if (isRightAnswer) {
              bg = '#f0fdf4';
              border = 'var(--success)';
              color = '#166534';
              icon = '<span style="margin-left:auto; color:var(--success); font-weight:800; font-size:1.1rem">✓</span>';
            }
            if (isUserChoice && !isRightAnswer) {
              bg = '#fef2f2';
              border = 'var(--danger)';
              color = '#991b1b';
              icon = '<span style="margin-left:auto; color:var(--danger); font-weight:800; font-size:1.1rem">✗</span>';
            }
            if (isUserChoice && isRightAnswer) {
              icon = '<span style="margin-left:auto; color:var(--success); font-weight:800; font-size:1.1rem">✓ Ton choix</span>';
            }

            return `
              <div style="display:flex; align-items:center; gap:0.7rem; padding:0.7rem 0.85rem; background:${bg}; border:1.5px solid ${border}; border-radius:10px; font-size:0.88rem; color:${color}">
                <div style="width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.75rem; flex-shrink:0; background:white; border:1.5px solid ${border}">${letters[oi]}</div>
                <span style="flex:1">${opt}</span>
                ${icon}
              </div>
            `;
          }).join('')}
        </div>

        <div style="background:#fffbeb; border-left:3px solid var(--gold-bf-dark); border-radius:0 var(--radius-sm) var(--radius-sm) 0; padding:0.85rem 1rem; font-size:0.85rem; color:#713f12; line-height:1.55">
          <strong style="color:#854d0e">📌 Explication :</strong> ${q.x}
        </div>
      </div>
    `;
  },

  // === STATS ===
  renderStats() {
    const total = this.state.history.length;
    const avgScore = total > 0
      ? Math.round(this.state.history.reduce((s, h) => s + (h.score / h.total * 100), 0) / total)
      : 0;
    const totalTime = this.state.history.reduce((s, h) => s + (h.duration || 0), 0);

    // Performance par matière
    const matPerf = Object.entries(this.state.matiereStats)
      .map(([mid, stats]) => ({
        mid,
        m: MATIERES_CATALOG[mid],
        pct: Math.round(stats.totalScore / stats.totalQuestions * 100),
        attempts: stats.attempts
      }))
      .filter(x => x.m && x.attempts > 0)
      .sort((a, b) => b.pct - a.pct);

    return `
      <div class="page">
        <header class="header">
          <div class="header-h1" style="font-size:1.6rem">📊 Mes <span>Statistiques</span></div>
          <div class="header-sub">Suis ta progression matière par matière</div>
        </header>

        <div class="content mt-overlap">
          ${total === 0 ? `
            <div class="empty-state">
              <div class="empty-icon">📈</div>
              <div class="empty-title">Aucune statistique pour le moment</div>
              <div class="empty-sub">Réalise ton premier QCM pour voir tes performances ici.</div>
            </div>
          ` : `
            <div class="big-stat">
              <div class="big-stat-icon">📝</div>
              <div class="big-stat-text">
                <div class="big-stat-label">QCM réalisés</div>
                <div class="big-stat-value">${total}</div>
              </div>
            </div>
            <div class="big-stat">
              <div class="big-stat-icon" style="background:linear-gradient(135deg,var(--gold-bf),var(--gold-bf-dark));color:var(--green-bf-dark)">⭐</div>
              <div class="big-stat-text">
                <div class="big-stat-label">Score moyen</div>
                <div class="big-stat-value">${avgScore}<small>%</small></div>
              </div>
            </div>
            <div class="big-stat">
              <div class="big-stat-icon" style="background:linear-gradient(135deg,#dc2626,#991b1b)">⏱</div>
              <div class="big-stat-text">
                <div class="big-stat-label">Temps de pratique</div>
                <div class="big-stat-value">${Math.round(totalTime / 60)}<small> min</small></div>
              </div>
            </div>

            ${matPerf.length > 0 ? `
              <div class="section-title" style="margin-top:1.2rem">Performance par matière</div>
              ${matPerf.map(p => `
                <div class="matiere-perf">
                  <div class="matiere-perf-head">
                    <div class="matiere-perf-name">${p.m.icone} ${p.m.nom}</div>
                    <div class="matiere-perf-pct" style="color:${p.m.couleur}">${p.pct}%</div>
                  </div>
                  <div class="matiere-perf-bar">
                    <div class="matiere-perf-bar-fill" style="width:${p.pct}%; background:${p.m.couleur}"></div>
                  </div>
                </div>
              `).join('')}
            ` : ''}
          `}
        </div>
      </div>
    `;
  },

  // === PROFILE ===
  renderProfile() {
    const u = this.state.user;
    const isLoggedIn = u.isLoggedIn;
    const targetConcours = u.targetConcours ? CONCOURS.find(c => c.id === u.targetConcours) : null;
    const notifsStatus = Notifications.getStatus();

    return `
      <div class="page">
        <header class="header">
          <div class="header-h1" style="font-size:1.6rem">Mon <span>Profil</span></div>
          <div class="header-sub">${isLoggedIn ? 'Compte connecté' : 'Mode invité'}</div>
        </header>

        <div class="content mt-overlap">

          ${isLoggedIn ? `
            <div class="profile-card connected">
              <div class="profile-avatar">${(u.name || 'A').charAt(0).toUpperCase()}</div>
              <div class="profile-name">${u.name || 'Apprenant'}</div>
              <div class="profile-status">${(window.PremiumService && window.PremiumService.isUserPremium(u)) ? `⭐ Premium · ${window.PremiumService.daysRemaining(u)}j restant${window.PremiumService.daysRemaining(u) > 1 ? 's' : ''}` : '👤 Compte Gratuit'}</div>
              ${u.phoneNumber ? `<div class="profile-phone">${(window.FirebaseAuth && window.FirebaseAuth.formatPhone) ? window.FirebaseAuth.formatPhone(u.phoneNumber) : (u.phoneNumber || "")}</div>` : ''}
              <div class="profile-info-row">
                ${u.city ? `<span class="profile-info-tag">📍 ${u.city}</span>` : ''}
                ${u.educationLevel ? `<span class="profile-info-tag">🎓 ${u.educationLevel}</span>` : ''}
                ${targetConcours ? `<span class="profile-info-tag">🎯 ${targetConcours.sigle}</span>` : ''}
              </div>
            </div>
          ` : `
            <div class="signup-prompt-card">
              <div class="signup-prompt-icon">📱</div>
              <div class="signup-prompt-title">Crée ton <span>compte</span></div>
              <div class="signup-prompt-desc">Sauvegarde ta progression, retrouve tes scores partout et reçois des rappels quotidiens.</div>
              <button class="signup-prompt-cta" onclick="App.navigate('auth-phone')">Créer mon compte →</button>
            </div>
          `}

          ${!u.isPremium ? `
            <div class="premium-banner" onclick="App.navigate('premium')">
              <div class="premium-icon">⭐</div>
              <div class="premium-title">Passez Premium</div>
              <div class="premium-desc">Mode examen, QCM avancés, fiches PDF et plus encore</div>
              <button class="premium-cta">Découvrir Premium →</button>

    if (!this.state.user.isLoggedIn) {

    const sel = this.state.premiumSelection;
    if (!sel || !sel.plan) return;

    this.toast('⏳ Initialisation du paiement...');
    try {
      const result = await window.PremiumService.initCinetPayPayment(
        sel.plan,
        this.state.user,
        sel.operator || 'orange'
      );
      if (result.success && result.paymentUrl) {
        // Sauvegarder la référence pour vérification au retour
        sessionStorage.setItem('bara_last_payment_ref', result.reference);
        sessionStorage.setItem('bara_last_payment_plan', sel.plan);
        // Rediriger vers CinetPay
        window.location.href = result.paymentUrl;
      } else {
        this.toast('❌ Erreur : ' + (result.error || 'Impossible de démarrer le paiement'));

    } catch (e) {
      this.toast('❌ ' + e.message);

  toggleUpvote(topicId, event) {
    if (event) event.stopPropagation();

    if (!this.state.user.isLoggedIn) {
      this.toast('🔒 Connecte-toi pour voter');
      return;
    }

    const upvotes = JSON.parse(localStorage.getItem('bara_upvotes') || '[]');
    const topics = this.getForumTopics();
    const topic = topics.find(t => t.id === topicId);
    if (!topic) return;

    if (upvotes.includes(topicId)) {
      const idx = upvotes.indexOf(topicId);
      upvotes.splice(idx, 1);
      topic.upvotes = Math.max(0, (topic.upvotes || 0) - 1);
    } else {
      upvotes.push(topicId);
      topic.upvotes = (topic.upvotes || 0) + 1;
    }

    localStorage.setItem('bara_upvotes', JSON.stringify(upvotes));
    this.saveForumTopics();
    this.render();
  },

  reportTopic(topicId) {
    if (!confirm('Voulez-vous signaler ce sujet pour modération ?')) return;
    const reports = JSON.parse(localStorage.getItem('bara_reports') || '[]');
    if (!reports.includes(topicId)) {
      reports.push(topicId);
      localStorage.setItem('bara_reports', JSON.stringify(reports));

    topic.replyCount = topic.replies.length;

    replyHistory.push({ type: 'reply', timestamp: Date.now() });
    localStorage.setItem('bara_reply_history', JSON.stringify(replyHistory));

    this.saveForumTopics();
    this.toast('✓ Réponse publiée');
    this.render();

  // === EVENTS ===
  attachEvents() {
    // Empêcher le bouton retour Android de quitter l'app trop facilement
    // Phase 2 : on gérera ça avec history.pushState()
  },

  // ============================================
  // === GESTIONNAIRE DE SUJETS ET EXAMENS PAUSE
  // ============================================
  SujetsManager: {
    // Configuration
    QUESTIONS_PAR_SUJET_TRAIN: 25,
    QUESTIONS_PAR_SUJET_EXAM: 50,
    DUREE_EXAM_MINUTES: 60, // 1h pour 50 questions

    // Récupère l'historique des sujets faits pour une matière
    getHistorique(matiereId, mode) {
      try {
        const all = JSON.parse(localStorage.getItem('bara_sujets_historique') || '{}');
        const key = matiereId + '_' + mode;
        return all[key] || [];
      } catch(e) { return []; }
    },

    // Sauvegarde un sujet terminé dans l'historique
    saveSujet(matiereId, mode, sujetData) {
      try {
        const all = JSON.parse(localStorage.getItem('bara_sujets_historique') || '{}');
        const key = matiereId + '_' + mode;
        if (!all[key]) all[key] = [];
        all[key].push(sujetData);
        // Limiter à 50 sujets par matière/mode pour pas surcharger
        if (all[key].length > 50) all[key] = all[key].slice(-50);
        localStorage.setItem('bara_sujets_historique', JSON.stringify(all));
      } catch(e) { console.error('Erreur save sujet:', e); }
    },

    // Calcule le prochain numéro de sujet
    getProchainNumero(matiereId, mode) {
      const historique = this.getHistorique(matiereId, mode);
      return historique.length + 1;
    },

    // Génère les questions pour un nouveau sujet (tirage aléatoire)
    genererQuestions(matiereId, mode) {
      const allQ = (window.QUESTIONS && window.QUESTIONS[matiereId]) ? [...window.QUESTIONS[matiereId]] : [];
      if (allQ.length === 0) return [];

      const cible = mode === 'exam' ? this.QUESTIONS_PAR_SUJET_EXAM : this.QUESTIONS_PAR_SUJET_TRAIN;

      // Mélanger
      for (let i = allQ.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [allQ[i], allQ[j]] = [allQ[j], allQ[i]];
      }

      // Si on a assez de questions, on prend les N premières
      if (allQ.length >= cible) {
        return allQ.slice(0, cible);
      }
      // Sinon, on recycle pour atteindre le nombre cible
      const result = [...allQ];
      while (result.length < cible) {
        for (let i = allQ.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [allQ[i], allQ[j]] = [allQ[j], allQ[i]];
        }
        result.push(...allQ.slice(0, cible - result.length));
      }
      return result.slice(0, cible);
    },

    // === EXAMEN EN PAUSE ===
    savePendingExam(examState) {
      try {
        // On ne sauvegarde que les données essentielles, pas les références circulaires
        const toSave = {
          matiereId: examState.matiereId,
          concoursId: examState.concoursId,
          questions: examState.questions,
          current: examState.current,
          answers: examState.answers,
          score: examState.score,
          timeLeft: examState.timeLeft,
          totalTime: examState.totalTime,
          numero: examState.numero,
          savedAt: Date.now()
        };
        localStorage.setItem('bara_exam_pending', JSON.stringify(toSave));
        return true;
      } catch(e) { return false; }
    },

    loadPendingExam() {
      try {
        const saved = localStorage.getItem('bara_exam_pending');
        if (!saved) return null;
        const data = JSON.parse(saved);
        // Si plus vieux que 7 jours, on l'ignore
        if (Date.now() - data.savedAt > 7 * 24 * 60 * 60 * 1000) {
          this.clearPendingExam();
          return null;
        }
        return data;
      } catch(e) { return null; }
    },

    clearPendingExam() {
      localStorage.removeItem('bara_exam_pending');
    },

    hasPendingExam() {
      return this.loadPendingExam() !== null;
    }
  },

  // ===========================================
  // GESTIONNAIRE FREEMIUM (limite gratuite quotidienne)
  // ===========================================
  FreemiumManager: {
    // Configuration
    LIMITE_QUOTIDIENNE_GRATUITE: 30, // 30 questions par jour pour les non-Premium

    // Clé localStorage pour le compteur
    STORAGE_KEY: 'bara_freemium_counter',

    // Récupérer l'état actuel
    getState() {
      try {
        const data = JSON.parse(localStorage.getItem(this.STORAGE_KEY) || '{}');
        const today = new Date().toISOString().split('T')[0]; // YYYY-MM-DD
        // Si on est un nouveau jour, on reset
        if (data.date !== today) {
          return { date: today, count: 0 };
        }
        return data;
      } catch (e) {
        return { date: new Date().toISOString().split('T')[0], count: 0 };
      }
    },

    // Combien de questions répondues aujourd'hui
    getCountToday() {
      return this.getState().count;
    },

    // Combien il en reste aujourd'hui
    getRemaining() {
      return Math.max(0, this.LIMITE_QUOTIDIENNE_GRATUITE - this.getCountToday());
    },

    // L'utilisateur a-t-il atteint la limite ?
    hasReachedLimit(user) {
      // Premium = pas de limite
      if (window.PremiumService && window.PremiumService.isUserPremium(user)) {
        return false;
      }
      return this.getCountToday() >= this.LIMITE_QUOTIDIENNE_GRATUITE;
    },

    // Incrémenter le compteur (1 question répondue)
    incrementCount(user) {
      // Premium = on ne compte pas
      if (window.PremiumService && window.PremiumService.isUserPremium(user)) {
        return;
      }
      const state = this.getState();
      state.count++;
      localStorage.setItem(this.STORAGE_KEY, JSON.stringify(state));
    },

    // Réinitialiser (debug/admin)
    reset() {
      localStorage.removeItem(this.STORAGE_KEY);
    }
  },

  // === Charger les modifications du tableau d'admin ===
  loadAdminCustomizations() {
    try {
      // 0. Charger les annales personnalisées
      if (window.AnnalesHelper && window.AnnalesHelper.loadCustomAnnales) {
        window.AnnalesHelper.loadCustomAnnales();
      }

      // 1. Modifications des matières (renommage, icônes, etc.)
      const editedMatieres = JSON.parse(localStorage.getItem('bara_edited_matieres') || '{}');
      Object.keys(editedMatieres).forEach(id => {
        if (window.MATIERES_CATALOG[id]) {
          Object.assign(window.MATIERES_CATALOG[id], editedMatieres[id]);
        }
      });

      // 2. Questions ajoutées par l'admin
      const customQ = JSON.parse(localStorage.getItem('bara_custom_questions') || '{}');

      // 3. Questions supprimées par l'admin
      const deleted = JSON.parse(localStorage.getItem('bara_deleted_questions') || '{}');

      // 4. Questions modifiées par l'admin
      const edited = JSON.parse(localStorage.getItem('bara_edited_questions') || '{}');

      // Pour chaque matière, reconstruire la liste finale
      Object.keys(window.MATIERES_CATALOG).forEach(matiereId => {
        const defaultQ = (window.QUESTIONS && window.QUESTIONS[matiereId]) ? [...window.QUESTIONS[matiereId]] : [];
        const customMQ = customQ[matiereId] || [];
        const deletedKeys = new Set(deleted[matiereId] || []);
        const editedMap = edited[matiereId] || {};

        // Filtrer les questions par défaut supprimées + appliquer les éditions
        const filteredDefault = defaultQ
          .map((q, idx) => {
            const key = 'default_' + idx;
            if (deletedKeys.has(key)) return null;
            return editedMap[key] || q;
          })
          .filter(q => q !== null);

        // Filtrer les questions custom supprimées
        const filteredCustom = customMQ
          .map((q, idx) => {
            const key = 'custom_' + idx;
            if (deletedKeys.has(key)) return null;
            return editedMap[key] || q;
          })
          .filter(q => q !== null);

        // Reconstituer
        if (window.QUESTIONS) {
          window.QUESTIONS[matiereId] = [...filteredDefault, ...filteredCustom];
        }
      });

      console.log('[App] Modifications admin chargées');
    } catch (e) {
      console.error('[App] Erreur chargement admin :', e);
    }
  },

  // === INIT ===
  async init() {
    // Charger les modifications faites dans le tableau d'admin
    this.loadAdminCustomizations();

    this.load();
    this.render();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then(reg => console.log('[SW] Enregistré', reg.scope))
          .catch(err => console.error('[SW] Erreur', err));
      });
    }

    if (window.FirebaseAuth) {
      if (window.FirebaseAuth) window.FirebaseAuth.init().then(ok => {
        if (ok) console.log('[App] Firebase prêt');
        else console.log('[App] Mode local (Firebase non configuré)');
      });
    }

    if (window.Notifications) {
      Notifications.init().then(() => {
        console.log('[App] Notifications initialisées :', Notifications.getStatus().label);
      });
    }

    let lastTouch = 0;
    document.addEventListener('touchend', (e) => {
      const now = Date.now();
      if (now - lastTouch < 300) e.preventDefault();
      lastTouch = now;
    }, { passive: false });

    // === GESTION DU BOUTON RETOUR ANDROID ===
    // On pousse un état initial pour pouvoir intercepter le bouton retour
    history.pushState({ page: 'init' }, '', '');

    window.addEventListener('popstate', (e) => {
      // Si on est sur l'écran d'accueil (home) ou splash → demander confirmation pour quitter
      const screen = this.state.currentScreen;
      const screensAccueil = ['home', 'splash'];

      if (screensAccueil.includes(screen)) {
        // Empêcher la sortie immédiate, demander confirmation
        this.confirmExit();
      } else if (screen === 'qcm' && this.state.currentMode === 'exam') {
        // Pendant un examen, demander confirmation spéciale
        history.pushState({ page: 'app' }, '', ''); // empêcher la sortie
        if (confirm('⚠️ Tu es en plein examen !\n\nVeux-tu vraiment quitter ?\nTon progrès sera sauvegardé.')) {
          this.pauseExam();
        }
      } else {
        // Sur les autres écrans : remettre l'état et naviguer vers l'écran précédent
        history.pushState({ page: 'app' }, '', '');
        this.handleBackNavigation();
      }
    });
  },

  // Confirmation de sortie de l'app
  confirmExit() {
    // Remettre l'état pour empêcher la sortie immédiate
    history.pushState({ page: 'app' }, '', '');

    if (confirm('🚪 Quitter Bara Concours ?\n\nTu peux toujours revenir t\'entraîner plus tard.\n\nOK = Quitter\nAnnuler = Rester')) {
      // L'utilisateur veut vraiment quitter
      if (window.navigator && window.navigator.app && window.navigator.app.exitApp) {
        // Sur certains wrappers Android (Cordova, etc.)
        window.navigator.app.exitApp();
      } else {
        // Sur navigateur ou TWA Android → on essaye history.back puis window.close
        history.back();
        setTimeout(() => { try { window.close(); } catch(e){} }, 100);
      }
    }
    // Sinon : on ne fait rien, l'utilisateur reste dans l'app
  },

  // Navigation arrière intelligente selon l'écran
  handleBackNavigation() {
    const screen = this.state.currentScreen;

    // Carte de retour : depuis chaque écran, où va-t-on ?
    const retourMap = {
      'concours-detail': 'home',
      'mode-select': 'concours-detail',
      'qcm': 'mode-select',
      'results': 'mode-select',
      'session-2026': 'home',
      'session-jour-detail': 'session-2026',
      'forum-create': 'forum',
      'forum-detail': 'forum',
      'premium': 'profile',
      'edit-profile': 'profile',
      'auth-otp': 'auth-phone',
      'onboarding': 'home',
      'annales-list': 'home',
      'annale-detail': 'annales-list'
    };

    const target = retourMap[screen] || 'home';
    this.navigate(target);
  }
};

App.init();
</script>
