    return `
      <div style="background:white; border:1px solid var(--line); border-radius:12px; padding:0.7rem 0.9rem; display:flex; gap:0.7rem; align-items:center">
        <div style="background:#fef3c7; color:#92400e; font-family:'Instrument Serif',serif; font-size:1.05rem; font-weight:700; width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; border:1.5px solid #fde68a">N°${sujet.numero}</div>
        <div style="flex:1; min-width:0">
          <div style="font-weight:700; font-size:0.92rem; color:var(--ink)">Sujet ${sujet.numero}</div>
          <div style="font-size:0.78rem; color:var(--ink-soft); margin-top:0.1rem">${dateStr}${dureeStr ? ' • ' + dureeStr : ''}</div>
        </div>
        <div style="background:${pctClass === 'good' ? '#dcfce7' : pctClass === 'mid' ? '#fef9c3' : '#fee2e2'}; color:${pctClass === 'good' ? '#166534' : pctClass === 'mid' ? '#854d0e' : '#991b1b'}; padding:0.35rem 0.6rem; border-radius:8px; text-align:center; min-width:54px">
          <div style="font-weight:800; font-size:0.95rem; line-height:1">${pct}%</div>
          <div style="font-size:0.7rem; opacity:0.85; margin-top:0.1rem">${sujet.score}/${sujet.total}</div>
        </div>
        <button onclick="event.stopPropagation(); App.refaireSujetSession('${sessionId}', ${sujet.numero})" style="background:#dbeafe; color:#1e40af; border:1.5px solid #93c5fd; width:36px; height:36px; border-radius:8px; font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center" title="Refaire ce sujet">🔄</button>
      </div>
    `;
  },

  formatDureeSujet(seconds) {
    if (!seconds) return '';
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    if (m === 0) return s + 's';
    return m + 'min ' + (s < 10 ? '0' : '') + s + 's';
  },

  // V47 : Démarrer un NOUVEAU sujet (mode libre)
  demarrerNouveauSujet() {
    const session = window.SessionsHelper.getSession(this.state.currentSessionId);
    if (!session) return;

    // Générer les questions du prochain sujet
    const tirage = this.SessionSujetsManager.genererQuestionsProchainSujet(session);
    if (tirage.questions.length === 0) {
      this.toast('🎉 Tu as fait tous les sujets de cette session !');
      return;
    }

    const numero = this.SessionSujetsManager.getProchainNumero(session.id);

    // Initialiser l'état de session
    this.state.currentSessionTimerEnabled = false;
    this.state.currentSessionStartTime = Date.now();
    this.state.sessionPaused = false;
    this.state.currentSessionQuestionsActive = tirage.questions;
    this.state.currentSessionIndices = tirage.indices;  // V47 : retenir les indices pour anti-doublon
    this.state.currentSessionTotalAvailable = (session.questions || []).length;
    this.state.currentSessionIsAbridged = tirage.questions.length < (session.questions || []).length;
    this.state.currentSessionAnswers = {};
    this.state.currentSessionIndex = 0;
    this.state.currentSessionSujetNumero = numero;
    this.state.currentSessionMode = 'sujet';  // V47 : mode "sujet libre"

    this.navigate('session-questions');
  },

  // V47 : Démarrer la session CHRONOMÉTRÉE (toutes les Q)
  demarrerSessionChronometree() {
    const session = window.SessionsHelper.getSession(this.state.currentSessionId);
    if (!session) return;
    const allQ = session.questions || [];
    if (allQ.length === 0) {
      this.toast('❌ Aucune question dans cette session', 'danger');
      return;
    }

    // V55 : Vérifier s'il existe une progression chronométrée en cours
    const progress = window.SessionsHelper.getProgress(session.id);
    const hasResumable = progress && !progress.completedAt
                         && progress.timerMode === 'exam'
                         && progress.currentIndex > 0
                         && progress.activeQuestions
                         && progress.activeQuestions.length > 0;

    if (hasResumable) {
      // Proposer de reprendre
      const qDone = progress.currentIndex + 1;
      const qTotal = progress.activeQuestions.length;
      const timeLeft = progress.timeLeft || 0;
      const minLeft = Math.floor(timeLeft / 60);
      const choice = confirm(
        `🔄 Tu as un examen en cours dans cette session :\n\n` +
        `   Question ${qDone}/${qTotal}\n` +
        `   Temps restant : ${minLeft} min\n\n` +
        `OK = Reprendre l'examen\n` +
        `Annuler = Recommencer à zéro`
      );

      if (choice) {
        // REPRISE : restaurer tout l'état
        this.state.currentSessionTimerEnabled = true;
        this.state.sessionPaused = false;
        this.state.currentSessionStartTime = Date.now();  // Nouveau point de référence pour le timer
        this.state.currentSessionQuestionsActive = progress.activeQuestions;
        this.state.currentSessionIndices = progress.indices || progress.activeQuestions.map((_, i) => i);
        this.state.currentSessionTotalAvailable = allQ.length;
        this.state.currentSessionIsAbridged = false;
        this.state.currentSessionAnswers = progress.answers || {};
        this.state.currentSessionIndex = progress.currentIndex || 0;
        this.state.currentSessionSujetNumero = null;
        this.state.currentSessionMode = 'exam';
        this.state.currentSessionTimeLeft = progress.timeLeft || (allQ.length * 60);

        this.startSessionTimer();
        this.navigate('session-questions');
        return;
      } else {
        // RECOMMENCER : effacer la progression précédente
        window.SessionsHelper.saveProgress(session.id, {
          currentIndex: 0,
          answers: {},
          activeQuestions: null,
          timerMode: null
        });
      }
    }

    // Nouveau démarrage (ou recommencer après "Annuler")
    this.state.currentSessionTimerEnabled = true;
    this.state.currentSessionStartTime = Date.now();
    this.state.sessionPaused = false;
    this.state.currentSessionQuestionsActive = allQ;
    this.state.currentSessionIndices = allQ.map((_, i) => i);
    this.state.currentSessionTotalAvailable = allQ.length;
    this.state.currentSessionIsAbridged = false;
    this.state.currentSessionAnswers = {};
    this.state.currentSessionIndex = 0;
    this.state.currentSessionSujetNumero = null;
    this.state.currentSessionMode = 'exam';

    this.state.currentSessionTimeLeft = allQ.length * 60;
    this.startSessionTimer();

    this.navigate('session-questions');
  },

  // V47 : Refaire un sujet déjà fait (utilise les mêmes questions)
  refaireSujetSession(sessionId, numero) {
    const session = window.SessionsHelper.getSession(sessionId);
    const sujet = this.SessionSujetsManager.getSujet(sessionId, numero);
    if (!session || !sujet) return;

    if (!confirm(`🔄 Refaire le Sujet ${numero} avec les mêmes ${sujet.total} questions ?`)) return;

    const allQ = session.questions || [];
    const questions = (sujet.indicesQuestions || []).map(i => allQ[i]).filter(q => q);
    if (questions.length === 0) {
      this.toast('❌ Impossible de retrouver les questions de ce sujet', 'danger');
      return;
    }

    this.state.currentSessionTimerEnabled = false;
    this.state.currentSessionStartTime = Date.now();
    this.state.sessionPaused = false;
    this.state.currentSessionQuestionsActive = questions;
    this.state.currentSessionIndices = sujet.indicesQuestions;
    this.state.currentSessionTotalAvailable = allQ.length;
    this.state.currentSessionIsAbridged = questions.length < allQ.length;
    this.state.currentSessionAnswers = {};
    this.state.currentSessionIndex = 0;
    this.state.currentSessionSujetNumero = numero;
    this.state.currentSessionMode = 'sujet-refaire';

    this.navigate('session-questions');
  },

  // V47 : Reset complet (tout recommencer)
  resetSessionSujets() {
    if (!confirm('🔄 Vraiment tout recommencer ?\n\nL\'historique des sujets faits sera effacé et tu pourras refaire toute la session depuis le début.')) return;
    this.SessionSujetsManager.resetSession(this.state.currentSessionId);
    this.toast('✅ Historique effacé, tu peux tout refaire');
    this.render();
  },

  // PAGE 3 : Affichage des questions une par une (adaptatif selon le type)
  renderSessionQuestions() {
    const session = window.SessionsHelper.getSession(this.state.currentSessionId);
    if (!session) { this.navigate('annales'); return ''; }

    // V45 : Utiliser les questions ACTIVES (sous-ensemble en mode libre, tout en chrono)
    // Si pas encore initialisé (reprise par exemple), fallback sur toutes les questions
    const questions = this.state.currentSessionQuestionsActive && this.state.currentSessionQuestionsActive.length > 0
      ? this.state.currentSessionQuestionsActive
      : (session.questions || []);
    const idx = this.state.currentSessionIndex || 0;
    const total = questions.length;

    if (idx >= total) {
      return this.renderSessionResults(session);
    }

    const q = questions[idx];
    const showAnswer = this.state.currentSessionShowAnswer;
    const userAnswer = this.state.currentSessionAnswers[idx];

    // BUG #4 FIX : pour le mode 'multi', isAnswered doit attendre la validation
    // explicite (sinon dès qu'on coche une case, ça déclenche le feedback)
    let isAnswered;
    if (q.type === 'multi') {
      // En multi, considéré "répondu" seulement si validation explicite
      isAnswered = this.state.currentSessionAnswers[idx + '_validated'] === true;
    } else {
      isAnswered = userAnswer !== undefined;
    }

    return `
      <div class="page">
        <header class="header">
          <div class="header-bar">
            <button class="header-back" onclick="App.exitSession()">✕</button>
            <div class="header-title-row">${session.titre}${this.state.currentSessionSujetNumero ? ' • Sujet ' + this.state.currentSessionSujetNumero : ''}</div>
            <div class="header-spacer"></div>
          </div>
          <div class="header-sub" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.4rem">
            <span>Question ${idx + 1} / ${total}</span>

            <!-- V41 : Score en temps réel + Chrono / V44 : pas de score en chronométré + bouton pause -->
            <div style="display:flex; gap:0.6rem; align-items:center">
              ${!this.state.currentSessionTimerEnabled ? (() => {
                // V44 : Score visible UNIQUEMENT en mode libre (en mode examen on cache pour éviter triche)
                const stats = this.computeSessionLiveStats();
                return `
                  <span style="background:rgba(255,255,255,0.2); padding:0.2rem 0.55rem; border-radius:999px; font-weight:700; font-size:0.78rem">
                    ✓ ${stats.correct} / ${stats.answered}
                  </span>
                `;
              })() : `
                <span style="background:rgba(255,255,255,0.2); padding:0.2rem 0.55rem; border-radius:999px; font-weight:700; font-size:0.78rem">
                  ${this.computeSessionLiveStats().answered} répondues
                </span>
              `}
              ${this.state.currentSessionTimerEnabled ? `
                <button onclick="App.toggleSessionPause()" style="background:${this.state.sessionPaused ? 'rgba(245, 158, 11, 0.9)' : 'rgba(255,255,255,0.2)'}; border:none; color:white; padding:0.25rem 0.6rem; border-radius:999px; font-size:0.85rem; cursor:pointer; font-weight:700" title="${this.state.sessionPaused ? 'Reprendre' : 'Pause'}">
                  ${this.state.sessionPaused ? '▶️' : '⏸️'}
                </button>
                <span id="session-timer" style="background:${this.state.sessionPaused ? 'rgba(245, 158, 11, 0.9)' : 'rgba(255,255,255,0.2)'}; padding:0.2rem 0.55rem; border-radius:999px; font-weight:700; font-size:0.78rem; font-family:monospace">
                  ⏱️ ${this.formatSessionTime(this.state.currentSessionTimeLeft || 0)}
                </span>
              ` : ''}
              ${this.renderQuestionTypeBadge(q.type)}
            </div>
          </div>
          <div class="session-progress-bar">
            <div class="session-progress-fill" style="width:${((idx + 1) / total) * 100}%"></div>
          </div>
        </header>

        <div class="content mt-overlap">

          <div class="session-question-card">
            <div class="session-question-text">${q.q}</div>

            ${this.renderQuestionInput(q, idx, isAnswered, showAnswer)}

            <!-- V44 : En mode chronométré, on cache le feedback immédiat (vraie ambiance examen) -->
            <!-- L'utilisateur verra toutes les corrections à la fin via "Voir la correction détaillée" -->
            ${(isAnswered || showAnswer) && !this.state.currentSessionTimerEnabled ? this.renderQuestionFeedback(q, userAnswer) : ''}

            <!-- V44 : En mode chronométré, message neutre après réponse -->
            ${isAnswered && this.state.currentSessionTimerEnabled ? `
              <div style="background:#dbeafe; border:1px solid #93c5fd; border-radius:10px; padding:0.6rem 0.9rem; margin-top:0.7rem; text-align:center; font-size:0.85rem; color:#1e3a8a">
                ✅ Réponse enregistrée. <strong>Correction visible à la fin</strong>.
              </div>
            ` : ''}
          </div>

          <div class="session-nav">
            ${idx > 0 ? `<button class="session-nav-btn secondary" onclick="App.prevSessionQuestion()">← Précédent</button>` : '<div></div>'}
            ${idx < total - 1 ?
              `<button class="session-nav-btn primary" onclick="App.nextSessionQuestion()">${(isAnswered || showAnswer) ? 'Suivant →' : 'Passer'}</button>` :
              `<button class="session-nav-btn primary" onclick="App.finishSession()">✅ Terminer</button>`
            }
          </div>

        </div>
      </div>
    `;
  },

  renderQuestionTypeBadge(type) {
    const labels = {
      'open': '💭 Question ouverte',
      'qcm3': '🔵 QCM (3 choix)',
      'qcm4': '🔵 QCM (4 choix)',
      'multi': '🟣 Plusieurs réponses'
    };
    return `<span class="question-type-badge type-${type}">${labels[type] || type}</span>`;
  },

  renderQuestionInput(q, idx, isAnswered, showAnswer) {
    const userAnswer = this.state.currentSessionAnswers[idx];

    if (q.type === 'open') {
      // Question ouverte : juste un bouton "Voir la réponse"
      if (!showAnswer && !isAnswered) {
        return `
          <div class="session-open-input">
            <button class="session-show-answer-btn" onclick="App.showSessionAnswer()">
              👁️ Voir la réponse
            </button>
            <div style="text-align:center; color:var(--ink-mute); font-size:0.82rem; margin-top:0.7rem; font-style:italic">
              Réfléchis avant de cliquer
            </div>
          </div>
        `;
      }
      return '';
    }

    if (q.type === 'qcm3' || q.type === 'qcm4') {
      // V44 : En mode chronométré, on ne révèle pas la bonne réponse
      const isTimedMode = this.state.currentSessionTimerEnabled;
      // QCM simple : boutons radio
      const letters = ['A', 'B', 'C', 'D'];
      return `
        <div class="session-choices">
          ${q.choices.map((choice, i) => {
            let cls = 'session-choice';
            if (isAnswered) {
              if (isTimedMode) {
                // V44 : Mode chronométré → on marque juste le choix de l'utilisateur, pas le bon/mauvais
                if (i === userAnswer) cls += ' selected';
                else cls += ' inactive';
              } else {
                // Mode libre → on révèle tout
                if (i === q.r) cls += ' correct';
                else if (i === userAnswer) cls += ' incorrect';
                else cls += ' inactive';
              }
            }
            return `
              <div class="${cls}" onclick="${isAnswered ? '' : `App.pickSessionAnswer(${i})`}">
                <div class="session-choice-letter">${letters[i]}</div>
                <div class="session-choice-text">${choice}</div>
                ${isAnswered && !isTimedMode && i === q.r ? '<div class="session-choice-mark">✓</div>' : ''}
                ${isAnswered && !isTimedMode && i === userAnswer && i !== q.r ? '<div class="session-choice-mark">✗</div>' : ''}
                ${isAnswered && isTimedMode && i === userAnswer ? '<div class="session-choice-mark" style="color:#2563eb">●</div>' : ''}
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    if (q.type === 'multi') {
      // QCM multi-réponses : cases à cocher
      const letters = ['A', 'B', 'C', 'D'];
      const userArr = Array.isArray(userAnswer) ? userAnswer : [];
      const correctSet = new Set(q.r);

      return `
        <div class="session-choices multi">
          <div class="session-multi-hint">⚠️ Plusieurs réponses peuvent être correctes — coche toutes les bonnes</div>
          ${q.choices.map((choice, i) => {
            let cls = 'session-choice';
            const userPicked = userArr.includes(i);
            const isCorrect = correctSet.has(i);
            if (isAnswered) {
              if (isCorrect && userPicked) cls += ' correct';
              else if (!isCorrect && userPicked) cls += ' incorrect';
              else if (isCorrect && !userPicked) cls += ' missed';
              else cls += ' inactive';
            } else if (userPicked) {
              cls += ' selected';
            }
            return `
              <div class="${cls}" onclick="${isAnswered ? '' : `App.toggleSessionMultiAnswer(${i})`}">
                <div class="session-choice-checkbox">${userPicked ? '☑' : '☐'}</div>
                <div class="session-choice-letter">${letters[i]}</div>
                <div class="session-choice-text">${choice}</div>
                ${isAnswered && isCorrect ? '<div class="session-choice-mark">✓</div>' : ''}
                ${isAnswered && !isCorrect && userPicked ? '<div class="session-choice-mark">✗</div>' : ''}
              </div>
            `;
          }).join('')}
          ${!isAnswered ? `
            <button class="session-validate-multi-btn" onclick="App.validateSessionMulti()">
              ✓ Valider mes choix
            </button>
          ` : ''}
        </div>
      `;
    }

    return '<div>Type de question non supporté</div>';
  },

  renderQuestionFeedback(q, userAnswer) {
    let resultClass = '';
    let resultMsg = '';

    if (q.type === 'open') {
      resultClass = 'feedback-info';
      resultMsg = '📝 Réponse';
    } else if (q.type === 'multi') {
      const correctSet = new Set(q.r);
      const userArr = Array.isArray(userAnswer) ? userAnswer : [];
      const correct = userArr.length === q.r.length && userArr.every(i => correctSet.has(i));
      resultClass = correct ? 'feedback-correct' : 'feedback-incorrect';
      resultMsg = correct ? '✅ Excellent !' : '❌ Pas tout à fait';
    } else {
      resultClass = userAnswer === q.r ? 'feedback-correct' : 'feedback-incorrect';
      resultMsg = userAnswer === q.r ? '✅ Bonne réponse !' : '❌ Mauvaise réponse';
    }

    const reponseText = this.formatSessionAnswer(q);

    return `
      <div class="session-feedback ${resultClass}">
        <div class="session-feedback-result">${resultMsg}</div>
        ${q.type === 'open' ? `
          <div class="session-feedback-answer">
            <strong>Réponse :</strong><br>${reponseText.replace(/\n/g, '<br>')}
          </div>
        ` : ''}
        ${q.nb ? `
          <div class="session-feedback-nb">
            <strong>💡 NB :</strong> ${q.nb}
          </div>
        ` : ''}
      </div>
    `;
  },

  formatSessionAnswer(q) {
    if (q.type === 'open') return q.r;
    if (q.type === 'multi') {
      const letters = ['A', 'B', 'C', 'D'];
      return q.r.map(i => letters[i] + ') ' + q.choices[i]).join(' et ');
    }
    if (q.type === 'qcm3' || q.type === 'qcm4') {
      const letters = ['A', 'B', 'C', 'D'];
      return letters[q.r] + ') ' + q.choices[q.r];
    }
    return '';
  },

  // === ACTIONS ===

  pickSessionAnswer(choiceIdx) {
    // V44 : ne rien faire si en pause
    if (this.state.sessionPaused) {
      this.toast('⏸️ Session en pause — clique sur ▶️ pour reprendre');
      return;
    }
    const idx = this.state.currentSessionIndex;
    // V42 : Vérifier qu'on n'a pas déjà répondu (pour éviter double-clic)
    if (this.state.currentSessionAnswers[idx] !== undefined) return;

    this.state.currentSessionAnswers[idx] = choiceIdx;
    this.saveSessionProgress();
    this.render();
  },

  toggleSessionMultiAnswer(choiceIdx) {
    const idx = this.state.currentSessionIndex;
    const current = this.state.currentSessionAnswers[idx];
    let arr = Array.isArray(current) ? [...current] : [];
    if (arr.includes(choiceIdx)) {
      arr = arr.filter(i => i !== choiceIdx);
    } else {
      arr.push(choiceIdx);
    }
    this.state.currentSessionAnswers[idx] = arr;
    this.render();
  },

  validateSessionMulti() {
    const idx = this.state.currentSessionIndex;
    const current = this.state.currentSessionAnswers[idx];
    if (!Array.isArray(current) || current.length === 0) {
      this.toast('⚠️ Coche au moins une réponse', 'warning');
      return;
    }
    // Marquer comme "validé" pour déclencher l'affichage de la correction
    this.state.currentSessionAnswers[idx] = current; // garde l'array
    this.state.currentSessionAnswers[idx + '_validated'] = true;
    this.saveSessionProgress();
    this.render();
  },

  showSessionAnswer() {
    const idx = this.state.currentSessionIndex;
    this.state.currentSessionShowAnswer = true;
    this.state.currentSessionAnswers[idx] = 'seen';
    this.saveSessionProgress();
    this.render();
  },

  nextSessionQuestion() {
    // V45 : utiliser la liste de questions ACTIVE (sous-ensemble en mode libre)
    const activeQs = this.state.currentSessionQuestionsActive || [];
    if (this.state.currentSessionIndex < activeQs.length - 1) {
      this.state.currentSessionIndex++;
      this.state.currentSessionShowAnswer = false;
      this.saveSessionProgress();
      this.render();
    }
  },

  prevSessionQuestion() {
    if (this.state.currentSessionIndex > 0) {
      this.state.currentSessionIndex--;
      this.state.currentSessionShowAnswer = false;
      this.render();
    }
  },

  // ===========================================
  // V41 : MODE & CHRONOMÈTRE DES SESSIONS
  // ===========================================

  // Sélectionner le mode (libre ou chronométré)
  setSessionMode(mode) {
    this.state.sessionTimerMode = mode;
    this.render();
  },

  // Démarrer la session avec le mode choisi
  startSessionWithMode() {
    const session = window.SessionsHelper.getSession(this.state.currentSessionId);
    if (!session) return;

    const mode = this.state.sessionTimerMode || 'free';
    this.state.currentSessionTimerEnabled = (mode === 'timed');
    this.state.currentSessionStartTime = Date.now();
    this.state.sessionPaused = false;

    // V46 FIX : détecter si on est en train de REPRENDRE (vs nouveau démarrage)
    // Si l'utilisateur a déjà des réponses ET un index > 0, c'est une reprise
    const isResuming = this.state.currentSessionIndex > 0 &&
                       this.state.currentSessionAnswers &&
                       Object.keys(this.state.currentSessionAnswers).length > 0;

    // V45 : En mode libre = 25 Q aléatoires (comme QCM normaux)
    //        En mode chronométré = toutes les questions (vraie sensation examen)
    const SESSION_TRAIN_SIZE = 25;
    const allQuestions = session.questions || [];

    // V46 FIX : Si on reprend ET qu'on a déjà des questions actives mémorisées, on les garde
    // Sinon on prépare un nouveau tirage
    if (isResuming && this.state.currentSessionQuestionsActive && this.state.currentSessionQuestionsActive.length > 0) {
      // REPRISE : on garde tout tel quel (questions actives, réponses, index)
      // Pas de re-tirage aléatoire
    } else {
      // NOUVEAU DÉMARRAGE : préparer le tirage
      if (mode === 'free' && allQuestions.length > SESSION_TRAIN_SIZE) {
        // Mélanger et prendre 25 questions
        const shuffled = [...allQuestions];
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        this.state.currentSessionQuestionsActive = shuffled.slice(0, SESSION_TRAIN_SIZE);
        this.state.currentSessionTotalAvailable = allQuestions.length;
        this.state.currentSessionIsAbridged = true;
      } else {
        // Mode chronométré OU session avec moins de 25 Q : tout
        this.state.currentSessionQuestionsActive = allQuestions;
        this.state.currentSessionTotalAvailable = allQuestions.length;
        this.state.currentSessionIsAbridged = false;
      }

      // Réinitialiser les réponses (nouveau tirage = nouvelle session)
      this.state.currentSessionAnswers = {};
      this.state.currentSessionIndex = 0;
    }

    if (this.state.currentSessionTimerEnabled) {
      // 60 secondes par question
      const totalSeconds = this.state.currentSessionQuestionsActive.length * 60;
      this.state.currentSessionTimeLeft = totalSeconds;
      this.startSessionTimer();
    }

    this.navigate('session-questions');
  },

  // V44 : Mettre en pause / reprendre le chrono
  toggleSessionPause() {
    this.state.sessionPaused = !this.state.sessionPaused;
    if (this.state.sessionPaused) {
      // Pause : arrêter le timer
      this.stopSessionTimer();
      this.toast('⏸️ Session en pause');
    } else {
      // Reprise : relancer le timer
      this.startSessionTimer();
      this.toast('▶️ Session reprise');
    }
    this.render();
  },

  // Démarrer le timer (mode chronométré)
  startSessionTimer() {
    if (this.state.currentSessionTimerInterval) {
      clearInterval(this.state.currentSessionTimerInterval);
    }
    this.state.currentSessionTimerInterval = setInterval(() => {
      this.state.currentSessionTimeLeft = Math.max(0, (this.state.currentSessionTimeLeft || 0) - 1);

      // Mettre à jour seulement le timer dans le DOM (pas tout le render)
      const timerEl = document.getElementById('session-timer');
      if (timerEl) {
        timerEl.textContent = '⏱️ ' + this.formatSessionTime(this.state.currentSessionTimeLeft);
        // Couleur si peu de temps
        if (this.state.currentSessionTimeLeft <= 30) {
          timerEl.style.background = '#fee2e2';
          timerEl.style.color = '#991b1b';
        } else if (this.state.currentSessionTimeLeft <= 120) {
          timerEl.style.background = '#fef3c7';
          timerEl.style.color = '#92400e';
        }
      }

      // Temps écoulé : finir automatiquement
      if (this.state.currentSessionTimeLeft <= 0) {
        clearInterval(this.state.currentSessionTimerInterval);
        this.state.currentSessionTimerInterval = null;
        this.toast('⏰ Temps écoulé ! La session se termine automatiquement.');
        setTimeout(() => this.finishSession(), 1500);
      }
    }, 1000);
  },

  // Arrêter le timer (à appeler quand on sort de la session)
  stopSessionTimer() {
    if (this.state.currentSessionTimerInterval) {
      clearInterval(this.state.currentSessionTimerInterval);
      this.state.currentSessionTimerInterval = null;
    }
  },

  // Formater le temps en MM:SS
  formatSessionTime(seconds) {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return m + ':' + String(s).padStart(2, '0');
  },

  // Calculer le score en temps réel
  computeSessionLiveStats() {
    const session = window.SessionsHelper.getSession(this.state.currentSessionId);
    if (!session) return { correct: 0, answered: 0, total: 0 };

    // V45 : utiliser la liste de questions ACTIVE
    const activeQs = this.state.currentSessionQuestionsActive && this.state.currentSessionQuestionsActive.length > 0
      ? this.state.currentSessionQuestionsActive
      : (session.questions || []);

    let correct = 0;
    let answered = 0;
    const total = activeQs.length;

    activeQs.forEach((q, i) => {
      const userAnswer = this.state.currentSessionAnswers[i];

      if (q.type === 'multi') {
        // En multi : compté seulement si validation explicite
        if (this.state.currentSessionAnswers[i + '_validated'] === true) {
          answered++;
          const expected = Array.isArray(q.r) ? [...q.r].sort() : [q.r];
          const got = Array.isArray(userAnswer) ? [...userAnswer].sort() : [];
          if (expected.length === got.length && expected.every((v, idx) => v === got[idx])) {
            correct++;
          }
        }
      } else if (q.type === 'open') {
        // Question ouverte : compte seulement si "seen" (utilisateur a vu la réponse)
        if (userAnswer === 'seen') answered++;
      } else if (userAnswer !== undefined) {
        // QCM mono
        answered++;
        if (userAnswer === q.r) correct++;
      }
    });

    return { correct, answered, total };
  },

  exitSession() {
    const isExam = this.state.currentSessionMode === 'exam';

    if (isExam) {
      // V55 : Mode chronométré → on peut sauvegarder pour reprendre plus tard
      if (confirm('🚪 Mettre l\'examen en pause ?\n\nTa progression sera sauvegardée et tu pourras reprendre exactement là où tu en es.')) {
        this.stopSessionTimer();
        this.saveSessionProgress();
        this.navigate('annales-session');
      }
    } else {
      // Mode libre (sujets) → comme avant, pas de sauvegarde
      if (confirm('🚪 Quitter ce sujet ?\n\nTa progression sera perdue (les sujets libres ne sont pas sauvegardés tant qu\'ils ne sont pas terminés).')) {
        this.stopSessionTimer();
        this.navigate('annales-session');
      }
    }
  },

  saveSessionProgress() {
    if (!this.state.currentSessionId || !window.SessionsHelper) return;
    // V55 : sauvegarde différenciée — pour le mode chronométré, on stocke aussi le temps restant
    const isExam = this.state.currentSessionMode === 'exam';
    window.SessionsHelper.saveProgress(this.state.currentSessionId, {
      currentIndex: this.state.currentSessionIndex,
      answers: this.state.currentSessionAnswers,
      activeQuestions: this.state.currentSessionQuestionsActive,
      indices: this.state.currentSessionIndices,
      isAbridged: this.state.currentSessionIsAbridged,
      totalAvailable: this.state.currentSessionTotalAvailable,
      timerMode: isExam ? 'exam' : 'free',
      // V55 : pour mode chronométré, on enregistre le temps qu'il reste
      timeLeft: isExam ? (this.state.currentSessionTimeLeft || 0) : null,
      lastSavedAt: Date.now()
    });
  },

  finishSession() {
    const session = window.SessionsHelper.getSession(this.state.currentSessionId);
    if (!session) return;

    // V41 : Arrêter le timer et calculer le temps écoulé
    this.stopSessionTimer();
    const startTime = this.state.currentSessionStartTime || Date.now();
    const elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);

    // V45 : utiliser les questions ACTIVES
    const activeQs = this.state.currentSessionQuestionsActive && this.state.currentSessionQuestionsActive.length > 0
      ? this.state.currentSessionQuestionsActive
      : (session.questions || []);

    // Calculer le score
    let score = 0;
    const wrongQuestions = [];
    activeQs.forEach((q, i) => {
      const userAnswer = this.state.currentSessionAnswers[i];
      let isCorrect = false;
      if (q.type === 'open') {
        if (userAnswer === 'seen') { score++; isCorrect = true; }
      } else if (q.type === 'multi') {
        if (Array.isArray(userAnswer)) {
          const correctSet = new Set(q.r);
          const userSet = new Set(userAnswer);
          if (correctSet.size === userSet.size && [...correctSet].every(x => userSet.has(x))) {
            score++;
            isCorrect = true;
          }
        }
      } else {
        if (userAnswer === q.r) { score++; isCorrect = true; }
      }
      if (!isCorrect && userAnswer !== undefined) {
        wrongQuestions.push({ index: i, question: q });
      }
    });

    // Sauvegarder le résultat final avec temps
    window.SessionsHelper.saveProgress(this.state.currentSessionId, {
      currentIndex: activeQs.length,
      answers: this.state.currentSessionAnswers,
      score,
      total: activeQs.length,
      completedAt: Date.now(),
      // V41 : nouveau
      elapsedSeconds: elapsedSeconds,
      wasTimedMode: this.state.currentSessionTimerEnabled || false,
      wrongCount: wrongQuestions.length,
      // V45 : info session abrégée (mode libre)
      wasAbridged: this.state.currentSessionIsAbridged || false,
      totalAvailable: this.state.currentSessionTotalAvailable || activeQs.length
    });

    // V43 FIX : Intégrer dans les statistiques globales avec MÊME FORMAT que les QCM
    this.state.history = this.state.history || [];

    // ID virtuel pour la matière "Accompagnement Final"
    const ACCOMPAGNEMENT_MATIERE_ID = 'accompagnement_final';

    this.state.history.push({
      date: Date.now(),
      type: 'session',
      sessionId: session.id,
      sessionTitle: session.titre,
      concoursId: null,
      matiereId: ACCOMPAGNEMENT_MATIERE_ID,
      mode: this.state.currentSessionTimerEnabled ? 'exam' : 'training',
      score: score,
      total: activeQs.length,
      duration: elapsedSeconds,
      pct: Math.round((score / activeQs.length) * 100)
    });

    // V43 FIX : Mettre à jour matiereStats[accompagnement_final]
    this.state.matiereStats = this.state.matiereStats || {};
    if (!this.state.matiereStats[ACCOMPAGNEMENT_MATIERE_ID]) {
      this.state.matiereStats[ACCOMPAGNEMENT_MATIERE_ID] = { attempts: 0, totalScore: 0, totalQuestions: 0 };
    }
    this.state.matiereStats[ACCOMPAGNEMENT_MATIERE_ID].attempts++;
    this.state.matiereStats[ACCOMPAGNEMENT_MATIERE_ID].totalScore += score;
    this.state.matiereStats[ACCOMPAGNEMENT_MATIERE_ID].totalQuestions += activeQs.length;

    // V47 : Sauvegarder le sujet dans l'historique (sauf si c'est un examen chronométré ou un refaire)
    if (this.state.currentSessionMode === 'sujet' && this.state.currentSessionSujetNumero) {
      this.SessionSujetsManager.saveSujet(session.id, {
        numero: this.state.currentSessionSujetNumero,
        score: score,
        total: activeQs.length,
        completedAt: Date.now(),
        elapsedSeconds: elapsedSeconds,
        indicesQuestions: this.state.currentSessionIndices || [],
        wrongCount: wrongQuestions.length
      });
      this.SessionSujetsManager.clearPendingSujet();
    }

    this.save();

    // BUG #5 FIX : navigation vers les résultats
    this.state.currentSessionIndex = activeQs.length;
    this.state.currentSessionFinished = true;
    this.render();
  },

  renderSessionResults(session) {

    else if (pct >= 40) { emoji = '💪'; msg = 'Tu progresses, persévère !'; color = '#d97706'; }

          <!-- V41 : BLOC STATS DÉTAILLÉES -->

              <div style="background:#f0fdf4; border-radius:10px; padding:0.7rem; text-align:center">

                <div style="font-size:0.75rem; color:#15803d; font-weight:600">✅ Bonnes réponses</div>
              </div>

                ⏱️ ~<strong>${Math.round(elapsedSec / total)} secondes</strong> par question en moyenne
              </div>

  // V42 : Afficher la correction détaillée (revue de toutes les questions)
  showSessionCorrection() {
    this.state.currentScreen = 'session-correction';
    this.state.correctionFilterMode = 'all';  // 'all', 'wrong', 'right'
    this.render();
  },

  // V42 : Rendu de la page de correction détaillée
  renderSessionCorrection() {
    const session = window.SessionsHelper.getSession(this.state.currentSessionId);
    if (!session) {
      this.navigate('annales');
      return '';
    }

    // V47 : Afficher UNIQUEMENT les questions du sujet courant (pas toute la session)
    // Sauf si la session entière a été faite d'un coup (mode chronométré ou session < 30 Q)
    const questions = this.state.currentSessionQuestionsActive && this.state.currentSessionQuestionsActive.length > 0
      ? this.state.currentSessionQuestionsActive
      : (session.questions || []);
    const filterMode = this.state.correctionFilterMode || 'all';

    // Calculer le statut de chaque question
    const questionsWithStatus = questions.map((q, i) => {
      const userAnswer = this.state.currentSessionAnswers[i];
      let status = 'unanswered'; // 'correct', 'wrong', 'unanswered'

      if (userAnswer === undefined && this.state.currentSessionAnswers[i + '_validated'] !== true) {
        status = 'unanswered';
      } else if (q.type === 'open') {
        status = userAnswer === 'seen' ? 'seen' : 'unanswered';
      } else if (q.type === 'multi') {
        if (this.state.currentSessionAnswers[i + '_validated'] === true) {
          const expected = Array.isArray(q.r) ? [...q.r].sort() : [];
          const got = Array.isArray(userAnswer) ? [...userAnswer].sort() : [];
          status = (expected.length === got.length && expected.every((v, idx) => v === got[idx])) ? 'correct' : 'wrong';
        } else {
          status = 'unanswered';
        }
      } else {
        status = userAnswer === q.r ? 'correct' : 'wrong';
      }

      return { q, i, status, userAnswer };
    });

    // Filtrer selon le mode
    let filtered = questionsWithStatus;
    if (filterMode === 'wrong') filtered = filtered.filter(x => x.status === 'wrong');
    else if (filterMode === 'right') filtered = filtered.filter(x => x.status === 'correct');

    const nbCorrect = questionsWithStatus.filter(x => x.status === 'correct').length;
    const nbWrong = questionsWithStatus.filter(x => x.status === 'wrong').length;
    const nbUnanswered = questionsWithStatus.filter(x => x.status === 'unanswered' || x.status === 'seen').length;

    return `
      <div class="page">
        <header class="header">
          <div class="header-bar">
            <button class="header-back" onclick="App.backToResults()">←</button>
            <div class="header-title-row">Correction détaillée</div>
            <div class="header-spacer"></div>
          </div>
          <div class="header-sub">${session.titre}</div>
        </header>

        <div class="content mt-overlap">

          <!-- Filtres -->
          <div style="display:flex; gap:0.5rem; margin-bottom:1rem; flex-wrap:wrap">
            <button onclick="App.setCorrectionFilter('all')" style="flex:1; padding:0.6rem; border-radius:10px; font-weight:700; font-size:0.82rem; cursor:pointer; ${filterMode === 'all' ? 'background:var(--green-bf); color:white; border:none' : 'background:white; color:var(--ink); border:1.5px solid var(--line)'}">
              Tout (${questionsWithStatus.length})
            </button>
            <button onclick="App.setCorrectionFilter('wrong')" style="flex:1; padding:0.6rem; border-radius:10px; font-weight:700; font-size:0.82rem; cursor:pointer; ${filterMode === 'wrong' ? 'background:#dc2626; color:white; border:none' : 'background:white; color:#991b1b; border:1.5px solid #fecaca'}">
              ❌ Ratées (${nbWrong})
            </button>
            <button onclick="App.setCorrectionFilter('right')" style="flex:1; padding:0.6rem; border-radius:10px; font-weight:700; font-size:0.82rem; cursor:pointer; ${filterMode === 'right' ? 'background:#16a34a; color:white; border:none' : 'background:white; color:#15803d; border:1.5px solid #86efac'}">
              ✅ Bonnes (${nbCorrect})
            </button>
          </div>

          <!-- Liste des questions -->
          ${filtered.length === 0 ? `
            <div style="background:white; border:1.5px dashed var(--line); border-radius:12px; padding:2rem 1rem; text-align:center">
              <div style="font-size:3rem; margin-bottom:0.5rem">${filterMode === 'wrong' ? '🎉' : '📚'}</div>
              <div style="font-weight:700; color:var(--ink)">${filterMode === 'wrong' ? 'Aucune erreur dans ce filtre !' : 'Aucune question dans ce filtre'}</div>
            </div>
          ` : filtered.map(({ q, i, status, userAnswer }) => this.renderCorrectionCard(q, i, status, userAnswer)).join('')}

          <div style="margin-top:1.5rem">
            <button class="btn-primary" style="width:100%" onclick="App.backToResults()">← Retour aux résultats</button>
          </div>

        </div>
      </div>
    `;
  },

  renderCorrectionCard(q, idx, status, userAnswer) {
    const letters = ['A', 'B', 'C', 'D'];
    let statusBadge = '';
    let borderColor = 'var(--line)';

      statusBadge = '<span style="background:#dcfce7; color:#166534; padding:0.2rem 0.6rem; border-radius:999px; font-size:0.72rem; font-weight:800">✅ BONNE</span>';
      borderColor = '#86efac';
      bgColor = '#f0fdf4';

      borderColor = '#fecaca';
      bgColor = '#fef2f2';
    } else {
      statusBadge = '<span style="background:#f3f4f6; color:#374151; padding:0.2rem 0.6rem; border-radius:999px; font-size:0.72rem; font-weight:800">⊘ NON RÉPONDUE</span>';
    }

    return `
      <div style="background:${bgColor}; border:1.5px solid ${borderColor}; border-radius:12px; padding:1rem; margin-bottom:0.8rem">

        <!-- En-tête -->
        <div style="display:flex; gap:0.6rem; align-items:flex-start; margin-bottom:0.7rem">
          <div style="background:var(--green-bf); color:white; font-weight:800; min-width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:0.85rem; flex-shrink:0">${idx + 1}</div>
          <div style="flex:1; min-width:0">
            <div style="font-weight:700; font-size:0.92rem; color:var(--ink); line-height:1.5; margin-bottom:0.3rem">${q.q}</div>
            ${statusBadge}
          </div>
        </div>

        <!-- Choix (si QCM) -->
        ${q.choices && q.choices.length > 0 ? `
          <div style="display:flex; flex-direction:column; gap:0.35rem; margin-bottom:0.7rem">
            ${q.choices.map((c, i) => {
              const isCorrect = Array.isArray(q.r) ? q.r.includes(i) : q.r === i;
              const isUserChoice = Array.isArray(userAnswer) ? userAnswer.includes(i) : userAnswer === i;

              let cls = '';
              if (isCorrect) {
                cls = 'background:#dcfce7; border:1.5px solid #16a34a; color:#15803d; font-weight:700';
              } else if (isUserChoice) {
                cls = 'background:#fee2e2; border:1.5px solid #dc2626; color:#991b1b; font-weight:700';
              } else {
                cls = 'background:white; border:1px solid var(--line); color:var(--ink-soft)';
              }

              return `
                <div style="${cls}; padding:0.5rem 0.7rem; border-radius:8px; display:flex; gap:0.5rem; align-items:flex-start; font-size:0.85rem">
                  <span style="font-weight:800; min-width:18px">${letters[i]}</span>
                  <span style="flex:1">${c}</span>
                  ${isCorrect ? '<span>✓</span>' : ''}

        ` : ''}

        <div class="auth-card">
          <div class="auth-title">Bienvenue !</div>

          <div class="auth-info">
            <strong>📱 Numéro Burkina Faso (8 chiffres)</strong><br>
            Exemple : 70 12 34 56
          </div>

          ${a.error ? `<div class="auth-error show">⚠️ ${a.error}</div>` : ''}

          <div class="auth-input-group">

              <div class="auth-input-prefix">🇧🇫 +226</div>
              <input
                type="tel"
                class="auth-input"

                value="${a.phoneInput}"
                oninput="App.formatPhoneInput(this)"
                autocomplete="tel-national"
                inputmode="numeric">
            </div>
          </div>

          <button class="auth-btn ${a.isLoading ? 'loading' : ''}" onclick="App.sendOTP()" ${a.isLoading ? 'disabled' : ''}>
            Recevoir le code SMS
          </button>
        </div>

          Pas le temps de t'inscrire ?<br>

        </div>

        <div class="auth-foot">
          🔒 Tes données sont sécurisées et confidentielles
        </div>
      </div>
    `;
  },

  formatPhoneInput(input) {
    let v = input.value.replace(/\D/g, '');
    if (v.length > 8) v = v.substring(0, 8);
    let formatted = '';
    for (let i = 0; i < v.length; i++) {
      if (i > 0 && i % 2 === 0) formatted += ' ';
      formatted += v[i];
    }
    input.value = formatted;
    this.state.auth.phoneInput = formatted;
  },

  async sendOTP() {
    const a = this.state.auth;
    const cleaned = a.phoneInput.replace(/\s+/g, '');

    if (cleaned.length !== 8) {
      a.error = 'Numéro invalide. Le numéro doit contenir 8 chiffres.';
      this.render();
      return;
    }

    a.error = '';
    a.isLoading = true;
    this.render();

    // Vérifier si Firebase est disponible et configuré
    const firebaseReady = window.FirebaseAuth && window.FirebaseAuth.isFirebaseReady;

    if (!firebaseReady) {
      // Mode démo — passe à l'écran OTP avec le code 123456
      setTimeout(() => {
        a.isLoading = false;
        a.error = '';
        a.pendingPhone = '+226' + cleaned;
        a.otpInput = '';
        this.toast('📱 Mode démo : utilise le code 123456');
        this.navigate('auth-otp');
      }, 600);
      return;
    }

    try {
      window.FirebaseAuth.initRecaptcha('recaptcha-container');
      const result = await window.FirebaseAuth.sendOTP('+226' + cleaned);
      a.pendingPhone = result.phoneNumber;
      a.isLoading = false;
      a.otpInput = '';
      this.startResendCooldown();
      this.navigate('auth-otp');
    } catch (e) {
      // V56.1 : Si SMS désactivé (Firebase actif mais sans phone auth), basculer en mode démo
      if (e.message && e.message.includes('SMS_DISABLED')) {
        a.isLoading = false;
        a.error = '';
        a.pendingPhone = '+226' + cleaned;
        a.otpInput = '';
        this.toast('📱 Mode démo : utilise le code 123456');
        this.navigate('auth-otp');
        return;
      }
      a.error = e.message || 'Erreur d\'envoi. Réessaie.';
      a.isLoading = false;
      this.render();
    }
  },

  renderAuthOTP() {
    const a = this.state.auth;
    const firebaseReady = window.FirebaseAuth && window.FirebaseAuth.isFirebaseReady;
    const isDemo = !firebaseReady;
    const formatPhone = (window.FirebaseAuth && window.FirebaseAuth.formatPhone)
      ? window.FirebaseAuth.formatPhone(a.pendingPhone)
      : a.pendingPhone;

    return `
      <div class="page auth-screen">
        <button class="auth-back" onclick="App.navigate('auth-phone')">←</button>

        <div class="auth-logo-row">
          <img src="icons/icon-192.png" class="auth-logo" alt="Bara Concours">
          <div>
            <div class="auth-brand">Vérification</div>
            <div class="auth-tagline">${formatPhone}</div>
          </div>
        </div>

        <div class="auth-card">
          <div class="auth-title">Code de vérification</div>
          <div class="auth-subtitle">${isDemo
            ? `Mode démo activé. Utilise le code <strong style="color:var(--green-bf)">123456</strong> pour continuer.`
            : `Saisis le code à 6 chiffres reçu par SMS au ${formatPhone}.`}</div>

          ${isDemo ? `
            <div class="auth-info" style="background:#f0fdf4; border-left-color:var(--success); color:#166534">
              <strong>📱 Mode démo</strong><br>
              Pas de SMS envoyé. Saisis simplement <strong>123456</strong> pour tester l'inscription.
            </div>
          ` : ''}

          ${a.error ? `<div class="auth-error show">⚠️ ${a.error}</div>` : ''}

          <input
            type="tel"
            class="auth-otp-input"
            id="otpInput"
            placeholder="••••••"
            maxlength="6"
            value="${a.otpInput}"
            oninput="App.handleOTPInput(this)"
            autocomplete="one-time-code"
            inputmode="numeric">

          <button class="auth-btn ${a.isLoading ? 'loading' : ''}" onclick="App.verifyOTP()" ${a.isLoading ? 'disabled' : ''}>
            Vérifier le code
          </button>

          ${!isDemo ? `
            <div class="auth-resend">
              ${a.resendCooldown > 0
                ? `Renvoyer le code dans ${a.resendCooldown}s`
                : `<button onclick="App.resendOTP()">📤 Renvoyer le code</button>`
              }
            </div>
          ` : ''}
        </div>

        <div class="auth-foot">${isDemo ? '🛠️ Configurer Firebase pour les vrais SMS — voir FIREBASE_SETUP.md' : '🔒 Code valable 10 minutes'}</div>
      </div>
    `;
  },

  handleOTPInput(input) {
    let v = input.value.replace(/\D/g, '');
    if (v.length > 6) v = v.substring(0, 6);
    input.value = v;
    this.state.auth.otpInput = v;
    if (v.length === 6) setTimeout(() => this.verifyOTP(), 200);
  },

  async verifyOTP() {
    const a = this.state.auth;
    if (a.otpInput.length !== 6) {
      a.error = 'Le code doit contenir 6 chiffres';
      this.render();
      return;
    }

    a.error = '';
    a.isLoading = true;
    this.render();

    const firebaseReady = window.FirebaseAuth && window.FirebaseAuth.isFirebaseReady;

    if (!firebaseReady) {
      // Mode démo — accepte uniquement le code 123456
      setTimeout(() => {
        if (a.otpInput === '123456') {
          this.state.user = {
            ...this.state.user,
            isLoggedIn: true,
            phoneNumber: a.pendingPhone,
            uid: 'demo_' + Date.now()
          };
          this.save();
          a.isLoading = false;
          this.toast('🎉 Connexion réussie (mode démo)');
          this.navigate('onboarding');
        } else {
          a.error = 'Code incorrect. En mode démo, utilise 123456';
          a.isLoading = false;
          this.render();
        }
      }, 500);
      return;
    }

    try {
      const result = await window.FirebaseAuth.verifyOTP(a.otpInput);
      a.isLoading = false;
      this.state.user = {
        ...this.state.user,
        isLoggedIn: true,
        uid: result.user.uid,
        phoneNumber: result.user.phoneNumber
      };
      this.save();
      this.toast('🎉 Connexion réussie !');

      if (result.isNewUser) {
        this.navigate('onboarding');
      } else {
        const cloudHistory = await window.FirebaseAuth.syncHistory();
        if (cloudHistory.length > this.state.history.length) {
          this.state.history = cloudHistory;
          this.save();
        }
        this.navigate('home');
      }
    } catch (e) {
      // V56.1 : Si SMS désactivé, basculer en mode démo (accepte 123456)
      if (e.message && e.message.includes('SMS_DISABLED')) {
        if (a.otpInput === '123456') {
          this.state.user = {
            ...this.state.user,
            isLoggedIn: true,
            phoneNumber: a.pendingPhone,
            uid: 'demo_' + Date.now()
          };
          this.save();
          a.isLoading = false;
          this.toast('🎉 Connexion réussie (mode démo)');
          this.navigate('onboarding');
        } else {
          a.error = 'Code incorrect. En mode démo, utilise 123456';
          a.isLoading = false;
          this.render();
        }
        return;
      }
      a.error = e.message || 'Erreur de vérification';
      a.isLoading = false;
      this.render();
    }
  },

  startResendCooldown() {
    const a = this.state.auth;
    a.resendCooldown = 60;
    if (a.resendInterval) clearInterval(a.resendInterval);
    a.resendInterval = setInterval(() => {
      a.resendCooldown--;
      if (a.resendCooldown <= 0) {
        clearInterval(a.resendInterval);
        a.resendInterval = null;
      }
      const el = document.querySelector('.auth-resend');
      if (el) {
        el.innerHTML = a.resendCooldown > 0
          ? `Renvoyer le code dans ${a.resendCooldown}s`
          : `<button onclick="App.resendOTP()">📤 Renvoyer le code</button>`;
      }
    }, 1000);
  },

  async resendOTP() {
    if (this.state.auth.resendCooldown > 0) return;
    this.state.auth.phoneInput = this.state.auth.pendingPhone.replace('+226', '').match(/.{1,2}/g).join(' ');
    await this.sendOTP();
  },

  // =================================================================
  // V56 : HANDLERS POUR LES ÉCRANS AUTH
  // =================================================================

  // --- Toggle visibilité mot de passe ---
  toggleSignupPasswordVisibility() {
    this.state.auth = this.state.auth || {};
    this.state.auth.showSignupPwd = !this.state.auth.showSignupPwd;
    this.render();
  },

  toggleSigninPasswordVisibility() {
    this.state.auth = this.state.auth || {};
    this.state.auth.showSigninPwd = !this.state.auth.showSigninPwd;
    this.render();
  },

  // --- Google Sign-In ---
  async handleGoogleSignIn() {
    if (!window.FirebaseAuth) {
      this.toast('❌ Firebase non chargé', 'danger');
      return;
    }
    this.state.auth = this.state.auth || {};
    this.state.auth.authError = null;

    // Init Firebase si pas encore fait
    if (!window.FirebaseAuth.isFirebaseReady) {
      this.toast('⏳ Connexion à Firebase...');
      const ok = await window.FirebaseAuth.init();
      if (!ok) {
        this.state.auth.authError = 'Impossible de se connecter à Firebase. Vérifie ta connexion internet.';
        this.render();
        return;
      }
    }

    const result = await window.FirebaseAuth.signInWithGoogle();
    if (result.pending) {
      // Redirect en cours (mode APK), l'app va recharger
      this.toast('🔄 Redirection vers Google...');
      return;
    }
    if (!result.success) {
      this.state.auth.authError = result.error;
      this.render();
      return;
    }

    // Succès : on a un user Firebase + profil Firestore
    this.toast('🎉 Connexion Google réussie !');
    console.log('[V57] Google sign-in success:', result);

    // V57 : Sauvegarder dans le state local + naviguer
    this._handleAuthSuccess(result);
  },

  // --- Inscription Email ---
  async handleSignupEmail() {
    this.state.auth = this.state.auth || {};
    const a = this.state.auth;
    a.signupError = null;

    // Validations
    if (!a.signupName || a.signupName.trim().length < 2) {
      a.signupError = 'Entre ton nom complet';
      this.render();
      return;
    }
    if (!a.signupEmail || !a.signupEmail.includes('@')) {
      a.signupError = 'Email invalide';
      this.render();
      return;
    }
    if (!a.signupPassword || a.signupPassword.length < 6) {
      a.signupError = 'Mot de passe trop court (minimum 6 caractères)';
      this.render();
      return;
    }
    if (!a.signupPhone || a.signupPhone.replace(/\D/g, '').length < 8) {
      a.signupError = 'Numéro WhatsApp invalide (8 chiffres minimum)';
      this.render();
      return;
    }
    if (!a.signupVille) {
      a.signupError = 'Choisis ta ville';
      this.render();
      return;
    }

    // Init Firebase
    if (!window.FirebaseAuth.isFirebaseReady) {
      this.toast('⏳ Connexion à Firebase...');
      const ok = await window.FirebaseAuth.init();
      if (!ok) {
        a.signupError = 'Impossible de se connecter à Firebase. Vérifie ta connexion internet.';
        this.render();
        return;
      }
    }

    a.signupLoading = true;
    this.render();

    const result = await window.FirebaseAuth.signUpWithEmail(
      a.signupEmail,
      a.signupPassword,
      {
        displayName: a.signupName.trim(),
        phoneNumber: '+226' + a.signupPhone.replace(/\D/g, ''),
        region: a.signupVille
      }
    );

    a.signupLoading = false;

    if (!result.success) {
      a.signupError = result.error;
      this.render();
      return;
    }

    this.toast('🎉 Compte créé avec succès !');
    console.log('[V57] Signup success:', result);

    // V57 : Pré-remplir l'onboarding avec les données déjà saisies
    this.state.onboarding = this.state.onboarding || {};
    this.state.onboarding.firstName = a.signupName.split(' ')[0] || '';
    this.state.onboarding.lastName = a.signupName.split(' ').slice(1).join(' ') || '';
    this.state.onboarding.phoneNumber = '+226' + a.signupPhone.replace(/\D/g, '');
    this.state.onboarding.ville = a.signupVille;

    this._handleAuthSuccess(result);
  },

  // --- Connexion Email ---
  async handleSigninEmail() {
    this.state.auth = this.state.auth || {};
    const a = this.state.auth;
    a.signinError = null;

    if (!a.signinEmail || !a.signinEmail.includes('@')) {
      a.signinError = 'Email invalide';
      this.render();
      return;
    }
    if (!a.signinPassword) {
      a.signinError = 'Entre ton mot de passe';
      this.render();
      return;
    }

    if (!window.FirebaseAuth.isFirebaseReady) {
      this.toast('⏳ Connexion à Firebase...');
      const ok = await window.FirebaseAuth.init();
      if (!ok) {
        a.signinError = 'Impossible de se connecter à Firebase. Vérifie ta connexion internet.';
        this.render();
        return;
      }
    }

    a.signinLoading = true;
    this.render();

    const result = await window.FirebaseAuth.signInWithEmail(a.signinEmail, a.signinPassword);

    a.signinLoading = false;

    if (!result.success) {
      a.signinError = result.error;
      this.render();
      return;
    }

    this.toast('🎉 Connexion réussie !');
    console.log('[V57] Signin success:', result);

    this._handleAuthSuccess(result);
  },

  // V57 : Centralise la gestion du succès d'authentification
  // Décide où naviguer selon : nouveau compte (→ onboarding) ou existant (→ home)
  _handleAuthSuccess(authResult) {
    const fbUser = authResult.user;
    const profile = authResult.profile || {};
    const isNewUser = authResult.isNewUser;

    // Mettre à jour le state local
    this.state.user = {
      ...this.state.user,
      isLoggedIn: true,
      uid: fbUser.uid,
      email: fbUser.email || '',
      firstName: profile.displayName ? profile.displayName.split(' ')[0] : (this.state.user.firstName || ''),
      lastName: profile.displayName ? profile.displayName.split(' ').slice(1).join(' ') : (this.state.user.lastName || ''),
      phoneNumber: profile.phoneNumber || this.state.user.phoneNumber || '',
      ville: profile.region || this.state.user.ville || '',
      photoURL: profile.photoURL || '',
      authProvider: profile.authProvider || 'email',
      // Premium synchronisé depuis Firestore
      isPremium: profile.isPremium || false,
      premiumPlan: profile.premiumPlan || null,
      premiumExpiresAt: profile.premiumExpiresAt || null,
      premiumActivatedAt: profile.premiumActivatedAt || null
    };
    this.save();

    // Naviguer selon le contexte
    if (isNewUser) {
      // Nouveau compte → onboarding pour finaliser (niveau d'études + concours visés)
      this.state.onboarding = this.state.onboarding || {};
      // Pré-remplir avec les données du signup
      if (this.state.user.firstName) {
        this.state.onboarding.firstName = this.state.user.firstName;
      }
      if (this.state.user.lastName) {
        this.state.onboarding.lastName = this.state.user.lastName;
      }
      if (this.state.user.phoneNumber) {
        this.state.onboarding.phoneNumber = this.state.user.phoneNumber;
      }
      if (this.state.user.ville) {
        this.state.onboarding.ville = this.state.user.ville;
      }
      // V58.3 : Marqueurs Firebase
      this.state.onboarding._fromFirebase = true;
      this.state.onboarding._provider = profile.authProvider || 'email';

      // V58.3 : Décider de l'étape de départ selon les infos déjà connues
      const hasName = !!(this.state.onboarding.firstName);
      const hasVille = !!(this.state.onboarding.ville);
      if (hasName && hasVille) {
        // Email signup : toutes les infos personnelles sont là → sauter à l'étape 2 (niveau)
        this.state.onboarding.step = 2;
      } else if (hasName) {
        // Google sign-in : on a le nom mais pas la ville → étape 1 mais juste pour ville
        this.state.onboarding.step = 1;
      } else {
        // Aucune info → étape 1 complète
        this.state.onboarding.step = 1;
      }

      this.navigate('onboarding');
    } else {
      // Compte existant → directement home
      this.navigate('home');
    }
  },

  // --- Mot de passe oublié ---
  async handleForgotPassword() {
    this.state.auth = this.state.auth || {};
    const a = this.state.auth;
    a.forgotError = null;

    if (!a.forgotEmail || !a.forgotEmail.includes('@')) {
      a.forgotError = 'Email invalide';
      this.render();
      return;
    }

    if (!window.FirebaseAuth.isFirebaseReady) {
      this.toast('⏳ Connexion à Firebase...');
      const ok = await window.FirebaseAuth.init();
      if (!ok) {
        a.forgotError = 'Impossible de se connecter à Firebase. Vérifie ta connexion internet.';
        this.render();
        return;
      }
    }

    a.forgotLoading = true;
    this.render();

    const result = await window.FirebaseAuth.sendPasswordReset(a.forgotEmail);

    a.forgotLoading = false;

    if (!result.success) {
      a.forgotError = result.error;
      this.render();
      return;
    }

    a.forgotSuccess = true;
    this.render();
  },

  // =================================================================
  // FIN V56
  // =================================================================

  // ===========================================
  // === ONBOARDING (après inscription)
  // ===========================================

  renderOnboarding() {

    return `

            <div class="auth-brand">Personnalisation</div>

          </div>
        </div>

        <div class="onboarding-card">
          <div class="onboard-step-indicator">
            ${fromFirebaseEmail ? '' : `<div class="onboard-dot ${o.step === 1 ? 'active' : (o.step > 1 ? 'done' : '')}"></div>`}
            <div class="onboard-dot ${o.step === 2 ? 'active' : (o.step > 2 ? 'done' : '')}"></div>
            <div class="onboard-dot ${o.step === 3 ? 'active' : ''}"></div>
          </div>

          ${o.step === 1 ? `
            <div class="auth-title">Comment t'appelles-tu ?</div>
            <div class="auth-subtitle">Pour personnaliser tes encouragements et statistiques.</div>
            <input type="text" class="edit-input" id="onboardName" placeholder="Ton prénom ou pseudo" value="${o.name}" maxlength="40">

            <div class="auth-input-group" style="margin-top:0.5rem">
              <label class="auth-label">Ville (optionnel)</label>
              <select class="edit-select" id="onboardCity">
                <option value="">— Choisir ma ville —</option>
                ${villes.map(v => `<option value="${v}" ${o.city === v ? 'selected' : ''}>${v}</option>`).join('')}
              </select>
            </div>

            <button class="auth-btn" onclick="App.onboardingNext()">Continuer →</button>
          ` : ''}

          ${o.step === 2 ? `
            <div class="auth-title">Quel concours vises-tu ?</div>
            <div class="auth-subtitle">Choisis d'abord ton niveau scolaire pour voir les concours adaptés.</div>

            <!-- BUG #2 FIX : filtre par niveau scolaire -->
            <div style="display:flex; flex-wrap:wrap; gap:0.4rem; margin-bottom:0.8rem">
              ${['Tous', 'BEPC', 'BAC', 'Licence', 'Master'].map(niv => {
                const active = (o.filterNiveau || 'Tous') === niv;
                return `
                  <button onclick="App.setOnboardingNiveau('${niv}')"
                    style="padding:0.4rem 0.85rem; border-radius:999px; border:1.5px solid ${active ? 'var(--green-bf)' : 'var(--line)'}; background:${active ? 'var(--green-bf)' : 'white'}; color:${active ? 'white' : 'var(--ink)'}; font-weight:700; font-size:0.78rem; cursor:pointer">
                    ${niv}
                  </button>
                `;
              }).join('')}
            </div>

            <div style="display:flex; flex-direction:column; gap:0.5rem; margin-bottom:1rem; max-height:340px; overflow-y:auto">
              ${(() => {
                const niv = o.filterNiveau || 'Tous';
                const filtered = niv === 'Tous'
                  ? CONCOURS
                  : CONCOURS.filter(c => (c.niveau || '').toUpperCase().includes(niv.toUpperCase()));
                if (filtered.length === 0) {
                  return '<div style="text-align:center; color:var(--ink-mute); padding:1rem; font-size:0.85rem">Aucun concours de ce niveau</div>';
                }
                return filtered.slice(0, 20).map(c => `
                  <button class="toggle-row" onclick="App.selectTargetConcoursAndContinue('${c.id}')" style="border-color:${o.targetConcours === c.id ? 'var(--green-bf)' : 'var(--line)'}; background:${o.targetConcours === c.id ? '#f0fdf4' : 'white'}; cursor:pointer">
                    <div class="toggle-text">
                      <div class="toggle-label">${CATEGORIES_CONCOURS[c.categorie].icone} ${c.nom}</div>
                      <div class="toggle-desc">${c.niveau} • ${c.ministere}</div>
                    </div>
                    ${o.targetConcours === c.id ? '<div style="color:var(--green-bf); font-size:1.4rem">✓</div>' : ''}
                  </button>
                `).join('');
              })()}
            </div>

            <button onclick="App.selectTargetConcoursAndContinue('')" style="background:transparent; color:var(--ink-mute); padding:0.6rem; width:100%; font-size:0.85rem; text-decoration:underline; margin-bottom:0.6rem">Je ne sais pas encore →</button>

            <button class="auth-btn" onclick="App.onboardingNext()">Continuer →</button>
          ` : ''}

          ${o.step === 3 ? `
            <div class="auth-title">Notifications quotidiennes</div>
            <div class="auth-subtitle">Reçois un rappel chaque matin à 8h pour faire ton QCM du jour. La régularité, c'est la clé !</div>

            <div class="auth-info" style="margin-bottom:1.2rem">
              ⏰ <strong>QCM quotidien à 8h00</strong><br>
              Tu pourras désactiver ou changer l'heure dans tes paramètres.
            </div>

            <button class="auth-btn" onclick="App.enableNotifsAndFinish()" style="margin-bottom:0.6rem">
              🔔 Activer les notifications
            </button>
            <button onclick="App.finishOnboarding(false)" style="background:transparent; color:var(--ink-mute); padding:0.7rem; width:100%; font-size:0.85rem; text-decoration:underline">Plus tard, merci</button>
          ` : ''}
        </div>

  onboardingBack() {
    if (this.state.onboarding.step > 1) {
      this.state.onboarding.step--;
      this.render();
    }
  },

  onboardingNext() {
    const o = this.state.onboarding;
    if (o.step === 1) {
      const name = document.getElementById('onboardName')?.value.trim();
      const city = document.getElementById('onboardCity')?.value;
      if (!name) { this.toast('Saisis ton prénom ou pseudo'); return; }
      o.name = name;
      o.city = city || '';
      o.step = 2;
      this.render();
    } else if (o.step === 2) {
      o.step = 3;
      this.render();
    }
  },

  selectTargetConcours(id) {
    this.state.onboarding.targetConcours = id;
    this.render();
  },

  // BUG #2 FIX : filtre par niveau dans l'onboarding
  setOnboardingNiveau(niveau) {
    this.state.onboarding.filterNiveau = niveau;
    this.render();
  },

  // V34 : Filtre des concours selon le niveau scolaire de l'utilisateur
  // Mapping niveau utilisateur → niveaux de concours acceptés
  filterConcoursByLevel(userLevel) {
    if (!userLevel || userLevel === '') {
      // Pas de niveau choisi → tous les concours
      return CONCOURS;
    }

    // Hiérarchie : un utilisateur de niveau BAC peut viser concours BEPC OU BAC
    // Un utilisateur Licence peut viser BEPC, BAC, Licence
    const niveauxAcceptes = {
      'CEP': ['CEP'],
      'BEPC': ['CEP', 'BEPC'],
      'BAC': ['CEP', 'BEPC', 'BAC'],
      'Licence': ['CEP', 'BEPC', 'BAC', 'Licence', 'BAC+3', 'BAC+4', 'BAC+5'],
      'Licence et plus': ['CEP', 'BEPC', 'BAC', 'Licence', 'BAC+3', 'BAC+4', 'BAC+5', 'Master', 'Doctorat']
    };

    const accepts = niveauxAcceptes[userLevel] || [];
    if (accepts.length === 0) return CONCOURS;

    return CONCOURS.filter(c => {
      const niv = (c.niveau || '').toUpperCase();
      return accepts.some(a => niv.includes(a.toUpperCase()));
    });
  },

  // V34 : quand le niveau change dans le formulaire de profil, rafraîchir la liste
  onEditLevelChange() {
    // Sauvegarder temporairement les valeurs en cours pour ne pas perdre la saisie
    const tempName = document.getElementById('editName')?.value || '';
    const tempCity = document.getElementById('editCity')?.value || '';
    const newLevel = document.getElementById('editLevel')?.value || '';

    // Mettre à jour le state temporairement
    this.state.user = {
      ...this.state.user,
      name: tempName,
      city: tempCity,
      educationLevel: newLevel
    };
    // Re-render pour rafraîchir la liste des concours
    this.render();
  },

  // BUG #1 FIX : variante qui sélectionne ET avance à l'étape suivante
  selectTargetConcoursAndContinue(id) {
    this.state.onboarding.targetConcours = id;
    this.state.onboarding.step = 3;
    this.render();
  },

  async enableNotifsAndFinish() {
    const result = await Notifications.requestPermission();
    if (result.success) {
      this.state.user.notificationsEnabled = true;
      this.toast('🔔 Notifications activées !');
    } else if (result.reason === 'denied') {
      this.toast('Notifications bloquées dans les paramètres du navigateur');
    } else if (result.reason === 'file_protocol') {
      // BUG #3 FIX : message clair quand l'app est ouverte en file://
      this.toast('⚠️ Les notifications ne marchent pas en local. Elles marcheront sur Play Store !');
    } else if (result.reason === 'unsupported') {
      this.toast('Ce navigateur ne supporte pas les notifications');
    } else {
      this.toast('Notifications non activées');
    }
    this.finishOnboarding(result.success);
  },

  async finishOnboarding(notifsOK) {
    const o = this.state.onboarding;
    this.state.user = {
      ...this.state.user,
      name: o.name,
      nom: o.name,
      city: o.city,
      targetConcours: o.targetConcours,
      educationLevel: o.educationLevel || o.filterNiveau || '',
      phoneNumber: o.phoneNumber || this.state.user.phoneNumber || '',
      notificationsEnabled: notifsOK,
      onboardingCompleted: true  // Marqueur explicite : onboarding terminé
    };
    this.save();

    if (window.FirebaseAuth && window.FirebaseAuth.isFirebaseReady && window.FirebaseAuth.isLoggedIn()) {
      try {
        await window.FirebaseAuth.updateProfile({
          displayName: o.name,
          city: o.city,
          targetConcours: o.targetConcours,
          notificationsEnabled: notifsOK
        });
      } catch (e) { console.error('Update profile :', e); }
    }

    this.toast('🎉 Bienvenue ' + o.name + ' !');
    this.navigate('home');

    // Proposer l'activation biométrique après 1.5s (laisser l'écran d'accueil charger)
    setTimeout(() => this.showBiometricEnrollPrompt(), 1500);
  },

    return `

  async saveProfile() {
    const updates = {
      name: document.getElementById('editName').value.trim(),
      city: document.getElementById('editCity').value,
      educationLevel: document.getElementById('editLevel').value,
      targetConcours: document.getElementById('editConcours').value
    };

    if (!updates.name) { this.toast('Le nom est obligatoire'); return; }

    this.state.user = { ...this.state.user, ...updates };
    this.save();
    if (window.FirebaseAuth && window.FirebaseAuth.isFirebaseReady && window.FirebaseAuth.isLoggedIn()) {
      try {
        await window.FirebaseAuth.updateProfile({
          displayName: updates.name,
          city: updates.city,
          educationLevel: updates.educationLevel,
          targetConcours: updates.targetConcours
        });
      } catch (e) { console.error('Erreur sauvegarde cloud :', e); }
    }

    this.toast('✓ Profil mis à jour');
    this.navigate('profile');

  // === GESTION NOTIFICATIONS
  // ===========================================

  async toggleNotifications() {
    if (Notifications.isEnabled()) {
      this.state.user.notificationsEnabled = !this.state.user.notificationsEnabled;
      this.save();
      this.toast(this.state.user.notificationsEnabled ? '🔔 Notifications activées' : '🔕 Notifications désactivées');
      this.render();
    } else {
      const result = await Notifications.requestPermission();
      if (result.success) {
        this.state.user.notificationsEnabled = true;
        this.save();
        this.toast('🔔 Notifications activées');
      } else if (result.reason === 'denied') {
        this.toast('Notifications bloquées. Va dans les paramètres du navigateur.');
      }
      this.render();
    }
  },

  async testNotification() {
    if (!Notifications.isEnabled()) {
      this.toast('Active d\'abord les notifications');
      return;
    }
    const ok = await Notifications.testNotification();
    if (ok) this.toast('🔔 Notification test envoyée');
  },

  // ===========================================
  // === DÉCONNEXION
  // ===========================================

  async logout() {
    if (!confirm('Voulez-vous vraiment vous déconnecter ?')) return;
    // V57 : signOut (au lieu de logout) pour le nouveau module Firebase
    if (window.FirebaseAuth && window.FirebaseAuth.isFirebaseReady) {
      try {
        if (typeof window.FirebaseAuth.signOut === 'function') {
          await window.FirebaseAuth.signOut();
        } else if (typeof window.FirebaseAuth.logout === 'function') {
          await window.FirebaseAuth.logout();
        }
      } catch(e) { console.warn('[V57] Erreur déconnexion Firebase :', e); }
    }
    this.state.user = {
      name: 'Apprenant',
      isPremium: false,
      isLoggedIn: false,
      phoneNumber: '',
      city: '',
      targetConcours: '',
      educationLevel: '',
      notificationsEnabled: false
    };
    this.save();
    this.toast('Déconnecté');
    this.navigate('splash');

  // ===========================================

    if (user && !this.state.user.isLoggedIn) {
      this.state.user.isLoggedIn = true;
      this.state.user.uid = user.uid;
      this.state.user.phoneNumber = user.phoneNumber;
      this.save();
    }

  // === DETAIL CONCOURS ===
  renderConcoursDetail() {
    const c = this.state.currentConcours;
    if (!c) { this.navigate('home'); return ''; }
    const cat = CATEGORIES_CONCOURS[c.categorie];

  // === Gestion des overrides admin (matières masquées/grisées/ajoutées/retirées) ===
  loadConcoursOverrides() {
    try {
      // 1. Récupérer les modifications locales de l'utilisateur (s'il en a fait depuis l'admin)
      const local = JSON.parse(localStorage.getItem('bara_concours_matieres_overrides') || '{}');
      // Si l'utilisateur a des modifs locales, on les utilise (priorité)
      if (Object.keys(local).length > 0) {
        return local;
      }
      // 2. Sinon, utiliser les overrides par défaut définis dans data/concours.js
      // Ces overrides ont été décidés par l'équipe Bara Formation
      if (window.DEFAULT_CONCOURS_OVERRIDES) {
        return window.DEFAULT_CONCOURS_OVERRIDES;
      }
      return {};
    } catch (e) {
      return {};
    }
  },

  // Récupérer les matières effectives d'un concours (avec overrides appliqués)
  // ATTENTION : on EXCLUT les matières "hidden" (l'utilisateur ne doit pas les voir)
  getEffectiveMatieres(concours) {
    const allOverrides = this.loadConcoursOverrides();
    const overrides = allOverrides[concours.id] || { added: [], removed: [], hidden: [], greyed: [] };

    // Base : matières d'origine
    let matieres = [...concours.matieres];

    // Ajouter les matières "added"
    (overrides.added || []).forEach(m => {
      if (!matieres.includes(m)) matieres.push(m);
    });

    // Retirer les "removed" ET les "hidden"
    matieres = matieres.filter(m => {
      if ((overrides.removed || []).includes(m)) return false;
      if ((overrides.hidden || []).includes(m)) return false;
      return true;
    });

    return matieres;
  },

  // Vérifier si une matière est grisée dans un concours
  isMatiereGreyed(concoursId, matiereId) {
    const allOverrides = this.loadConcoursOverrides();
    const overrides = allOverrides[concoursId] || {};
    return (overrides.greyed || []).includes(matiereId);
  },
